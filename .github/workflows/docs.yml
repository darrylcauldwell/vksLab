name: Generate PDFs

on:
  push:
    paths:
      - 'docs/**'
      - 'Makefile'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]
    paths:
      - 'docs/**'
      - 'Makefile'
      - '.github/workflows/docs.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: pandoc/extra:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate PDFs
        run: |
          PANDOC_FLAGS="--template eisvogel --pdf-engine=xelatex --toc --toc-depth=3 --number-sections"
          pandoc docs/conceptual-design.md -o docs/conceptual-design.pdf $PANDOC_FLAGS --metadata-file=docs/metadata/design.yaml
          pandoc docs/logical-design.md -o docs/logical-design.pdf $PANDOC_FLAGS --metadata-file=docs/metadata/design.yaml
          pandoc docs/physical-design.md -o docs/physical-design.pdf $PANDOC_FLAGS --metadata-file=docs/metadata/design.yaml
          pandoc docs/deliver.md -o docs/deliver.pdf $PANDOC_FLAGS --metadata-file=docs/metadata/deliver.yaml
          pandoc docs/operate.md -o docs/operate.pdf $PANDOC_FLAGS --metadata-file=docs/metadata/operate.yaml

      - name: Upload PDFs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vks-lab-docs
          path: docs/*.pdf
          retention-days: 90

  commit:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download PDFs
        uses: actions/download-artifact@v4
        with:
          name: vks-lab-docs
          path: docs/

      - name: Commit PDFs
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: regenerate PDFs [skip ci]"
          file_pattern: "docs/*.pdf"
