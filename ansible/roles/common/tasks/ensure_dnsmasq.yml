---
# Ensure dnsmasq is running after a vApp power cycle.
# /run/ is tmpfs — lost on reboot. dnsmasq's systemd unit passes
# -r /run/dnsmasq/resolv.conf which must exist or DNS fails silently.

- name: "dnsmasq | Create /run/dnsmasq directory"
  ansible.builtin.file:
    path: /run/dnsmasq
    state: directory
    owner: dnsmasq
    group: nogroup
    mode: "0755"
  become: true

- name: "dnsmasq | Create /run/dnsmasq/resolv.conf"
  ansible.builtin.file:
    path: /run/dnsmasq/resolv.conf
    state: touch
    owner: dnsmasq
    group: nogroup
    mode: "0644"
    modification_time: preserve
    access_time: preserve
  become: true

- name: "dnsmasq | Restart to load config"
  ansible.builtin.service:
    name: dnsmasq
    state: restarted
    enabled: true
  become: true

- name: "dnsmasq | Verify service is healthy"
  ansible.builtin.command:
    cmd: systemctl is-active dnsmasq
  register: _dnsmasq_status
  changed_when: false
  failed_when: _dnsmasq_status.stdout != 'active'
  become: true

- name: "dnsmasq | Show journal on failure"
  ansible.builtin.command:
    cmd: journalctl -u dnsmasq --no-pager -n 20
  when: _dnsmasq_status is failed
  changed_when: false
  become: true
