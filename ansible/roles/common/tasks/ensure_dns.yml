---
# Reusable DNS validation task
# Ensures DNS records exist on the gateway and verifies resolution.
#
# Required variable:
#   dns_records: list of {hostname: <short>, ip: <ip>}
#
# Usage in a role:
#   - name: Ensure DNS for this phase
#     ansible.builtin.include_tasks: ../../common/tasks/ensure_dns.yml
#     vars:
#       dns_records:
#         - { hostname: sddc-manager, ip: "{{ lab_mgmt_prefix }}.5" }

- name: "DNS | Ensure records on gateway"
  ansible.builtin.lineinfile:
    path: /etc/dnsmasq.d/lab.conf
    line: "host-record={{ item.hostname }}.{{ lab_domain }},{{ item.ip }}"
    regexp: "^host-record={{ item.hostname }}\\.{{ lab_domain | regex_escape }}"
    state: present
  loop: "{{ dns_records }}"
  loop_control:
    label: "{{ item.hostname }}"
  delegate_to: gateway
  become: true
  vars:
    ansible_connection: ssh
  register: dns_changes

- name: "DNS | Restart dnsmasq if records changed"
  ansible.builtin.service:
    name: dnsmasq
    state: restarted
  delegate_to: gateway
  become: true
  vars:
    ansible_connection: ssh
  when: dns_changes.changed

- name: "DNS | Verify resolution from gateway"
  ansible.builtin.command:
    cmd: "dig +short {{ item.hostname }}.{{ lab_domain }}"
  loop: "{{ dns_records }}"
  loop_control:
    label: "{{ item.hostname }}"
  delegate_to: gateway
  vars:
    ansible_connection: ssh
  register: dns_check
  changed_when: false
  failed_when: dns_check.stdout | length == 0

- name: "DNS | Resolution results"
  ansible.builtin.debug:
    msg: "{{ item.item.hostname }}.{{ lab_domain }}: {{ item.stdout }}"
  loop: "{{ dns_check.results }}"
  loop_control:
    label: "{{ item.item.hostname }}"
