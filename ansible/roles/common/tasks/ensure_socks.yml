---
# Ensure SOCKS proxy tunnel to gateway is running.
# Opens one in the background if not already active.
#
# Requires: gateway_public_ip variable (from 1Password lookup)
#
# Usage in a playbook (before roles):
#   pre_tasks:
#     - name: Ensure SOCKS proxy
#       ansible.builtin.include_tasks: roles/common/tasks/ensure_socks.yml

- name: "SDK | Show Python diagnostics"
  ansible.builtin.shell: |
    echo "which python3: $(which python3)"
    echo "python3 version: $(python3 --version)"
    echo "ansible_playbook_python: {{ ansible_playbook_python | default('not set') }}"
    echo "sys.executable: $(python3 -c 'import sys; print(sys.executable)')"
    echo "site-packages: $(python3 -c 'import site; print(site.getsitepackages()[0])')"
    echo "vcf_sdk import: $(python3 -c 'from vcf_sdk import SDDCManager; print("OK")' 2>&1)"
  register: sdk_diag
  changed_when: false
  failed_when: false

- name: "SDK | Display Python diagnostics"
  ansible.builtin.debug:
    msg: "{{ sdk_diag.stdout }}"

- name: "SDK | Verify vcf_sdk is importable"
  ansible.builtin.command:
    cmd: python3 -c "from vcf_sdk import SDDCManager; print('OK')"
  changed_when: false
  register: sdk_check
  failed_when: false

- name: "SDK | vcf_sdk not found — install to site-packages"
  when: sdk_check.rc != 0
  block:
    - name: "SDK | Get Python site-packages path"
      ansible.builtin.command:
        cmd: python3 -c "import site; print(site.getsitepackages()[0])"
      register: site_packages
      changed_when: false

    - name: "SDK | Copy vendored vcf_sdk"
      ansible.builtin.shell: |
        rm -rf {{ site_packages.stdout }}/vcf_sdk
        cp -r {{ playbook_dir }}/../python/vcf_sdk {{ site_packages.stdout }}/vcf_sdk
        find {{ site_packages.stdout }}/vcf_sdk -type d -exec chmod 755 {} +
        find {{ site_packages.stdout }}/vcf_sdk -type f -exec chmod 644 {} +
      changed_when: true

    - name: "SDK | Verify vcf_sdk is now importable"
      ansible.builtin.command:
        cmd: python3 -c "from vcf_sdk import SDDCManager; print('OK')"
      changed_when: false

- name: "SOCKS | Check if tunnel is active on port 1080"
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 1080
    timeout: 2
  register: socks_check
  failed_when: false

- name: "SOCKS | Open tunnel to gateway"
  ansible.builtin.command:
    cmd: >
      ssh -f -N -D 1080
      -o StrictHostKeyChecking=no
      -o UserKnownHostsFile=/dev/null
      -o ExitOnForwardFailure=yes
      ubuntu@{{ gateway_public_ip }}
  when: socks_check.failed | default(false)
  register: socks_opened

- name: "SOCKS | Wait for tunnel to be ready"
  ansible.builtin.wait_for:
    host: 127.0.0.1
    port: 1080
    timeout: 10
  when: socks_opened.changed | default(false)

- name: "SOCKS | Verify connectivity through tunnel"
  ansible.builtin.command:
    cmd: >
      python3 -c "
      import os, requests
      os.environ['HTTPS_PROXY'] = 'socks5h://localhost:1080'
      r = requests.get('https://sddc-manager.{{ lab_domain }}/', verify=False, timeout=10)
      print(f'SDDC Manager reachable: HTTP {r.status_code}')
      "
  changed_when: false
  failed_when: false
  register: socks_verify

- name: "SOCKS | Prevent macOS sleep during long-running tasks"
  ansible.builtin.command:
    cmd: caffeinate -d -i -s -w {{ ansible_pid | default(lookup('pipe', 'echo $PPID')) }}
  async: 86400
  poll: 0
  register: caffeinate_job
  when: ansible_os_family | default('') == 'Darwin' or lookup('pipe', 'uname') == 'Darwin'
  changed_when: false
  failed_when: false

- name: "SOCKS | Display tunnel status"
  ansible.builtin.debug:
    msg: "{{ 'Tunnel active' if not (socks_check.failed | default(false)) else 'Tunnel opened' }} — {{ socks_verify.stdout | default('verification skipped') }}{{ ' — caffeinate active' if caffeinate_job.changed | default(false) else '' }}"
