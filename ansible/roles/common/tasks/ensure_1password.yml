---
# Verify 1Password secrets file exists.
# The actual secret fetch is done by run.sh BEFORE Ansible starts.
# This task just validates the file is present.

- name: "1Password | Verify secrets file exists"
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../inventory/group_vars/all/secrets.yml"
  register: secrets_file

- name: "1Password | Fail if secrets not loaded"
  ansible.builtin.fail:
    msg: >-
      group_vars/secrets.yml not found. Use ./run.sh instead of
      ansible-playbook directly. run.sh fetches 1Password secrets
      before Ansible starts.
  when: not secrets_file.stat.exists
