---
# Fetch all 1Password secrets in a single op invocation.
# One biometric prompt, results cached as host facts for all inventory hosts.
#
# Must run as a standalone play targeting localhost BEFORE any play
# that uses secret variables (gateway_public_ip, bootstrap_password, etc).
#
# Usage — add this as the FIRST play in every playbook:
#
#   - name: Load secrets
#     hosts: localhost
#     connection: local
#     gather_facts: false
#     tasks:
#       - name: Load 1Password secrets
#         ansible.builtin.include_tasks: ../roles/common/tasks/ensure_1password.yml

- name: "1Password | Batch fetch all secrets (single biometric prompt)"
  ansible.builtin.shell: |
    set -e
    echo "gateway_password=$(op read 'op://{{ onepassword_vault }}/Jumpbox Ubuntu/password')"
    echo "bootstrap_password=$(op read 'op://{{ onepassword_vault }}/Lab Bootstrap/password')"
    echo "esxi_root_password=$(op read 'op://{{ onepassword_vault }}/ESXi Root/password')"
    echo "vcenter_sso_password=$(op read 'op://{{ onepassword_vault }}/vCenter SSO/password')"
    echo "sddc_admin_password=$(op read 'op://{{ onepassword_vault }}/SDDC Manager/password')"
    echo "nsx_admin_password=$(op read 'op://{{ onepassword_vault }}/NSX Manager/password')"
    echo "keycloak_admin_password=$(op read 'op://{{ onepassword_vault }}/Keycloak Admin/password')"
    echo "depot_username=$(op read 'op://{{ onepassword_vault }}/Offline Depot/username')"
    echo "depot_password=$(op read 'op://{{ onepassword_vault }}/Offline Depot/password')"
  register: op_result
  no_log: true
  changed_when: false

- name: "1Password | Parse secrets"
  ansible.builtin.set_fact:
    _1p_secrets: "{{ dict(op_result.stdout_lines | map('split', '=', 1)) }}"
  no_log: true

- name: "1Password | Set facts on localhost"
  ansible.builtin.set_fact:
    gateway_password: "{{ _1p_secrets.gateway_password }}"
    bootstrap_password: "{{ _1p_secrets.bootstrap_password }}"
    esxi_root_password: "{{ _1p_secrets.esxi_root_password }}"
    vcenter_sso_password: "{{ _1p_secrets.vcenter_sso_password }}"
    sddc_admin_password: "{{ _1p_secrets.sddc_admin_password }}"
    nsx_admin_password: "{{ _1p_secrets.nsx_admin_password }}"
    keycloak_admin_password: "{{ _1p_secrets.keycloak_admin_password }}"
    depot_username: "{{ _1p_secrets.depot_username }}"
    depot_password: "{{ _1p_secrets.depot_password }}"
  no_log: true

- name: "1Password | Propagate secrets to all inventory hosts"
  ansible.builtin.set_fact:
    gateway_password: "{{ _1p_secrets.gateway_password }}"
    bootstrap_password: "{{ _1p_secrets.bootstrap_password }}"
    esxi_root_password: "{{ _1p_secrets.esxi_root_password }}"
    vcenter_sso_password: "{{ _1p_secrets.vcenter_sso_password }}"
    sddc_admin_password: "{{ _1p_secrets.sddc_admin_password }}"
    nsx_admin_password: "{{ _1p_secrets.nsx_admin_password }}"
    keycloak_admin_password: "{{ _1p_secrets.keycloak_admin_password }}"
    depot_username: "{{ _1p_secrets.depot_username }}"
    depot_password: "{{ _1p_secrets.depot_password }}"
  delegate_to: "{{ item }}"
  delegate_facts: true
  loop: "{{ groups['all'] }}"
  no_log: true

- name: "1Password | Secrets loaded"
  ansible.builtin.debug:
    msg: "9 secrets loaded for {{ groups['all'] | length }} hosts (gateway_public_ip loaded at inventory parse time)"
