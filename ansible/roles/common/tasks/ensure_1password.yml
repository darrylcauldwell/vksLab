---
# Ensure 1Password CLI session is authenticated.
# Triggers a single biometric/password prompt, then caches
# the session so subsequent lookups don't re-prompt.
#
# Usage in a playbook (before roles or tasks that use 1Password lookups):
#   pre_tasks:
#     - name: Ensure 1Password session
#       ansible.builtin.include_tasks: roles/common/tasks/ensure_1password.yml

- name: "1Password | Warm session cache"
  ansible.builtin.command:
    cmd: op account get
  register: op_check
  changed_when: false
  failed_when: false

- name: "1Password | Sign in (triggers biometric once)"
  ansible.builtin.command:
    cmd: op signin --raw
  register: op_signin
  when: op_check.rc != 0
  no_log: true

- name: "1Password | Session ready"
  ansible.builtin.debug:
    msg: "1Password session {{ 'already active' if op_check.rc == 0 else 'authenticated' }}"
