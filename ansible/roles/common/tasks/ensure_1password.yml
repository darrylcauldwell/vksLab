---
# Fetch all 1Password secrets and write to group_vars/secrets.yml.
# Single biometric prompt. Ansible auto-loads group_vars files —
# no vars_files needed on any play.
#
# The secrets file is gitignored and cached for 1 hour to avoid
# re-prompting when re-running playbooks quickly.
#
# Usage — as the FIRST play in every playbook:
#
#   - name: Load secrets
#     hosts: localhost
#     connection: local
#     gather_facts: true
#     tasks:
#       - name: Load 1Password secrets
#         ansible.builtin.include_tasks: ../roles/common/tasks/ensure_1password.yml

- name: "1Password | Check if secrets file exists and is recent (< 1 hour)"
  ansible.builtin.stat:
    path: "{{ playbook_dir }}/../inventory/group_vars/secrets.yml"
  register: secrets_file

- name: "1Password | Skip fetch — using cached secrets"
  ansible.builtin.debug:
    msg: "Using cached secrets.yml (less than 1 hour old)"
  when: secrets_file.stat.exists and ((ansible_date_time.epoch | int) - (secrets_file.stat.mtime | int)) < 3600

- name: "1Password | Batch fetch all secrets (single biometric prompt)"
  ansible.builtin.shell: |
    set -e
    VAULT="{{ onepassword_vault }}"
    GW_IP=$(op read "op://$VAULT/Lab Bootstrap/ip_address")
    GW_PW=$(op read "op://$VAULT/Jumpbox Ubuntu/password")
    BOOT=$(op read "op://$VAULT/Lab Bootstrap/password")
    ESXI=$(op read "op://$VAULT/ESXi Root/password")
    VCSA=$(op read "op://$VAULT/vCenter SSO/password")
    SDDC=$(op read "op://$VAULT/SDDC Manager/password")
    NSX=$(op read "op://$VAULT/NSX Manager/password")
    KC=$(op read "op://$VAULT/Keycloak Admin/password")
    DEP_U=$(op read "op://$VAULT/Offline Depot/username")
    DEP_P=$(op read "op://$VAULT/Offline Depot/password")

    cat > "{{ playbook_dir }}/../inventory/group_vars/secrets.yml" <<EOF
    ---
    gateway_public_ip: "$GW_IP"
    gateway_password: "$GW_PW"
    bootstrap_password: "$BOOT"
    esxi_root_password: "$ESXI"
    vcenter_sso_password: "$VCSA"
    sddc_admin_password: "$SDDC"
    nsx_admin_password: "$NSX"
    keycloak_admin_password: "$KC"
    depot_username: "$DEP_U"
    depot_password: "$DEP_P"
    EOF
    chmod 600 "{{ playbook_dir }}/../inventory/group_vars/secrets.yml"
  when: not secrets_file.stat.exists or ((ansible_date_time.epoch | int) - (secrets_file.stat.mtime | int)) >= 3600
  no_log: true
  changed_when: true

- name: "1Password | Secrets ready"
  ansible.builtin.debug:
    msg: "Secrets at inventory/group_vars/secrets.yml — auto-loaded by Ansible for all hosts"
