---
# Ensure 1Password CLI session is authenticated.
# Triggers a single biometric/password prompt which caches the session.
# Subsequent onepassword lookups in group_vars reuse the cached session.
#
# The `op run` approach is preferred — wrap the ansible-playbook command:
#   op run -- ansible-playbook playbooks/phase1_foundation.yml
#
# This include is a fallback that warms the session cache by performing
# a single read. The 1Password CLI caches the biometric unlock for
# subsequent `op` invocations within the same terminal session.

- name: "1Password | Warm session (single biometric prompt)"
  ansible.builtin.shell: >
    op read "op://Employee/Lab Bootstrap/password" > /dev/null 2>&1
  changed_when: false
  failed_when: false
  no_log: true
