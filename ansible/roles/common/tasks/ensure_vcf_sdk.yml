---
# Ensure vcf_sdk and its dependencies are available on the current host.
# Installs apt packages if missing, copies vendored vcf_sdk if not importable.

- name: "vcf_sdk | Update lab repo on gateway"
  ansible.builtin.git:
    repo: https://github.com/darrylcauldwell/dda-vcf.git
    dest: /home/ubuntu/dda-vcf
    version: main
    force: true
  become: true
  become_user: ubuntu

- name: "vcf_sdk | Ensure Python dependencies are installed"
  ansible.builtin.apt:
    name:
      - python3-requests
      - python3-pydantic
      - python3-urllib3
    state: present
  become: true

- name: "vcf_sdk | Check if vcf_sdk is importable"
  ansible.builtin.command:
    cmd: python3 -c "from vcf_sdk import SDDCManager; print('OK')"
  register: _vcf_sdk_check
  changed_when: false
  failed_when: false

- name: "vcf_sdk | Install vendored vcf_sdk to system Python"
  ansible.builtin.shell: |
    rm -rf /usr/lib/python3/dist-packages/vcf_sdk
    cp -r /home/ubuntu/dda-vcf/ansible/python/vcf_sdk /usr/lib/python3/dist-packages/vcf_sdk
    find /usr/lib/python3/dist-packages/vcf_sdk -type d -exec chmod 755 {} +
    find /usr/lib/python3/dist-packages/vcf_sdk -type f -exec chmod 644 {} +
  become: true
  when: _vcf_sdk_check.rc != 0

- name: "vcf_sdk | Verify vcf_sdk is now importable"
  ansible.builtin.command:
    cmd: python3 -c "from vcf_sdk import SDDCManager, CloudBuilder; print('vcf_sdk OK')"
  changed_when: false
  when: _vcf_sdk_check.rc != 0
