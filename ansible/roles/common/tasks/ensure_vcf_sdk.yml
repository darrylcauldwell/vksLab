---
# Ensure vcf_sdk and its dependencies are available on the current host.
# Installs apt packages if missing, copies vendored vcf_sdk if not importable.

- name: "vcf_sdk | Update lab repo on gateway"
  ansible.builtin.git:
    repo: https://github.com/darrylcauldwell/dda-vcf.git
    dest: /home/ubuntu/dda-vcf
    version: main
    force: true
  become: true
  become_user: ubuntu

- name: "vcf_sdk | Ensure apt dependencies are installed"
  ansible.builtin.apt:
    name:
      - python3-requests
      - python3-urllib3
    state: present
  become: true

- name: "vcf_sdk | Remove apt pydantic v1 to avoid conflict"
  ansible.builtin.apt:
    name:
      - python3-pydantic
      - python3-typing-extensions
    state: absent
    purge: true
  become: true

- name: "vcf_sdk | Install pydantic v2 from vendored wheels"
  ansible.builtin.command:
    cmd: >
      python3 -m pip install --no-index --break-system-packages --force-reinstall
      --find-links /home/ubuntu/dda-vcf/ansible/python/wheels
      pydantic pydantic_core typing_extensions annotated_types typing_inspection
  become: true
  register: _pydantic_install
  changed_when: "'Successfully installed' in _pydantic_install.stdout"

- name: "vcf_sdk | Sync vendored vcf_sdk to system Python"
  ansible.builtin.shell: |
    rm -rf /usr/lib/python3/dist-packages/vcf_sdk
    cp -r /home/ubuntu/dda-vcf/ansible/python/vcf_sdk /usr/lib/python3/dist-packages/vcf_sdk
    find /usr/lib/python3/dist-packages/vcf_sdk -type d -exec chmod 755 {} +
    find /usr/lib/python3/dist-packages/vcf_sdk -type f -exec chmod 644 {} +
  become: true
  changed_when: true

- name: "vcf_sdk | Verify vcf_sdk is importable"
  ansible.builtin.command:
    cmd: python3 -c "from vcf_sdk import SDDCManager, CloudBuilder; print('vcf_sdk OK')"
  changed_when: false
