---
# Phase 1 — Jumpbox configuration
# The jumpbox is the single gateway for the entire nested lab. It provides:
#   - Inter-VLAN routing via VLAN sub-interfaces on ens192
#   - DNS (dnsmasq) for lab.dreamfold.dev with DHCP reservations for ESXi hosts
#   - NTP (chrony) — all VCF components sync time from the jumpbox
#   - CA (step-ca) — internal TLS certificates for all lab components
#   - NAT/masquerade — outbound internet for nested hosts via the public NIC
#   - BGP (FRR) — peers with NSX Tier-0 for VKS pod/service route exchange
#   - RDP (xrdp + XFCE) — remote desktop access for managing web UIs

# systemd-resolved binds port 53, preventing dnsmasq from starting.
# Disable it and point resolv.conf at upstream DNS so apt works.
- name: Disable systemd-resolved
  become: true
  ansible.builtin.service:
    name: systemd-resolved
    state: stopped
    enabled: false

- name: Configure resolv.conf for upstream DNS
  become: true
  ansible.builtin.copy:
    content: |
      nameserver {{ jumpbox_upstream_dns[0] }}
    dest: /etc/resolv.conf
    owner: root
    group: root
    mode: "0644"

- name: Install required packages
  become: true
  ansible.builtin.apt:
    name: "{{ jumpbox_packages }}"
    state: present
    update_cache: true

# Netplan configures the public NIC (ens160, DHCP) and six VLAN sub-interfaces
# on ens192 for management, vMotion, vSAN, host overlay, edge overlay, and
# edge uplink networks. MTU 9000 on storage/overlay VLANs.
- name: Deploy netplan configuration
  become: true
  ansible.builtin.template:
    src: 01-lab.yaml.j2
    dest: /etc/netplan/01-lab.yaml
    owner: root
    group: root
    mode: "0600"
  notify: apply netplan

# dnsmasq provides forward/reverse DNS for all lab hosts and DHCP on VLAN 10
# with static MAC→IP reservations. ESXi hosts PXE/DHCP boot and receive their
# management IP based on the MAC address assigned by vCD.
- name: Deploy dnsmasq configuration
  become: true
  ansible.builtin.template:
    src: lab.conf.j2
    dest: /etc/dnsmasq.d/lab.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart dnsmasq

# chrony serves NTP to all lab components. VCF bringup validates time sync
# across all ESXi hosts — clock skew >1s causes validation failure.
- name: Deploy chrony configuration
  become: true
  ansible.builtin.template:
    src: chrony.conf.j2
    dest: /etc/chrony/chrony.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart chrony

- name: Enable and start dnsmasq
  become: true
  ansible.builtin.service:
    name: dnsmasq
    state: started
    enabled: true

- name: Enable and start chrony
  become: true
  ansible.builtin.service:
    name: chrony
    state: started
    enabled: true

- name: Enable and start xrdp
  become: true
  ansible.builtin.service:
    name: xrdp
    state: started
    enabled: true

# IP masquerading allows nested hosts (10.0.0.0/16) to reach the internet
# via the jumpbox's public NIC. Required for VCF depot sync, content library
# updates, and VKS image pulls.
- name: Enable IP forwarding
  become: true
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_file: /etc/sysctl.d/99-lab-forwarding.conf
    reload: true
    state: present

- name: Add iptables masquerade rule
  become: true
  ansible.builtin.iptables:
    table: nat
    chain: POSTROUTING
    source: "{{ jumpbox_lab_network }}"
    out_interface: "{{ jumpbox_public_nic }}"
    jump: MASQUERADE
    state: present
  notify: save iptables

# FRR BGP peers with the NSX Tier-0 gateway on the edge uplink VLAN (60).
# The jumpbox advertises infrastructure routes; NSX advertises VKS pod/service
# CIDRs back. This enables pod-to-external and external-to-pod connectivity.
- name: Deploy FRR daemons configuration
  become: true
  ansible.builtin.template:
    src: daemons.j2
    dest: /etc/frr/daemons
    owner: frr
    group: frr
    mode: "0640"
  notify: restart frr

- name: Deploy FRR zebra configuration
  become: true
  ansible.builtin.template:
    src: zebra.conf.j2
    dest: /etc/frr/zebra.conf
    owner: frr
    group: frr
    mode: "0640"
  notify: restart frr

- name: Deploy FRR BGP configuration
  become: true
  ansible.builtin.template:
    src: bgpd.conf.j2
    dest: /etc/frr/bgpd.conf
    owner: frr
    group: frr
    mode: "0640"
  notify: restart frr

- name: Enable and start FRR
  become: true
  ansible.builtin.service:
    name: frr
    state: started
    enabled: true

# step-ca provides an internal CA with ACME support. TLS certificates for
# Keycloak and other lab services are issued from this CA. The root cert
# is distributed to ESXi hosts in Phase 2 (esxi_prepare role).
- name: Add Smallstep apt repository key
  become: true
  ansible.builtin.get_url:
    url: https://packages.smallstep.com/keys/smallstep-release-signing-key.asc
    dest: /etc/apt/keyrings/smallstep.asc
    mode: "0644"

- name: Add Smallstep apt repository
  become: true
  ansible.builtin.apt_repository:
    repo: "deb [signed-by=/etc/apt/keyrings/smallstep.asc] https://packages.smallstep.com/deb/{{ ansible_distribution | lower }} {{ ansible_distribution_release }}"
    filename: smallstep
    state: present

- name: Install Smallstep packages
  become: true
  ansible.builtin.apt:
    name: "{{ jumpbox_step_packages }}"
    state: present
    update_cache: true

- name: Initialise step-ca
  become: true
  ansible.builtin.shell: >
    step ca init
    --name="VKS Lab CA"
    --dns="{{ jumpbox_ip }}"
    --address=":443"
    --provisioner="lab-admin"
    --password-file=/dev/stdin <<< "{{ lookup('ansible.builtin.password', '/dev/null', length=32) }}"
  args:
    creates: /root/.step/config/ca.json

- name: Export root CA certificate
  ansible.builtin.shell: step ca root {{ ca_cert_path }}
  args:
    creates: "{{ ca_cert_path }}"
