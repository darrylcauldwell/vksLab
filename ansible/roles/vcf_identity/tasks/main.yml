---
# Phase 5 — VCF Identity Broker OIDC (Keycloak Configuration)
#
# Step 1: Configure Keycloak (realm, groups, users, OIDC client)
#   Delegates to gateway where Keycloak runs (deployed in Phase 1).
# Step 2: Configure VCF Identity Broker with Keycloak OIDC
#   Uses VCF Operations internal APIs from localhost via SOCKS proxy.

# --- Ensure vcf_sdk is available ---

- name: Ensure vcf_sdk is available
  ansible.builtin.include_tasks: ../../common/tasks/ensure_vcf_sdk.yml
  when: inventory_hostname != 'localhost'

# --- Ensure DNS ---

- name: Ensure DNS for Identity Broker
  ansible.builtin.include_tasks: ../../common/tasks/ensure_dns.yml
  vars:
    dns_records:
      - { hostname: vcf-ops, ip: "{{ host_ip['vcf-ops'] }}" }
      - { hostname: gateway, ip: "{{ host_ip['gateway'] }}" }

# --- Step 1: Configure Keycloak on gateway ---

- name: Create Keycloak lab realm
  community.general.keycloak_realm:
    auth_keycloak_url: "https://{{ keycloak_hostname }}:{{ keycloak_port }}"
    auth_realm: master
    auth_username: admin
    auth_password: "{{ keycloak_admin_password }}"
    validate_certs: false
    realm: "{{ keycloak_realm }}"
    enabled: true
    display_name: VKS Lab
    state: present
  delegate_to: gateway
  vars:
    ansible_connection: ssh

- name: Create Keycloak groups
  community.general.keycloak_group:
    auth_keycloak_url: "https://{{ keycloak_hostname }}:{{ keycloak_port }}"
    auth_realm: master
    auth_username: admin
    auth_password: "{{ keycloak_admin_password }}"
    validate_certs: false
    realm: "{{ keycloak_realm }}"
    name: "{{ item.name }}"
    state: present
  loop: "{{ keycloak_groups }}"
  delegate_to: gateway
  vars:
    ansible_connection: ssh

- name: Create Keycloak users
  community.general.keycloak_user:
    auth_keycloak_url: "https://{{ keycloak_hostname }}:{{ keycloak_port }}"
    auth_realm: master
    auth_username: admin
    auth_password: "{{ keycloak_admin_password }}"
    validate_certs: false
    realm: "{{ keycloak_realm }}"
    username: "{{ item.username }}"
    enabled: true
    credentials:
      - type: password
        value: "{{ item.password }}"
        temporary: false
    groups: "{{ item.groups }}"
    state: present
  loop: "{{ keycloak_users }}"
  no_log: true
  delegate_to: gateway
  vars:
    ansible_connection: ssh

- name: Create VCF Identity Broker OIDC client
  community.general.keycloak_client:
    auth_keycloak_url: "https://{{ keycloak_hostname }}:{{ keycloak_port }}"
    auth_realm: master
    auth_username: admin
    auth_password: "{{ keycloak_admin_password }}"
    validate_certs: false
    realm: "{{ keycloak_realm }}"
    client_id: "{{ vcf_oidc_client_id }}"
    name: VCF Identity Broker
    secret: "{{ vcf_oidc_client_secret }}"
    enabled: true
    protocol: openid-connect
    public_client: false
    standard_flow_enabled: true
    protocol_mappers:
      - name: group-membership
        protocol: openid-connect
        protocolMapper: oidc-group-membership-mapper
        config:
          claim.name: groups
          full.path: "false"
          id.token.claim: "true"
          access.token.claim: "true"
          userinfo.token.claim: "true"
    state: present
  delegate_to: gateway
  vars:
    ansible_connection: ssh

- name: Display Keycloak configuration complete
  ansible.builtin.debug:
    msg: "Keycloak configured: realm={{ keycloak_realm }}, users={{ keycloak_users | map(attribute='username') | list }}, client={{ vcf_oidc_client_id }}"

# --- Step 2: Configure VCF Identity Broker ---

- name: Fetch step-ca root certificate from gateway
  ansible.builtin.fetch:
    src: /etc/step-ca/certs/root_ca.crt
    dest: /tmp/lab-root-ca.crt
    flat: true
  delegate_to: gateway
  vars:
    ansible_connection: ssh

- name: Configure VCF Identity Broker with Keycloak OIDC
  ansible.builtin.command:
    cmd: "python3 {{ role_path }}/files/configure_oidc.py"
  environment:
    VCF_OPS_FQDN: "{{ vcf_ops_hostname }}"
    VCF_OPS_USERNAME: "{{ vcf_ops_username }}"
    VCF_OPS_PASSWORD: "{{ vcf_ops_password }}"
    VCF_SSO_MODEL: "{{ vcf_sso_model }}"
    VCF_AUTO_DEPLOYED: "{{ vcf_automation_deployed | string | lower }}"
    OIDC_LABEL: "{{ vcf_oidc_label }}"
    OIDC_DISCOVERY_URL: "{{ vcf_oidc_discovery_url }}"
    OIDC_CLIENT_ID: "{{ vcf_oidc_client_id }}"
    OIDC_CLIENT_SECRET: "{{ vcf_oidc_client_secret }}"
    OIDC_DOMAIN: "{{ vcf_oidc_domain }}"
    OIDC_JIT_GROUP: "{{ vcf_oidc_jit_group }}"
    OIDC_GROUP_ATTR: "{{ vcf_oidc_group_attr }}"
    OIDC_CERT_PATH: "{{ vcf_oidc_cert_path }}"
  register: oidc_result

- name: Display OIDC configuration result
  ansible.builtin.debug:
    msg: "{{ oidc_result.stdout_lines }}"
