---
# Phase 5 — VCF Identity Broker
#
# The initial OIDC provider registration (connecting Keycloak to the
# VCF Identity Broker) is a manual step via the SDDC Manager UI.
# The Identity Broker API only supports OAuth2 client management
# and SCIM user provisioning — not initial provider setup.
#
# Manual step (see deliver.md §7.3):
#   SDDC Manager → Administration → Single Sign-On → Identity Providers
#   → Add Identity Provider → OpenID Connect
#   Discovery endpoint: https://gateway.{{ lab_domain }}:8443/realms/lab/.well-known/openid-configuration
#   Client ID: vcf-identity-broker
#   Client secret: from 1Password (Keycloak Admin)

- name: Identity Broker OIDC configuration reminder
  ansible.builtin.debug:
    msg: >
      Identity Broker OIDC provider registration is a manual step.
      See deliver.md §7.3 for instructions.
      Discovery endpoint: https://gateway.{{ lab_domain }}:8443/realms/{{ keycloak_realm }}/.well-known/openid-configuration
      Client ID: vcf-identity-broker
