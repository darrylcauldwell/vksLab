---
# ESXi host preparation — hostname, DNS, NTP, password, vSAN ESA, CA cert

- name: Set hostname and FQDN
  ansible.builtin.shell: >
    esxcli system hostname set
    --host={{ inventory_hostname }}
    --fqdn={{ inventory_hostname }}.{{ esxi_domain }}
    --domain={{ esxi_domain }}
  register: hostname_result
  changed_when: hostname_result.rc == 0

- name: Configure DNS server
  ansible.builtin.shell: >
    esxcli network ip dns server add --server={{ esxi_dns_server }}
  register: dns_result
  changed_when: dns_result.rc == 0
  failed_when:
    - dns_result.rc != 0
    - "'already exists' not in (dns_result.stderr | default(''))"

- name: Configure DNS search domain
  ansible.builtin.shell: >
    esxcli network ip dns search add --domain={{ esxi_domain }}
  register: dns_search_result
  changed_when: dns_search_result.rc == 0
  failed_when:
    - dns_search_result.rc != 0
    - "'already exists' not in (dns_search_result.stderr | default(''))"

- name: Configure NTP servers
  ansible.builtin.shell: >
    esxcli system ntp set --server={{ esxi_ntp_servers | join(',') }}
  register: ntp_result
  changed_when: ntp_result.rc == 0

- name: Enable NTP service
  ansible.builtin.shell: >
    esxcli system ntp set --enabled=true
  register: ntp_enable_result
  changed_when: ntp_enable_result.rc == 0

- name: Set root password
  ansible.builtin.shell: >
    echo 'root:{{ ansible_password }}' | chpasswd
  no_log: true
  changed_when: true

- name: Enable FakeSCSIReservations for nested vSAN
  ansible.builtin.shell: >
    esxcli system settings advanced set -o /VSAN/FakeSCSIReservations -i 1
  register: scsi_result
  changed_when: scsi_result.rc == 0

- name: Discover non-boot NVMe storage devices
  ansible.builtin.shell: |
    esxcli storage core device list | awk '
      /^[^ \t]/ { id=$0 }
      /Display Name/ { name=$0; sub(/.*: /,"",name) }
      /Is SSD/ { ssd=$0; sub(/.*: /,"",ssd) }
      /Is Boot Device/ { boot=$0; sub(/.*: /,"",boot);
        if (boot == "false" && ssd == "false" && name ~ /NVMe/) print id
      }
    '
  register: nvme_devices
  changed_when: false

- name: Mark NVMe devices as SSD
  ansible.builtin.shell: >
    esxcli storage hpp device set -d {{ item }} -M true
  loop: "{{ nvme_devices.stdout_lines }}"
  when: nvme_devices.stdout_lines | length > 0
  register: ssd_result
  changed_when: ssd_result.rc == 0

- name: Enable vSAN firewall rulesets
  ansible.builtin.shell: >
    esxcli network firewall ruleset set -e true -r {{ item }}
  loop: "{{ esxi_vsan_firewall_rulesets }}"
  register: fw_result
  changed_when: fw_result.rc == 0

- name: Upload CA root certificate
  ansible.builtin.copy:
    src: "{{ esxi_ca_cert_path }}"
    dest: /tmp/lab-root-ca.crt
    mode: "0644"
  when: esxi_ca_cert_path is defined and esxi_ca_cert_path | length > 0

- name: Import CA root certificate
  ansible.builtin.shell: >
    esxcli security cert import --cert-file /tmp/lab-root-ca.crt
  register: cert_result
  changed_when: cert_result.rc == 0
  when: esxi_ca_cert_path is defined and esxi_ca_cert_path | length > 0

- name: Verify connectivity to gateway
  ansible.builtin.shell: >
    vmkping -I vmk0 {{ esxi_gateway }} -c 3
  register: ping_gw
  changed_when: false
  failed_when: ping_gw.rc != 0

- name: Verify connectivity to DNS server
  ansible.builtin.shell: >
    vmkping -I vmk0 {{ esxi_dns_server }} -c 3
  register: ping_dns
  changed_when: false
  failed_when: ping_dns.rc != 0
