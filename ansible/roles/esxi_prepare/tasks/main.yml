---
# ESXi host preparation — storage, CA certificate, and validation
#
# Prerequisites:
#   - Phase 2 gateway-delegated plays have already run: bootstrap password,
#     identity (hostname, SSL cert, hostd restart), and configure
#     (vmk0 static, DNS, NTP, SSH/Shell, lockdown, CEIP).
#   - SSH is stable — networking and service changes ran via sshpass
#     from the gateway to avoid ProxyJump connection disruption.

# --- Pre-flight: ensure hostd is responsive ---
- name: Verify hostd is ready
  ansible.builtin.shell: >
    vim-cmd hostsvc/hostsummary > /dev/null 2>&1
  register: hostd_gate
  until: hostd_gate.rc == 0
  retries: 15
  delay: 5
  changed_when: false

# --- Storage preparation ---
#
# Each host has 3 NVMe devices:
#   - 64 GB boot (OSDATA — fully consumed, no VMFS)
#   - 256 GB local datastore (VMFS — for VCF Installer OVA on esxi-01, general use)
#   - 2,048 GB vSAN ESA storage pool
#
# The discovery below identifies non-boot NVMe devices by size:
#   - Smallest non-boot NVMe → local VMFS datastore
#   - Largest non-boot NVMe → vSAN (marked as SSD)

- name: Rescan storage adapters
  ansible.builtin.shell: >
    esxcli storage core adapter rescan --all
  changed_when: true

- name: Enable FakeSCSIReservations for nested vSAN
  ansible.builtin.shell: >
    esxcli system settings advanced set -o /VSAN/FakeSCSIReservations -i 1
  register: scsi_result
  changed_when: scsi_result.rc == 0

- name: Discover non-boot NVMe devices
  ansible.builtin.shell: |
    esxcli storage core device list | awk '
    /^[^[:space:]]/ {
      if (id && boot == "false" && vendor ~ /NVMe/)
        print id "|" size
      id = $0; sub(/:$/, "", id); gsub(/[[:space:]]/, "", id)
      boot = ""; vendor = ""; size = 0
    }
    /^[[:space:]]*Is Boot Device:/ { boot = $NF }
    /^[[:space:]]*Vendor:/ { vendor = $NF }
    /^[[:space:]]*Size:/ && !/Queue/ && !/Sample/ { size = $NF + 0 }
    END {
      if (id && boot == "false" && vendor ~ /NVMe/)
        print id "|" size
    }' | sort -t'|' -k2 -n
  register: nvme_raw
  changed_when: false

- name: Parse NVMe device list
  ansible.builtin.set_fact:
    nvme_sorted: >-
      [{% for line in nvme_raw.stdout_lines %}
      {"id": "{{ line.split('|')[0] }}", "size": {{ line.split('|')[1] }}}
      {{ "," if not loop.last else "" }}
      {% endfor %}]

- name: Display discovered NVMe devices
  ansible.builtin.debug:
    msg: "{{ nvme_sorted }}"

- name: Set local datastore device (smallest non-boot NVMe)
  ansible.builtin.set_fact:
    local_datastore_device: "{{ nvme_sorted[0].id }}"
  when: nvme_sorted | length >= 2

- name: Verify local datastore device was found
  ansible.builtin.assert:
    that: local_datastore_device is defined
    fail_msg: >-
      No local datastore device found. Expected at least 2 non-boot NVMe
      devices (1 for local VMFS, 1 for vSAN). Found: {{ nvme_sorted }}
    success_msg: "Local datastore device: {{ local_datastore_device }}"

- name: Check if local datastore already exists
  ansible.builtin.shell: >
    esxcli storage filesystem list | grep -q datastore1 && echo "exists" || echo "missing"
  register: datastore_check
  changed_when: false

- name: Check for unmounted datastore1 volume
  ansible.builtin.shell: >
    esxcfg-volume -l 2>/dev/null | grep -q datastore1 && echo "found" || echo "not_found"
  register: unmounted_check
  changed_when: false
  when: "'missing' in datastore_check.stdout"

- name: Persistently mount existing datastore1 volume
  ansible.builtin.shell: >
    esxcfg-volume -M datastore1
  when:
    - "'missing' in datastore_check.stdout"
    - unmounted_check.stdout | default('') == 'found'
  changed_when: true

- name: Verify disk path exists
  ansible.builtin.shell: >
    ls -la /vmfs/devices/disks/{{ local_datastore_device }}
  when: local_datastore_device is defined
  changed_when: false

- name: Create VMFS datastore on local NVMe
  ansible.builtin.shell: |
    # Get the partition path for the device
    DISK="/vmfs/devices/disks/{{ local_datastore_device }}"
    # Create a new GPT partition table and VMFS-6 datastore
    partedUtil mklabel "$DISK" gpt
    # getUsableSectors returns "firstSector lastSector" — reliable for NVMe
    END_SECTOR=$(partedUtil getUsableSectors "$DISK" | awk '{print $2}')
    partedUtil setptbl "$DISK" gpt "1 2048 $END_SECTOR AA31E02A400F11DB9590000C2911D1B8 0"
    vmkfstools -C vmfs6 -S datastore1 "${DISK}:1"
  when:
    - local_datastore_device is defined
    - "'missing' in datastore_check.stdout"
    - unmounted_check.stdout | default('') != 'found'
  changed_when: true

# --- CA certificate and host TLS cert ---
# Import step-ca root CA into trust store, then issue a proper
# host certificate signed by step-ca (replaces ESXi self-signed cert).

- name: Upload CA root certificate
  ansible.builtin.shell: |
    cat > /tmp/lab-root-ca.crt << 'CERT'
    {{ lookup('file', esxi_ca_cert_path) }}
    CERT
    chmod 644 /tmp/lab-root-ca.crt
  when: esxi_ca_cert_path is defined and esxi_ca_cert_path | length > 0
  changed_when: true

- name: Import CA root certificate into ESXi trust store
  ansible.builtin.shell: |
    if ! grep -q "VKS Lab CA" /etc/vmware/ssl/castore.pem 2>/dev/null; then
      cat /tmp/lab-root-ca.crt >> /etc/vmware/ssl/castore.pem
      echo "imported"
    else
      echo "already_present"
    fi
  register: cert_result
  changed_when: "'imported' in cert_result.stdout"
  when: esxi_ca_cert_path is defined and esxi_ca_cert_path | length > 0

- name: Verify CA certificate was imported correctly
  ansible.builtin.shell: >
    openssl x509 -noout -subject -in /tmp/lab-root-ca.crt
  register: cert_verify
  changed_when: false
  failed_when: cert_verify.rc != 0
  when: esxi_ca_cert_path is defined and esxi_ca_cert_path | length > 0

- name: Check if host cert is already signed by step-ca
  ansible.builtin.shell: >
    openssl x509 -noout -issuer -in /etc/vmware/ssl/rui.crt 2>/dev/null | grep -q "step-ca" && echo "step-ca" || echo "self-signed"
  register: cert_issuer
  changed_when: false

- name: Generate CSR for ESXi host
  ansible.builtin.shell: |
    openssl req -new \
      -key /etc/vmware/ssl/rui.key \
      -out /tmp/esxi-host.csr \
      -subj "/CN={{ inventory_hostname }}.{{ lab_domain }}" \
      -addext "subjectAltName=DNS:{{ inventory_hostname }}.{{ lab_domain }},IP:{{ ansible_host }}"
    cat /tmp/esxi-host.csr
  register: esxi_csr
  changed_when: false
  when: cert_issuer.stdout == 'self-signed'

- name: Sign ESXi CSR with step-ca on gateway
  ansible.builtin.shell: |
    cat > /tmp/esxi-{{ inventory_hostname }}.csr << 'CSREOF'
    {{ esxi_csr.stdout }}
    CSREOF
    step ca sign \
      /tmp/esxi-{{ inventory_hostname }}.csr \
      /tmp/esxi-{{ inventory_hostname }}.crt \
      --ca-url https://127.0.0.1:443 \
      --root {{ ca_cert_path }} \
      --provisioner lab-admin \
      --provisioner-password-file /root/.step-ca-password \
      --not-after 8760h
    cat /tmp/esxi-{{ inventory_hostname }}.crt
  delegate_to: gateway
  become: true
  register: signed_cert
  when: cert_issuer.stdout == 'self-signed'

- name: Install signed certificate on ESXi host
  ansible.builtin.shell: |
    cat > /etc/vmware/ssl/rui.crt << 'CERTEOF'
    {{ signed_cert.stdout }}
    CERTEOF
    /etc/init.d/hostd restart
    /etc/init.d/vpxa restart
  when: cert_issuer.stdout == 'self-signed'
  changed_when: true

# --- Validation ---

- name: Verify connectivity to gateway
  ansible.builtin.shell: >
    vmkping -I vmk0 {{ esxi_gateway }} -c 3
  register: ping_gw
  changed_when: false
  failed_when: ping_gw.rc != 0

- name: Verify connectivity to DNS server
  ansible.builtin.shell: >
    vmkping -I vmk0 {{ esxi_dns_server }} -c 3
  register: ping_dns
  changed_when: false
  failed_when: ping_dns.rc != 0

- name: Verify hostname matches SSL certificate CN
  ansible.builtin.shell: >
    openssl x509 -in /etc/vmware/ssl/rui.crt -noout -subject | grep -q {{ inventory_hostname }}.{{ esxi_domain }}
  register: cert_cn_check
  changed_when: false
  failed_when: cert_cn_check.rc != 0

- name: Verify unique system UUID
  ansible.builtin.shell: >
    esxcli system uuid get
  register: final_uuid
  changed_when: false
  failed_when: final_uuid.stdout | length == 0
