---
# ESXi host preparation — configure for VCF bringup
#
# Prerequisites:
#   - Reset System Configuration (§4.3) has already cleared stale template
#     state (hostname, UUID, MAC mapping, root password).
#   - Phase 1b MAC discovery has assigned static IPs.
#   - Phase 2 bootstrap play has set the root password.

# --- Identity ---

- name: Set hostname and FQDN
  ansible.builtin.shell: >
    esxcli system hostname set
    --host={{ inventory_hostname }}
    --fqdn={{ inventory_hostname }}.{{ esxi_domain }}
    --domain={{ esxi_domain }}
  register: hostname_result
  changed_when: hostname_result.rc == 0

# Regenerate SSL certificate so CN matches the new FQDN.
# All clones share the template's cert — VCF validates CN == FQDN.
- name: Regenerate host SSL certificate
  ansible.builtin.shell: >
    /sbin/generate-certificates
  changed_when: true

- name: Restart hostd to pick up new certificate
  ansible.builtin.shell: >
    /etc/init.d/hostd restart && /etc/init.d/vpxa restart
  changed_when: true

# Brief pause for hostd to finish restarting
- name: Wait for hostd to be ready
  ansible.builtin.shell: >
    vim-cmd hostsvc/hostsummary > /dev/null 2>&1
  register: hostd_ready
  until: hostd_ready.rc == 0
  retries: 15
  delay: 5
  changed_when: false

# --- DNS ---

# Remove any DNS servers inherited from the template before adding ours
- name: Get current DNS servers
  ansible.builtin.shell: >
    esxcli network ip dns server list | awk '/^[0-9]/ {print $1}'
  register: current_dns
  changed_when: false

- name: Remove stale DNS servers
  ansible.builtin.shell: >
    esxcli network ip dns server remove --server={{ item }}
  loop: "{{ current_dns.stdout_lines }}"
  when: item != esxi_dns_server
  register: dns_remove
  changed_when: dns_remove.rc == 0
  failed_when: false

- name: Configure DNS server
  ansible.builtin.shell: >
    esxcli network ip dns server add --server={{ esxi_dns_server }}
  register: dns_result
  changed_when: dns_result.rc == 0
  failed_when:
    - dns_result.rc != 0
    - "'already exists' not in (dns_result.stderr | default(''))"

# Remove stale search domains inherited from template
- name: Get current DNS search domains
  ansible.builtin.shell: >
    esxcli network ip dns search list | awk '/^[a-zA-Z]/ && !/DNSSearch/ {print $1}'
  register: current_search
  changed_when: false

- name: Remove stale DNS search domains
  ansible.builtin.shell: >
    esxcli network ip dns search remove --domain={{ item }}
  loop: "{{ current_search.stdout_lines }}"
  when: item != esxi_domain
  register: search_remove
  changed_when: search_remove.rc == 0
  failed_when: false

- name: Configure DNS search domain
  ansible.builtin.shell: >
    esxcli network ip dns search add --domain={{ esxi_domain }}
  register: dns_search_result
  changed_when: dns_search_result.rc == 0
  failed_when:
    - dns_search_result.rc != 0
    - "'already exists' not in (dns_search_result.stderr | default(''))"

# --- Network ---

# Set default gateway on management network
- name: Configure default gateway
  ansible.builtin.shell: >
    esxcfg-route {{ esxi_gateway }}
  register: gw_result
  changed_when: gw_result.rc == 0

# --- Time ---

- name: Configure NTP servers
  ansible.builtin.shell: >
    esxcli system ntp set --server={{ esxi_ntp_servers | join(',') }}
  register: ntp_result
  changed_when: ntp_result.rc == 0

- name: Enable NTP service
  ansible.builtin.shell: >
    esxcli system ntp set --enabled=true
  register: ntp_enable_result
  changed_when: ntp_enable_result.rc == 0

# --- Services and security ---

# SSH must auto-start — VCF Installer requires it, not just current session
- name: Enable SSH service auto-start
  ansible.builtin.shell: >
    vim-cmd hostsvc/enable_ssh
  register: ssh_enable
  changed_when: true
  failed_when: false

- name: Start SSH service
  ansible.builtin.shell: >
    vim-cmd hostsvc/start_ssh
  register: ssh_start
  changed_when: true
  failed_when: false

- name: Enable ESXi Shell service
  ansible.builtin.shell: >
    vim-cmd hostsvc/enable_esx_shell
  register: shell_enable
  changed_when: true
  failed_when: false

# Prevent SSH/Shell timeouts during long VCF operations
- name: Disable shell interactive timeout
  ansible.builtin.shell: >
    esxcli system settings advanced set -o /UserVars/ESXiShellInteractiveTimeOut -i 0
  changed_when: true

- name: Disable shell timeout
  ansible.builtin.shell: >
    esxcli system settings advanced set -o /UserVars/ESXiShellTimeOut -i 0
  changed_when: true

# Ensure lockdown mode is off — blocks SSH and API access
- name: Disable lockdown mode
  ansible.builtin.shell: >
    vim-cmd hostsvc/advopt/update Config.HostAgent.plugins.hostsvc.esxAdminsGroup string ""
  changed_when: true
  failed_when: false

# Opt out of CEIP — no phone-home from nested lab
- name: Disable CEIP
  ansible.builtin.shell: >
    esxcli system settings advanced set -o /UserVars/HostClientCEIPOptIn -i 2
  changed_when: true

# --- vSAN preparation ---

- name: Enable FakeSCSIReservations for nested vSAN
  ansible.builtin.shell: >
    esxcli system settings advanced set -o /VSAN/FakeSCSIReservations -i 1
  register: scsi_result
  changed_when: scsi_result.rc == 0

- name: Discover non-boot NVMe storage devices
  ansible.builtin.shell: |
    esxcli storage core device list | awk '
      /^[^ \t]/ { id=$0 }
      /Display Name/ { name=$0; sub(/.*: /,"",name) }
      /Is SSD/ { ssd=$0; sub(/.*: /,"",ssd) }
      /Is Boot Device/ { boot=$0; sub(/.*: /,"",boot);
        if (boot == "false" && ssd == "false" && name ~ /NVMe/) print id
      }
    '
  register: nvme_devices
  changed_when: false

- name: Mark NVMe devices as SSD
  ansible.builtin.shell: >
    esxcli storage hpp device set -d {{ item }} -M true
  loop: "{{ nvme_devices.stdout_lines }}"
  when: nvme_devices.stdout_lines | length > 0
  register: ssd_result
  changed_when: ssd_result.rc == 0

- name: Enable vSAN firewall rulesets
  ansible.builtin.shell: >
    esxcli network firewall ruleset set -e true -r {{ item }}
  loop: "{{ esxi_vsan_firewall_rulesets }}"
  register: fw_result
  changed_when: fw_result.rc == 0

# --- CA certificate ---

- name: Upload CA root certificate
  ansible.builtin.copy:
    src: "{{ esxi_ca_cert_path }}"
    dest: /tmp/lab-root-ca.crt
    mode: "0644"
  when: esxi_ca_cert_path is defined and esxi_ca_cert_path | length > 0

- name: Import CA root certificate
  ansible.builtin.shell: >
    esxcli security cert import --cert-file /tmp/lab-root-ca.crt
  register: cert_result
  changed_when: cert_result.rc == 0
  when: esxi_ca_cert_path is defined and esxi_ca_cert_path | length > 0

# --- Validation ---

- name: Verify connectivity to gateway
  ansible.builtin.shell: >
    vmkping -I vmk0 {{ esxi_gateway }} -c 3
  register: ping_gw
  changed_when: false
  failed_when: ping_gw.rc != 0

- name: Verify connectivity to DNS server
  ansible.builtin.shell: >
    vmkping -I vmk0 {{ esxi_dns_server }} -c 3
  register: ping_dns
  changed_when: false
  failed_when: ping_dns.rc != 0

- name: Verify hostname matches SSL certificate CN
  ansible.builtin.shell: >
    openssl x509 -in /etc/vmware/ssl/rui.crt -noout -subject | grep -q {{ inventory_hostname }}.{{ esxi_domain }}
  register: cert_cn_check
  changed_when: false
  failed_when: cert_cn_check.rc != 0

- name: Verify unique system UUID
  ansible.builtin.shell: >
    esxcli system uuid get
  register: final_uuid
  changed_when: false
  failed_when: final_uuid.stdout | length == 0
