keycloak_image: quay.io/keycloak/keycloak:latest
keycloak_container_name: keycloak
keycloak_port: 8443
keycloak_hostname: "gateway.{{ lab_domain }}"
keycloak_realm: lab
keycloak_cert_path: /etc/step-ca/certs/keycloak.crt
keycloak_key_path: /etc/step-ca/certs/keycloak.key

keycloak_users:
  - username: lab-admin
    role: admin
  - username: lab-operator
    role: viewer

keycloak_oidc_clients:
  - client_id: vcf-identity-broker
    name: VCF Identity Broker
    secret: "{{ keycloak_admin_password }}"
