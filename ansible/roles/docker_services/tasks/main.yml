---
# Phase 1 — Docker services on gateway
# Keycloak is the external OIDC identity provider. It integrates with the
# VCF Identity Broker, which in turn unifies logons for vCenter and NSX Manager.
#
# Tags:
#   keycloak — all Keycloak tasks (Docker, container, realm, users, OIDC clients)

- name: Install Docker Engine
  become: true
  ansible.builtin.apt:
    name: docker.io
    state: present
    update_cache: true
  tags: keycloak

- name: Ensure Docker service is running
  become: true
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true
  tags: keycloak

- name: Add ubuntu user to docker group
  become: true
  ansible.builtin.user:
    name: ubuntu
    groups: docker
    append: true
  tags: keycloak

# --- Keycloak TLS certificate ---
# Issued from step-ca (configured by gateway role). Keycloak serves HTTPS
# on port 8443 — vCenter and NSX Manager connect to its OIDC endpoints.

- name: Create certificate directory
  become: true
  ansible.builtin.file:
    path: /etc/step-ca/certs
    state: directory
    mode: "0755"
  tags: keycloak

- name: Issue Keycloak TLS certificate from step-ca
  become: true
  ansible.builtin.command:
    cmd: >
      step ca certificate {{ keycloak_hostname }}
      {{ keycloak_cert_path }} {{ keycloak_key_path }}
      --san {{ keycloak_hostname }}
      --not-after 8760h
      --force
      --ca-url https://127.0.0.1:443
      --root {{ ca_cert_path }}
      --provisioner lab-admin
      --provisioner-password-file /root/.step-ca-password
    creates: "{{ keycloak_cert_path }}"
  tags: keycloak

- name: Make certificate files readable by Keycloak container (UID 1000)
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    mode: "0644"
  loop:
    - "{{ keycloak_cert_path }}"
    - "{{ keycloak_key_path }}"
  tags: keycloak

# --- Keycloak container ---
# Runs with HTTPS on port 8443, data persisted in a Docker volume.
# Admin password is injected from 1Password at runtime.
# Uses docker CLI to avoid dependency on Python docker library.

- name: Check if Keycloak container exists
  become: true
  ansible.builtin.command: docker inspect keycloak
  register: kc_inspect
  failed_when: false
  changed_when: false
  tags: keycloak

- name: Run Keycloak container
  become: true
  ansible.builtin.shell: >
    docker run -d
    --name {{ keycloak_container_name }}
    --restart unless-stopped
    -p {{ keycloak_port }}:8443
    -e KC_BOOTSTRAP_ADMIN_USERNAME=admin
    -e KC_BOOTSTRAP_ADMIN_PASSWORD='{{ keycloak_admin_password }}'
    -e KC_HOSTNAME={{ keycloak_hostname }}
    -e KC_HTTPS_CERTIFICATE_FILE=/opt/keycloak/conf/server.crt
    -e KC_HTTPS_CERTIFICATE_KEY_FILE=/opt/keycloak/conf/server.key
    -v {{ keycloak_cert_path }}:/opt/keycloak/conf/server.crt:ro
    -v {{ keycloak_key_path }}:/opt/keycloak/conf/server.key:ro
    -v keycloak-data:/opt/keycloak/data
    {{ keycloak_image }} start
  when: kc_inspect.rc != 0
  no_log: true
  tags: keycloak

- name: Ensure Keycloak container is running
  become: true
  ansible.builtin.command: docker start {{ keycloak_container_name }}
  register: kc_start
  changed_when: "'already started' not in kc_start.stderr"
  failed_when: false
  when: kc_inspect.rc == 0
  tags: keycloak

- name: Wait for Keycloak to be ready
  ansible.builtin.uri:
    url: "https://127.0.0.1:{{ keycloak_port }}/realms/master"
    validate_certs: false
    status_code: [200]
  register: kc_health
  until: kc_health.status == 200
  retries: 60
  delay: 5
  tags: keycloak

# Keycloak realm, users, groups, and OIDC client configuration is done
# in Phase 5 (vcf_identity role) — right before the Identity Broker
# needs it. This keeps Phase 1 focused on infrastructure services.
  loop: "{{ keycloak_oidc_clients }}"
  no_log: true
  tags: keycloak
