---
# Phase 1 — Docker services on jumpbox
# Keycloak provides centralised OIDC identity for vCenter and NSX Manager,
# replacing per-component local authentication with SSO.

- name: Install Docker Engine
  become: true
  ansible.builtin.apt:
    name: docker.io
    state: present
    update_cache: true

- name: Ensure Docker service is running
  become: true
  ansible.builtin.service:
    name: docker
    state: started
    enabled: true

- name: Add ubuntu user to docker group
  become: true
  ansible.builtin.user:
    name: ubuntu
    groups: docker
    append: true

# --- Keycloak TLS certificate ---
# Issued from step-ca (configured by jumpbox role). Keycloak serves HTTPS
# on port 8443 — vCenter and NSX Manager connect to its OIDC endpoints.

- name: Create certificate directory
  become: true
  ansible.builtin.file:
    path: /etc/step-ca/certs
    state: directory
    mode: "0755"

- name: Issue Keycloak TLS certificate from step-ca
  ansible.builtin.shell: >
    step ca certificate {{ keycloak_hostname }}
    {{ keycloak_cert_path }} {{ keycloak_key_path }}
    --san {{ keycloak_hostname }}
    --not-after 8760h
    --force
  args:
    creates: "{{ keycloak_cert_path }}"

# --- Keycloak container ---
# Runs with HTTPS on port 8443, data persisted in a Docker volume.
# Admin password is injected from 1Password at runtime.

- name: Run Keycloak container
  community.docker.docker_container:
    name: "{{ keycloak_container_name }}"
    image: "{{ keycloak_image }}"
    state: started
    restart_policy: unless-stopped
    ports:
      - "{{ keycloak_port }}:8443"
    env:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: "{{ keycloak_admin_password }}"
      KC_HOSTNAME: "{{ keycloak_hostname }}"
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/conf/server.crt
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/conf/server.key
    volumes:
      - "{{ keycloak_cert_path }}:/opt/keycloak/conf/server.crt:ro"
      - "{{ keycloak_key_path }}:/opt/keycloak/conf/server.key:ro"
      - keycloak-data:/opt/keycloak/data
    command: start
  no_log: true

- name: Wait for Keycloak to be ready
  ansible.builtin.uri:
    url: "https://{{ keycloak_hostname }}:{{ keycloak_port }}/realms/master"
    validate_certs: false
    status_code: [200]
  register: kc_health
  until: kc_health.status == 200
  retries: 60
  delay: 5

# --- Keycloak realm and users ---
# Creates the "lab" realm with admin and operator users, plus OIDC clients
# for vCenter and NSX Manager. vCenter/NSX OIDC configuration is manual
# (post Phase 3/4) as those components don't exist yet.

- name: Obtain Keycloak admin access token
  ansible.builtin.uri:
    url: "https://{{ keycloak_hostname }}:{{ keycloak_port }}/realms/master/protocol/openid-connect/token"
    method: POST
    body_format: form-urlencoded
    body:
      grant_type: password
      username: admin
      password: "{{ keycloak_admin_password }}"
      client_id: admin-cli
    validate_certs: false
  register: kc_token_response
  no_log: true

- name: Set Keycloak token fact
  ansible.builtin.set_fact:
    kc_token: "{{ kc_token_response.json.access_token }}"
  no_log: true

- name: Check if lab realm exists
  ansible.builtin.uri:
    url: "https://{{ keycloak_hostname }}:{{ keycloak_port }}/admin/realms/{{ keycloak_realm }}"
    method: GET
    headers:
      Authorization: "Bearer {{ kc_token }}"
    validate_certs: false
    status_code: [200, 404]
  register: realm_check

- name: Create lab realm
  ansible.builtin.uri:
    url: "https://{{ keycloak_hostname }}:{{ keycloak_port }}/admin/realms"
    method: POST
    headers:
      Authorization: "Bearer {{ kc_token }}"
      Content-Type: application/json
    body_format: json
    body:
      realm: "{{ keycloak_realm }}"
      enabled: true
      displayName: VKS Lab
    validate_certs: false
    status_code: [201]
  when: realm_check.status == 404

- name: Create Keycloak users
  ansible.builtin.uri:
    url: "https://{{ keycloak_hostname }}:{{ keycloak_port }}/admin/realms/{{ keycloak_realm }}/users"
    method: POST
    headers:
      Authorization: "Bearer {{ kc_token }}"
      Content-Type: application/json
    body_format: json
    body:
      username: "{{ item.username }}"
      enabled: true
      credentials:
        - type: password
          value: CHANGE-ME
          temporary: false
    validate_certs: false
    status_code: [201, 409]
  loop: "{{ keycloak_users }}"

# OIDC clients for vCenter and NSX Manager. After Phase 3/4, configure
# each component to use these clients for SSO (see delivery guide §3.4).
- name: Create Keycloak OIDC clients
  ansible.builtin.uri:
    url: "https://{{ keycloak_hostname }}:{{ keycloak_port }}/admin/realms/{{ keycloak_realm }}/clients"
    method: POST
    headers:
      Authorization: "Bearer {{ kc_token }}"
      Content-Type: application/json
    body_format: json
    body:
      clientId: "{{ item.client_id }}"
      name: "{{ item.name }}"
      enabled: true
      protocol: openid-connect
      publicClient: false
      standardFlowEnabled: true
    validate_certs: false
    status_code: [201, 409]
  loop: "{{ keycloak_oidc_clients }}"
