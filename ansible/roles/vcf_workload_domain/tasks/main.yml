---
# Commission workload hosts and create VI workload domain

# Note: vSAN ESA SDDC Manager host commissioning bypass (VCF 9.0.1+) must be applied manually
# due to SSH banner interfering with sshpass automation (see deliver.md Phase 4 prerequisites).
# Manual prerequisite: SSH to SDDC Manager and append these properties before running this role.

# Verify network pool exists before commissioning
- name: Get bearer token for pool verification
  ansible.builtin.uri:
    url: "https://{{ vcf_wld_hostname }}/v1/tokens"
    method: POST
    body_format: json
    body:
      username: "{{ vcf_wld_username }}"
      password: "{{ vcf_wld_password }}"
    validate_certs: false
    status_code: 200
  register: token_response

- name: Get network pools
  ansible.builtin.uri:
    url: "https://{{ vcf_wld_hostname }}/v1/network-pools"
    method: GET
    headers:
      Authorization: "Bearer {{ token_response.json.accessToken }}"
    validate_certs: false
    status_code: 200
  register: pools_response

- name: Verify mgmt-network-pool exists
  ansible.builtin.assert:
    that:
      - pools_response.json.elements | selectattr('name', 'equalto', 'mgmt-network-pool') | list | length > 0
    fail_msg: "Network pool 'mgmt-network-pool' not found. Available pools: {{ pools_response.json.elements | map(attribute='name') | list }}"

- name: Display network pool details
  ansible.builtin.debug:
    msg: "Network pool mgmt-network-pool: {{ (pools_response.json.elements | selectattr('name', 'equalto', 'mgmt-network-pool') | first) | to_nice_json }}"

- name: Inject network pool ID into host specs
  ansible.builtin.set_fact:
    vcf_wld_hosts: "{{ vcf_wld_hosts | map('combine', {'networkPoolId': pool_id}) | list }}"
  vars:
    pool_id: "{{ (pools_response.json.elements | selectattr('name', 'equalto', 'mgmt-network-pool') | first).id }}"

- name: Display host specs before commissioning (with pool ID injected)
  ansible.builtin.debug:
    msg: "vcf_wld_hosts: {{ vcf_wld_hosts | to_nice_json }}"

- name: Check if hosts are already commissioned
  ansible.builtin.uri:
    url: "https://{{ vcf_wld_hostname }}/v1/hosts"
    method: GET
    headers:
      Authorization: "Bearer {{ token_response.json.accessToken }}"
    validate_certs: false
    status_code: 200
  register: hosts_response

- name: Set fact for commissioned hosts
  ansible.builtin.set_fact:
    commissioned_fqdns: "{{ hosts_response.json.elements | map(attribute='fqdn') | list }}"

- name: Display commissioned hosts
  ansible.builtin.debug:
    msg: "Already commissioned hosts: {{ commissioned_fqdns }}"

- name: Filter hosts that need commissioning
  ansible.builtin.set_fact:
    hosts_to_commission: "{{ vcf_wld_hosts | rejectattr('fqdn', 'in', commissioned_fqdns) | list }}"

- name: Commission workload hosts into free pool
  vcf_sddc_host:
    sddc_hostname: "{{ vcf_wld_hostname }}"
    username: "{{ vcf_wld_username }}"
    password: "{{ vcf_wld_password }}"
    state: commissioned
    hosts: "{{ hosts_to_commission }}"
    timeout: 3600
  register: commission_result
  when: hosts_to_commission | length > 0

- name: Display commission result
  ansible.builtin.debug:
    msg: "Commissioned {{ hosts_to_commission | length }} host(s). Task ID: {{ commission_result.task_id if commission_result.task_id is defined else 'N/A' }}"
  when: hosts_to_commission | length > 0

- name: Skip commissioning message
  ansible.builtin.debug:
    msg: "All hosts already commissioned. Skipping commissioning step."
  when: hosts_to_commission | length == 0

- name: Get vLCM personalities (cluster images)
  ansible.builtin.uri:
    url: "https://{{ vcf_wld_hostname }}/v1/personalities"
    method: GET
    headers:
      Authorization: "Bearer {{ token_response.json.accessToken }}"
    validate_certs: false
    status_code: 200
  register: personalities_response

- name: Display available vLCM images
  ansible.builtin.debug:
    msg: "Available vLCM images: {{ personalities_response.json.elements | map(attribute='personalityName') | list }}"

- name: Extract vLCM image ID (use first/primary image)
  ansible.builtin.set_fact:
    cluster_image_id: "{{ (personalities_response.json.elements | first).personalityId }}"

- name: Display selected vLCM image ID
  ansible.builtin.debug:
    msg: "Using vLCM image: {{ (personalities_response.json.elements | first).personalityName }} (ID: {{ cluster_image_id }})"

- name: Build host specs with IDs and network configuration
  ansible.builtin.set_fact:
    vcf_wld_host_specs: "{{ vcf_wld_host_specs | default([]) + [
      {
        'id': (hosts_response.json.elements | selectattr('fqdn', 'equalto', item.fqdn) | first).id,
        'hostname': item.fqdn,
        'username': item.username,
        'storageType': item.storageType,
        'hostNetworkSpec': {
          'vmNics': [
            {
              'id': 'vmnic0',
              'vdsName': 'workload-cluster-vds01',
              'uplink': 'uplink1'
            }
          ]
        }
      }
    ] }}"
  loop: "{{ vcf_wld_hosts }}"

- name: Display constructed host specs
  ansible.builtin.debug:
    msg: "vcf_wld_host_specs: {{ vcf_wld_host_specs | to_nice_json }}"

- name: Validate workload domain spec
  vcf_sddc_domain:
    sddc_hostname: "{{ vcf_wld_hostname }}"
    username: "{{ vcf_wld_username }}"
    password: "{{ vcf_wld_password }}"
    state: validated
    domain_spec: "{{ vcf_wld_domain_spec }}"
  register: domain_validation

- name: Display domain validation result
  ansible.builtin.debug:
    var: domain_validation

- name: Create workload domain
  vcf_sddc_domain:
    sddc_hostname: "{{ vcf_wld_hostname }}"
    username: "{{ vcf_wld_username }}"
    password: "{{ vcf_wld_password }}"
    state: present
    domain_spec: "{{ vcf_wld_domain_spec }}"
    timeout: 5400
  register: domain_result

- name: Display domain creation result
  ansible.builtin.debug:
    var: domain_result

- name: Verify workload components are accessible
  ansible.builtin.uri:
    url: "https://{{ item }}.{{ lab_domain }}"
    validate_certs: false
    status_code: [200, 301, 302]
  loop:
    - vcenter-wld
    - nsx-mgr-wld
  retries: 10
  delay: 30
  register: wld_check
  until: wld_check.status in [200, 301, 302]
