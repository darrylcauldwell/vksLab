---
# Commission workload hosts and create VI workload domain
#
# Uses modules from the vmware_vcf.ansible collection (powered by vmware-vcf SDK).
# Authenticates once and reuses the bearer token for all subsequent tasks.
#
# Note: vSAN ESA SDDC Manager host commissioning bypass (VCF 9.0.1+) must be applied manually
# due to SSH banner interfering with sshpass automation (see deliver.md Phase 4 prerequisites).
# Manual prerequisite: SSH to SDDC Manager and append these properties before running this role.

# --- Ensure DNS for Phase 4 dependencies ---

- name: Ensure DNS for workload domain
  ansible.builtin.include_tasks: ../../common/tasks/ensure_dns.yml
  vars:
    dns_records:
      - { hostname: sddc-manager, ip: "{{ lab_mgmt_prefix }}.5" }
      - { hostname: vcenter-wld, ip: "{{ lab_mgmt_prefix }}.9" }
      - { hostname: nsx-mgr-wld, ip: "{{ lab_mgmt_prefix }}.10" }
      - { hostname: nsx-vip-wld, ip: "{{ lab_mgmt_prefix }}.22" }
      - { hostname: esxi-05, ip: "{{ lab_mgmt_prefix }}.15" }
      - { hostname: esxi-06, ip: "{{ lab_mgmt_prefix }}.16" }
      - { hostname: esxi-07, ip: "{{ lab_mgmt_prefix }}.17" }

# --- Authenticate once ---

- name: Get SDDC Manager bearer token
  vmware_vcf.ansible.vcf_sddc_info:
    sddc_hostname: "{{ vcf_wld_hostname }}"
    sddc_username: "{{ vcf_wld_username }}"
    sddc_password: "{{ vcf_wld_password }}"
    gather: token
  register: token_response
  no_log: true

- name: Set bearer token facts
  ansible.builtin.set_fact:
    sddc_token: "{{ token_response.result.bearer_token }}"
    sddc_refresh_token: "{{ token_response.result.refresh_token }}"
  no_log: true

# --- Gather info via collection ---

- name: Get network pools
  vmware_vcf.ansible.vcf_sddc_info:
    sddc_hostname: "{{ vcf_wld_hostname }}"
    sddc_bearer_token: "{{ sddc_token }}"
    sddc_refresh_token: "{{ sddc_refresh_token }}"
    gather: network_pools
    name_filter: mgmt-network-pool
  register: pools_response

- name: Verify mgmt-network-pool exists
  ansible.builtin.assert:
    that:
      - pools_response.result | length > 0
    fail_msg: "Network pool 'mgmt-network-pool' not found."

- name: Display network pool details
  ansible.builtin.debug:
    msg: "Network pool: {{ pools_response.result[0] | to_nice_json }}"

- name: Inject network pool ID into host specs
  ansible.builtin.set_fact:
    vcf_wld_hosts: "{{ vcf_wld_hosts | map('combine', {'networkPoolId': pools_response.result[0].id}) | list }}"

- name: Display host specs before commissioning
  ansible.builtin.debug:
    msg: "vcf_wld_hosts: {{ vcf_wld_hosts | to_nice_json }}"

# --- Check which hosts need commissioning ---

- name: Get commissioned hosts
  vmware_vcf.ansible.vcf_sddc_info:
    sddc_hostname: "{{ vcf_wld_hostname }}"
    sddc_bearer_token: "{{ sddc_token }}"
    sddc_refresh_token: "{{ sddc_refresh_token }}"
    gather: hosts
  register: hosts_response

- name: Set fact for commissioned FQDNs
  ansible.builtin.set_fact:
    commissioned_fqdns: "{{ hosts_response.result | map(attribute='fqdn') | list }}"

- name: Display commissioned hosts
  ansible.builtin.debug:
    msg: "Already commissioned hosts: {{ commissioned_fqdns }}"

- name: Filter hosts that need commissioning
  ansible.builtin.set_fact:
    hosts_to_commission: "{{ vcf_wld_hosts | rejectattr('fqdn', 'in', commissioned_fqdns) | list }}"

# --- Commission hosts ---

- name: Commission workload hosts into free pool
  vmware_vcf.ansible.vcf_host:
    sddc_hostname: "{{ vcf_wld_hostname }}"
    sddc_bearer_token: "{{ sddc_token }}"
    sddc_refresh_token: "{{ sddc_refresh_token }}"
    state: present
    host_spec: "{{ hosts_to_commission }}"
    wait: true
    wait_timeout: 3600
  register: commission_result
  when: hosts_to_commission | length > 0

- name: Display commission result
  ansible.builtin.debug:
    msg: "Commissioned {{ hosts_to_commission | length }} host(s)."
  when: hosts_to_commission | length > 0

- name: Skip commissioning message
  ansible.builtin.debug:
    msg: "All hosts already commissioned. Skipping commissioning step."
  when: hosts_to_commission | length == 0

# --- Refresh host list and get vLCM image ---

- name: Refresh commissioned hosts list
  vmware_vcf.ansible.vcf_sddc_info:
    sddc_hostname: "{{ vcf_wld_hostname }}"
    sddc_bearer_token: "{{ sddc_token }}"
    sddc_refresh_token: "{{ sddc_refresh_token }}"
    gather: hosts
  register: hosts_response

- name: Get vLCM personalities (cluster images)
  vmware_vcf.ansible.vcf_sddc_info:
    sddc_hostname: "{{ vcf_wld_hostname }}"
    sddc_bearer_token: "{{ sddc_token }}"
    sddc_refresh_token: "{{ sddc_refresh_token }}"
    gather: personalities
  register: personalities_response

- name: Display available vLCM images
  ansible.builtin.debug:
    msg: "Available vLCM images: {{ personalities_response.result | map(attribute='personalityName') | list }}"

- name: Extract vLCM image ID (use first/primary image)
  ansible.builtin.set_fact:
    cluster_image_id: "{{ (personalities_response.result | first).personalityId }}"

- name: Display selected vLCM image ID
  ansible.builtin.debug:
    msg: "Using vLCM image: {{ (personalities_response.result | first).personalityName }} (ID: {{ cluster_image_id }})"

# --- Build host specs for domain creation ---

- name: Build host specs with IDs and network configuration
  ansible.builtin.set_fact:
    vcf_wld_host_specs: "{{ vcf_wld_host_specs | default([]) + [
      {
        'id': (hosts_response.result | selectattr('fqdn', 'equalto', item.fqdn) | first).id,
        'hostNetworkSpec': {
          'vmNics': [
            {
              'id': 'vmnic0',
              'vdsName': 'workload-cluster-vds01',
              'uplink': 'uplink1'
            }
          ]
        }
      }
    ] }}"
  loop: "{{ vcf_wld_hosts }}"

- name: Display constructed host specs
  ansible.builtin.debug:
    msg: "vcf_wld_host_specs: {{ vcf_wld_host_specs | to_nice_json }}"

# --- Create workload domain ---

- name: Create workload domain (validates then creates)
  vmware_vcf.ansible.vcf_domain:
    sddc_hostname: "{{ vcf_wld_hostname }}"
    sddc_bearer_token: "{{ sddc_token }}"
    sddc_refresh_token: "{{ sddc_refresh_token }}"
    state: present
    spec: "{{ vcf_wld_domain_spec }}"
    validate: true
    wait: true
    wait_timeout: 7200
  register: domain_result

- name: Display domain creation result
  ansible.builtin.debug:
    msg: "Domain creation complete: {{ domain_result }}"

# --- Verify workload domain exists ---

- name: Verify workload domain is active
  vmware_vcf.ansible.vcf_domain:
    sddc_hostname: "{{ vcf_wld_hostname }}"
    sddc_bearer_token: "{{ sddc_token }}"
    sddc_refresh_token: "{{ sddc_refresh_token }}"
    state: info
    domain_name: workload-domain
  register: domain_info

- name: Display workload domain status
  ansible.builtin.debug:
    msg: "Workload domain status: {{ domain_info.domain.status | default('UNKNOWN') }}"
