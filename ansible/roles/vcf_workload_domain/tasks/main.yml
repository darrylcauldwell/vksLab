---
# Commission workload hosts and create VI workload domain

# Apply vSAN ESA workaround for nested lab hosts (VCF 9.0.1+)
# Bypass disk capacity validation that fails on lab hardware
- name: Apply vSAN ESA SDDC Manager host commissioning bypass
  block:
    - name: Add vSAN ESA property to operationsmanager config
      ansible.builtin.shell: |
        sshpass -e ssh \
          -o StrictHostKeyChecking=no \
          -o UserKnownHostsFile=/dev/null \
          -o ConnectTimeout=10 \
          root@{{ vcf_wld_hostname }} \
          'grep -q "vsan.esa.sddc.managed.disk.claim" /etc/vmware/vcf/operationsmanager/application-prod.properties || \
           echo "vsan.esa.sddc.managed.disk.claim=true" >> /etc/vmware/vcf/operationsmanager/application-prod.properties' 2>/dev/null
      environment:
        SSHPASS: "{{ bootstrap_password }}"
      changed_when: false
      failed_when: false
      register: property_result

    - name: Add NIC speed validation bypass (optional, for lab hardware)
      ansible.builtin.shell: |
        sshpass -e ssh \
          -o StrictHostKeyChecking=no \
          -o UserKnownHostsFile=/dev/null \
          -o ConnectTimeout=10 \
          root@{{ vcf_wld_hostname }} \
          'grep -q "enable.speed.of.physical.nics.validation" /etc/vmware/vcf/operationsmanager/application.properties || \
           echo "enable.speed.of.physical.nics.validation=false" >> /etc/vmware/vcf/operationsmanager/application.properties' 2>/dev/null
      environment:
        SSHPASS: "{{ bootstrap_password }}"
      changed_when: false
      failed_when: false

    - name: Restart operationsmanager service
      ansible.builtin.shell: |
        sshpass -e ssh \
          -o StrictHostKeyChecking=no \
          -o UserKnownHostsFile=/dev/null \
          -o ConnectTimeout=10 \
          root@{{ vcf_wld_hostname }} \
          'systemctl restart operationsmanager' 2>/dev/null
      environment:
        SSHPASS: "{{ bootstrap_password }}"
      changed_when: true
      failed_when: false

    - name: Wait for SDDC Manager to be ready after service restart
      ansible.builtin.uri:
        url: "https://{{ vcf_wld_hostname }}/v1/health"
        method: GET
        validate_certs: false
        status_code: [200, 503]
      retries: 30
      delay: 10
      register: health_check
      until: health_check.status == 200

    - name: Display vSAN ESA workaround completion
      ansible.builtin.debug:
        msg: "vSAN ESA SDDC Manager host commissioning bypass applied and operationsmanager service restarted"

# Look up network pool IDs by name before commissioning
- name: Get bearer token for pool lookup
  ansible.builtin.uri:
    url: "https://{{ vcf_wld_hostname }}/v1/tokens"
    method: POST
    body_format: json
    body:
      username: "{{ vcf_wld_username }}"
      password: "{{ vcf_wld_password }}"
    validate_certs: false
    status_code: 200
  register: token_response

- name: Get network pools
  ansible.builtin.uri:
    url: "https://{{ vcf_wld_hostname }}/v1/network-pools"
    method: GET
    headers:
      Authorization: "Bearer {{ token_response.json.accessToken }}"
    validate_certs: false
    status_code: 200
  register: pools_response

- name: Extract pool ID and update host specs
  ansible.builtin.set_fact:
    vcf_wld_hosts: "{{ vcf_wld_hosts | map('combine', {'networkPoolId': pool_id}) | list }}"
  vars:
    pool_name: "mgmt-network-pool"
    pool_id: "{{ (pools_response.json.elements | selectattr('name', 'equalto', pool_name) | first).id }}"

- name: Commission workload hosts into free pool
  vcf_sddc_host:
    sddc_hostname: "{{ vcf_wld_hostname }}"
    username: "{{ vcf_wld_username }}"
    password: "{{ vcf_wld_password }}"
    state: commissioned
    hosts: "{{ vcf_wld_hosts }}"
    timeout: 3600
  register: commission_result

- name: Display commission result
  ansible.builtin.debug:
    var: commission_result

- name: Validate workload domain spec
  vcf_sddc_domain:
    sddc_hostname: "{{ vcf_wld_hostname }}"
    username: "{{ vcf_wld_username }}"
    password: "{{ vcf_wld_password }}"
    state: validated
    domain_spec: "{{ vcf_wld_domain_spec }}"
  register: domain_validation

- name: Display domain validation result
  ansible.builtin.debug:
    var: domain_validation

- name: Create workload domain
  vcf_sddc_domain:
    sddc_hostname: "{{ vcf_wld_hostname }}"
    username: "{{ vcf_wld_username }}"
    password: "{{ vcf_wld_password }}"
    state: present
    domain_spec: "{{ vcf_wld_domain_spec }}"
    timeout: 5400
  register: domain_result

- name: Display domain creation result
  ansible.builtin.debug:
    var: domain_result

- name: Verify workload components are accessible
  ansible.builtin.uri:
    url: "https://{{ item }}.{{ lab_domain }}"
    validate_certs: false
    status_code: [200, 301, 302]
  loop:
    - vcenter-wld
    - nsx-mgr-wld
  retries: 10
  delay: 30
  register: wld_check
  until: wld_check.status in [200, 301, 302]
