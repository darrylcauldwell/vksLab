---
# Commission workload hosts and create VI workload domain

# Note: vSAN ESA SDDC Manager host commissioning bypass (VCF 9.0.1+) must be applied manually
# due to SSH banner interfering with sshpass automation (see deliver.md Phase 4 prerequisites).
# Manual prerequisite: SSH to SDDC Manager and append these properties before running this role.

# Commission workload hosts into free pool
# Note: API accepts networkPoolName (string), not networkPoolId (UUID)
# SDDC Manager looks up the pool ID internally
- name: Display host specs before commissioning
  ansible.builtin.debug:
    msg: "vcf_wld_hosts: {{ vcf_wld_hosts | to_nice_json }}"

- name: Commission workload hosts into free pool
  vcf_sddc_host:
    sddc_hostname: "{{ vcf_wld_hostname }}"
    username: "{{ vcf_wld_username }}"
    password: "{{ vcf_wld_password }}"
    state: commissioned
    hosts: "{{ vcf_wld_hosts }}"
    timeout: 3600
  register: commission_result

- name: Display commission result
  ansible.builtin.debug:
    var: commission_result

- name: Validate workload domain spec
  vcf_sddc_domain:
    sddc_hostname: "{{ vcf_wld_hostname }}"
    username: "{{ vcf_wld_username }}"
    password: "{{ vcf_wld_password }}"
    state: validated
    domain_spec: "{{ vcf_wld_domain_spec }}"
  register: domain_validation

- name: Display domain validation result
  ansible.builtin.debug:
    var: domain_validation

- name: Create workload domain
  vcf_sddc_domain:
    sddc_hostname: "{{ vcf_wld_hostname }}"
    username: "{{ vcf_wld_username }}"
    password: "{{ vcf_wld_password }}"
    state: present
    domain_spec: "{{ vcf_wld_domain_spec }}"
    timeout: 5400
  register: domain_result

- name: Display domain creation result
  ansible.builtin.debug:
    var: domain_result

- name: Verify workload components are accessible
  ansible.builtin.uri:
    url: "https://{{ item }}.{{ lab_domain }}"
    validate_certs: false
    status_code: [200, 301, 302]
  loop:
    - vcenter-wld
    - nsx-mgr-wld
  retries: 10
  delay: 30
  register: wld_check
  until: wld_check.status in [200, 301, 302]
