vcf_wld_hostname: "sddc-manager.{{ lab_domain }}"
vcf_wld_username: admin@local
vcf_wld_password: "{{ sddc_admin_password }}"

vcf_wld_hosts:
  - fqdn: "esxi-05.{{ lab_domain }}"
    username: root
    password: "{{ bootstrap_password }}"
    storageType: VSAN
  - fqdn: "esxi-06.{{ lab_domain }}"
    username: root
    password: "{{ bootstrap_password }}"
    storageType: VSAN
  - fqdn: "esxi-07.{{ lab_domain }}"
    username: root
    password: "{{ bootstrap_password }}"
    storageType: VSAN

vcf_wld_domain_spec:
  domainName: workload-domain
  deployWithoutLicenseKeys: true
  vcenterSpec:
    name: vcenter-wld
    networkDetailsSpec:
      ipAddress: "{{ lab_mgmt_prefix }}.9"
      dnsName: "vcenter-wld.{{ lab_domain }}"
      gateway: "{{ lab_gateway }}"
      subnetMask: 255.255.255.0
    rootPassword: "{{ vcf_wld_password }}"
    datacenterName: workload-dc
    vmSize: medium
    storageSize: lstorage
  computeSpec:
    clusterSpecs:
      - name: workload-cluster
        clusterImageId: "{{ cluster_image_id }}"
        hostSpecs: "{{ vcf_wld_host_specs }}"
        datastoreSpec:
          vsanDatastoreSpec:
            datastoreName: workload-vsan-ds
            failuresToTolerate: 1
            esaEnabled: true
        networkSpec:
          vdsSpecs:
            - name: workload-cluster-vds01
              portGroupSpecs:
                - name: workload-cluster-vds01-pg-mgmt
                  transportType: MANAGEMENT
                  teamingPolicy: loadbalance_loadbased
                  activeUplinks:
                    - uplink1
                  standbyUplinks: []
                - name: workload-cluster-vds01-pg-vmotion
                  transportType: VMOTION
                  teamingPolicy: loadbalance_loadbased
                  activeUplinks:
                    - uplink1
                  standbyUplinks: []
                - name: workload-cluster-vds01-pg-vsan
                  transportType: VSAN
                  teamingPolicy: loadbalance_loadbased
                  activeUplinks:
                    - uplink1
                  standbyUplinks: []
              isUsedByNsxt: true
              vmnics:
                - vmnic0
              vmnicsToUplinks:
                - id: vmnic0
                  uplink: uplink1
          nsxClusterSpec:
            nsxTClusterSpec:
              geneveVlanId: "{{ vlans.host_overlay.id }}"
              ipAddressPoolSpec:
                name: workload-tep-pool
                subnets:
                  - ipAddressPoolRanges:
                      - start: "{{ lab_overlay_prefix }}.15"
                        end: "{{ lab_overlay_prefix }}.17"
                    cidr: "{{ vlans.host_overlay.subnet }}"
                    gateway: "{{ vlans.host_overlay.gateway }}"
  nsxTSpec:
    nsxManagerSpecs:
      - name: nsx-mgr-wld
        networkDetailsSpec:
          ipAddress: "{{ lab_mgmt_prefix }}.10"
          dnsName: "nsx-mgr-wld.{{ lab_domain }}"
          gateway: "{{ lab_gateway }}"
          subnetMask: 255.255.255.0
    vipFqdn: "nsx-mgr-wld.{{ lab_domain }}"
    nsxManagerAdminPassword: "{{ nsx_admin_password }}"
    formFactor: medium
