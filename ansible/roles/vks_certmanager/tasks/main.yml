---
# Phase 8 — cert-manager (VKS Standard Package)
# Prerequisite for Contour and Harbor TLS certificate management.

# --- Ensure vcf_sdk is available ---

- name: Ensure vcf_sdk is available
  ansible.builtin.include_tasks: ../../common/tasks/ensure_vcf_sdk.yml

- name: List available Supervisor Services
  vmware_vcf.ansible.vcf_vcenter_supervisor_service:
    vcenter_hostname: "{{ vcenter_wld_hostname }}"
    vcenter_username: "{{ vcenter_wld_username }}"
    vcenter_password: "{{ vcenter_wld_password }}"
    action: list_services
  register: available_services

- name: Check if cert-manager is already enabled
  vmware_vcf.ansible.vcf_vcenter_supervisor_service:
    vcenter_hostname: "{{ vcenter_wld_hostname }}"
    vcenter_username: "{{ vcenter_wld_username }}"
    vcenter_password: "{{ vcenter_wld_password }}"
    action: get_cluster_service
    cluster_id: "{{ vks_supervisor_cluster }}"
    service_id: "{{ vks_certmanager_service_id }}"
  register: certmanager_status
  failed_when: false

- name: Get cert-manager versions
  vmware_vcf.ansible.vcf_vcenter_supervisor_service:
    vcenter_hostname: "{{ vcenter_wld_hostname }}"
    vcenter_username: "{{ vcenter_wld_username }}"
    vcenter_password: "{{ vcenter_wld_password }}"
    action: list_versions
    service_id: "{{ vks_certmanager_service_id }}"
  register: certmanager_versions
  when: certmanager_status.result is not defined or certmanager_status.failed | default(false)

- name: Set latest cert-manager version
  ansible.builtin.set_fact:
    vks_certmanager_version: "{{ certmanager_versions.result | sort(attribute='version', reverse=true) | first | attr('version') }}"
  when: certmanager_versions is not skipped

- name: Enable cert-manager on Supervisor cluster
  vmware_vcf.ansible.vcf_vcenter_supervisor_service:
    vcenter_hostname: "{{ vcenter_wld_hostname }}"
    vcenter_username: "{{ vcenter_wld_username }}"
    vcenter_password: "{{ vcenter_wld_password }}"
    action: enable_service
    cluster_id: "{{ vks_supervisor_cluster }}"
    service_id: "{{ vks_certmanager_service_id }}"
    spec:
      version: "{{ vks_certmanager_version }}"
  when: certmanager_status.result is not defined or certmanager_status.failed | default(false)

- name: Display cert-manager status
  ansible.builtin.debug:
    msg: "cert-manager {{ 'already enabled' if not (certmanager_status.failed | default(false)) else 'enabled (version ' + vks_certmanager_version + ')' }}"

# --- Integrate with lab step-ca ---
# Create a ClusterIssuer that uses step-ca's ACME endpoint so all
# ingress TLS certs (Harbor, ArgoCD) are signed by the lab CA —
# consistent with VCF component certificates from Phase 5.

- name: Create step-ca root CA secret for cert-manager
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata:
        name: lab-ca-root
        namespace: cert-manager
      type: Opaque
      data:
        ca.crt: "{{ lookup('file', ca_cert_path) | b64encode }}"

- name: Create ClusterIssuer for lab step-ca
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: cert-manager.io/v1
      kind: ClusterIssuer
      metadata:
        name: lab-ca
      spec:
        acme:
          server: "https://gateway.{{ lab_domain }}:443/acme/acme/directory"
          caBundle: "{{ lookup('file', ca_cert_path) | b64encode }}"
          privateKeySecretRef:
            name: lab-ca-account-key
          solvers:
            - http01:
                ingress:
                  ingressClassName: contour

- name: Wait for ClusterIssuer to be ready
  kubernetes.core.k8s_info:
    api_version: cert-manager.io/v1
    kind: ClusterIssuer
    name: lab-ca
  register: issuer_status
  until: >
    issuer_status.resources | length > 0 and
    (issuer_status.resources[0].status.conditions | default([]) |
     selectattr('type', 'equalto', 'Ready') |
     selectattr('status', 'equalto', 'True') | list | length > 0)
  retries: 20
  delay: 10

- name: Display ClusterIssuer status
  ansible.builtin.debug:
    msg: "ClusterIssuer lab-ca ready — cert-manager will use step-ca for all TLS certificates"
