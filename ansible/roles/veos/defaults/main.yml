veos_hostname: veos-router
veos_ntp_server: pool.ntp.org

veos_vlans: [10, 20, 30, 40, 50, 60]

veos_trunk_interface: Ethernet1
veos_uplink_interface: Ethernet2

veos_svi_config:
  - {vlan: 10, description: Management, ip: "10.0.10.1/24", mtu: 1500}
  - {vlan: 20, description: vMotion, ip: "10.0.20.1/24", mtu: 9000}
  - {vlan: 30, description: vSAN, ip: "10.0.30.1/24", mtu: 9000}
  - {vlan: 40, description: "Host Overlay (TEP)", ip: "10.0.40.1/24", mtu: 9000}
  - {vlan: 50, description: "Edge Overlay (TEP)", ip: "10.0.50.1/24", mtu: 9000}
  - {vlan: 60, description: "Edge Uplink / BGP", ip: "10.0.60.1/24", mtu: 1500}

# NAT: lab network masquerades via uplink
veos_nat_acl_name: LAB-INTERNAL
veos_nat_source_network: 10.0.0.0/16

# RDP port forwarding to jumpbox
veos_rdp_destination: 10.0.10.2

# Default route for internet via jumpbox
veos_default_route_next_hop: 10.0.10.2
