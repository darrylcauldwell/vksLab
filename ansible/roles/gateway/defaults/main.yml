gateway_ip: "{{ host_ip['gateway'] }}"
gateway_private_nic: ens34
gateway_public_nic: ens33
gateway_lab_network: "{{ lab_network_prefix }}.0.0/16"
gateway_vlan_trunk_nic: ens34

gateway_packages:
  - ubuntu-desktop-minimal    # GNOME + GDM3
  - dnsmasq
  - chrony
  - firefox
  - iptables-persistent
  - frr
  - jq
  - conky-all
  - sshpass                     # Used by Phase 2 bootstrap to set ESXi passwords
  - zsh
  - git                          # Required for Oh My Zsh, plugin installs, and repo clone
  # zsh-autosuggestions and zsh-syntax-highlighting are cloned from git
  # into Oh My Zsh custom plugins directory (apt packages lack full structure)
  - ansible                     # Phases 2+ run from gateway
  - python3-pip                 # For Ansible collection dependencies

gateway_keyboard_layout: gb

# Smallstep packages (installed from Smallstep apt repo)
gateway_step_packages:
  - step-cli
  - step-ca

# VS Code (installed from Microsoft apt repo)
gateway_vscode_packages:
  - code

# VLAN sub-interface configuration
# All VLANs including management use 802.1Q tagging on ens34.
# ESXi hosts must have VLAN 10 set on their management port group (configured in baked template).
# VLAN sub-interfaces — gateway IP is first usable (.1) on each VLAN subnet
gateway_vlan_interfaces:
  - {vlan: "{{ vlan['management'].vlan_id }}", description: Management, ip: "{{ vlan['management'].gateway }}/24", mtu: "{{ vlan['management'].mtu }}"}
  - {vlan: "{{ vlan['vmotion'].vlan_id }}", description: vMotion, ip: "{{ vlan['vmotion'].gateway }}/24", mtu: "{{ vlan['vmotion'].mtu }}"}
  - {vlan: "{{ vlan['vsan'].vlan_id }}", description: vSAN, ip: "{{ vlan['vsan'].gateway }}/24", mtu: "{{ vlan['vsan'].mtu }}"}
  - {vlan: "{{ vlan['host_overlay'].vlan_id }}", description: "Host Overlay (TEP)", ip: "{{ vlan['host_overlay'].gateway }}/24", mtu: "{{ vlan['host_overlay'].mtu }}"}
  - {vlan: "{{ vlan['edge_overlay'].vlan_id }}", description: "Edge Overlay (TEP)", ip: "{{ vlan['edge_overlay'].gateway }}/24", mtu: "{{ vlan['edge_overlay'].mtu }}"}
  - {vlan: "{{ vlan['edge_uplink'].vlan_id }}", description: "Edge Uplink / BGP", ip: "{{ vlan['edge_uplink'].gateway }}/24", mtu: "{{ vlan['edge_uplink'].mtu }}"}

# Upstream DNS forwarders
gateway_upstream_dns:
  - 192.19.189.20
  - 192.19.189.10
  - 192.19.189.30

# DNS records for dnsmasq — Phase 1 gateway infrastructure only.
# Each subsequent phase adds its own records via ensure_dns.yml quality gates.
# This keeps the gateway role modular — it works for any lab topology.
gateway_dns_records:
  - {hostname: gateway, ip: "{{ host_ip['gateway'] }}"}

# DHCP reservations — MACs are discovered by Phase 1B (phase1b_discover_macs.yml).
# IPs come from the physical design document via DDA.
# These placeholder MACs get overwritten at runtime.
gateway_dhcp_reservations:
  - {mac: "00:50:56:xx:xx:01", hostname: esxi-01, ip: "{{ host_ip['esxi-01'] }}"}
  - {mac: "00:50:56:xx:xx:02", hostname: esxi-02, ip: "{{ host_ip['esxi-02'] }}"}
  - {mac: "00:50:56:xx:xx:03", hostname: esxi-03, ip: "{{ host_ip['esxi-03'] }}"}
  - {mac: "00:50:56:xx:xx:04", hostname: esxi-04, ip: "{{ host_ip['esxi-04'] }}"}
  - {mac: "00:50:56:xx:xx:05", hostname: esxi-05, ip: "{{ host_ip['esxi-05'] }}"}
  - {mac: "00:50:56:xx:xx:06", hostname: esxi-06, ip: "{{ host_ip['esxi-06'] }}"}
  - {mac: "00:50:56:xx:xx:07", hostname: esxi-07, ip: "{{ host_ip['esxi-07'] }}"}
