---
# Phase 1 — Gateway configuration
# The gateway is the single entry point for the entire nested lab. It provides:
#   - Inter-VLAN routing via VLAN sub-interfaces on ens34
#   - DNS (dnsmasq) for lab.dreamfold.dev with DHCP reservations for ESXi hosts
#   - NTP (chrony) — all VCF components sync time from the gateway
#   - CA (step-ca) — internal TLS certificates for all lab components
#   - NAT/masquerade — outbound internet for nested hosts via the public NIC
#   - BGP (FRR) — peers with NSX Tier-0 for VKS pod/service route exchange
#   - RDP (GNOME + gnome-remote-desktop) — Wayland-native remote desktop for managing web UIs

# systemd-resolved binds port 53, preventing dnsmasq from starting.
# Disable it and point resolv.conf at upstream DNS so apt works.
- name: Disable systemd-resolved
  become: true
  ansible.builtin.service:
    name: systemd-resolved
    state: stopped
    enabled: false

- name: Configure resolv.conf for upstream DNS
  become: true
  ansible.builtin.copy:
    content: |
      {% for dns in gateway_upstream_dns %}
      nameserver {{ dns }}
      {% endfor %}
    dest: /etc/resolv.conf
    owner: root
    group: root
    mode: "0644"

- name: Upgrade all packages to latest versions
  become: true
  ansible.builtin.apt:
    upgrade: dist
    update_cache: true

# dist-upgrade can leave dpkg in a partially configured state (e.g.
# kernel updates triggering needrestart). Fix before installing packages.
- name: Fix any partially configured packages
  become: true
  ansible.builtin.command: dpkg --configure -a
  changed_when: false

- name: Install required packages
  become: true
  ansible.builtin.apt:
    name: "{{ gateway_packages }}"
    state: present

# Netplan configures the public NIC (ens33, DHCP) and six VLAN sub-interfaces
# on ens34 for management, vMotion, vSAN, host overlay, edge overlay, and
# edge uplink networks. MTU 9000 on storage/overlay VLANs.
- name: Deploy netplan configuration
  become: true
  ansible.builtin.template:
    src: 01-lab.yaml.j2
    dest: /etc/netplan/01-lab.yaml
    owner: root
    group: root
    mode: "0600"
  register: netplan_result

# Apply netplan immediately — VLAN sub-interfaces must be up before
# dnsmasq (binds to ens34) and step-ca (listens on VLAN IPs).
- name: Apply netplan now
  become: true
  ansible.builtin.command: netplan apply
  when: netplan_result.changed

# dnsmasq provides forward/reverse DNS for all lab hosts and DHCP on VLAN 10
# with static MAC→IP reservations. ESXi hosts PXE/DHCP boot and receive their
# management IP based on the MAC address assigned by vCD.
- name: Deploy dnsmasq configuration
  become: true
  ansible.builtin.template:
    src: lab.conf.j2
    dest: /etc/dnsmasq.d/lab.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart dnsmasq

# chrony serves NTP to all lab components. VCF bringup validates time sync
# across all ESXi hosts — clock skew >1s causes validation failure.
- name: Deploy chrony configuration
  become: true
  ansible.builtin.template:
    src: chrony.conf.j2
    dest: /etc/chrony/chrony.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart chrony

- name: Enable and start dnsmasq
  become: true
  ansible.builtin.service:
    name: dnsmasq
    state: started
    enabled: true

- name: Enable and start chrony
  become: true
  ansible.builtin.service:
    name: chrony
    state: started
    enabled: true

# apport crash reporter is noisy on a lab appliance — stale GNOME sessions
# after reboots trigger "System program problem detected" dialogs on RDP login.
- name: Disable apport crash reporter
  become: true
  ansible.builtin.service:
    name: apport
    state: stopped
    enabled: false

- name: Ensure apport stays disabled across reboots
  become: true
  ansible.builtin.lineinfile:
    path: /etc/default/apport
    regexp: '^enabled='
    line: 'enabled=0'
    state: present

# --- RDP via GNOME Remote Desktop (system mode) ---
#
# GRD has two modes: "screen sharing" (user service, shares auto-login
# session, requires GNOME keyring) and "system" (system service, creates
# a fresh login session per RDP connection, no keyring dependency).
#
# Screen-sharing mode is fundamentally incompatible with automated setup
# because grdctl stores credentials in the GNOME keyring, which is locked
# on auto-login (no password prompt to unlock it). Every workaround
# (PAM unlock, empty keyring, dconf bypass) is fragile.
#
# System mode (`grdctl --system`) runs as root, stores credentials in
# /etc/gnome-remote-desktop/, and requires no D-Bus session, no keyring,
# no auto-login. When an RDP client connects, GRD shows the GDM login
# screen and creates a Wayland session after authentication.

# The vApp template may boot to multi-user.target (no GUI). GDM and GRD
# system mode both require graphical.target.
- name: Set default boot target to graphical
  become: true
  ansible.builtin.command: systemctl set-default graphical.target
  changed_when: false

# xrdp may be pre-installed in the vApp template. It conflicts with
# gnome-remote-desktop by binding port 3389 first. Remove it entirely.
- name: Remove xrdp if present
  become: true
  ansible.builtin.apt:
    name:
      - xrdp
      - xorgxrdp
    state: absent
    purge: true

# Ubuntu's 61-gdm.rules detects VMware's virtual GPU and forces Xorg,
# disabling Wayland. Override with an empty file so GDM respects
# WaylandEnable=true in custom.conf.
- name: Override GDM udev rule that disables Wayland on VMs
  become: true
  ansible.builtin.copy:
    content: "# Intentionally empty — allow Wayland on VMware virtual GPU\n"
    dest: /etc/udev/rules.d/61-gdm.rules
    owner: root
    group: root
    mode: "0644"
  register: udev_override

- name: Reload udev rules
  become: true
  ansible.builtin.command: udevadm trigger
  when: udev_override is changed

- name: Enable Wayland in GDM
  become: true
  ansible.builtin.copy:
    content: |
      [daemon]
      WaylandEnable=true
    dest: /etc/gdm3/custom.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart gdm3

- name: Set keyboard layout
  become: true
  ansible.builtin.lineinfile:
    path: /etc/default/keyboard
    regexp: '^XKBLAYOUT='
    line: 'XKBLAYOUT="{{ gateway_keyboard_layout }}"'
    state: present

# TLS certificate for RDP encryption. GRD system mode expects certs
# in the gnome-remote-desktop service user's data directory.
- name: Create GRD certificate directory
  become: true
  ansible.builtin.file:
    path: /var/lib/gnome-remote-desktop/.local/share/gnome-remote-desktop
    state: directory
    owner: gnome-remote-desktop
    group: gnome-remote-desktop
    mode: "0700"
    recurse: true

- name: Check if GRD TLS certificate exists
  become: true
  ansible.builtin.stat:
    path: /var/lib/gnome-remote-desktop/.local/share/gnome-remote-desktop/tls.crt
  register: grd_tls_cert

- name: Generate self-signed TLS certificate for GRD
  become: true
  become_user: gnome-remote-desktop
  ansible.builtin.command: >
    openssl req -x509 -newkey rsa:2048
    -keyout /var/lib/gnome-remote-desktop/.local/share/gnome-remote-desktop/tls.key
    -out /var/lib/gnome-remote-desktop/.local/share/gnome-remote-desktop/tls.crt
    -days 3650 -nodes -subj "/CN=gateway"
  when: not grd_tls_cert.stat.exists

# Configure GRD system mode — all commands run as root, no D-Bus or
# keyring needed. Credentials are stored in the system GRD config.
# The "door credentials" authenticate the RDP connection; after that
# the user logs in with their OS credentials at the GDM screen.
- name: Set GRD system TLS certificate
  become: true
  ansible.builtin.command: >
    grdctl --system rdp set-tls-cert
    /var/lib/gnome-remote-desktop/.local/share/gnome-remote-desktop/tls.crt
  when: not grd_tls_cert.stat.exists

- name: Set GRD system TLS key
  become: true
  ansible.builtin.command: >
    grdctl --system rdp set-tls-key
    /var/lib/gnome-remote-desktop/.local/share/gnome-remote-desktop/tls.key
  when: not grd_tls_cert.stat.exists

- name: Set GRD system RDP credentials
  become: true
  ansible.builtin.command: >
    grdctl --system rdp set-credentials ubuntu
    {{ lookup('community.general.onepassword', 'Jumpbox Ubuntu', field='password', vault=onepassword_vault) }}
  changed_when: true
  no_log: true

- name: Disable GRD system view-only mode
  become: true
  ansible.builtin.command: grdctl --system rdp disable-view-only
  changed_when: false

- name: Enable GRD system RDP
  become: true
  ansible.builtin.command: grdctl --system rdp enable
  changed_when: false

- name: Enable and start GRD system service
  become: true
  ansible.builtin.systemd:
    name: gnome-remote-desktop
    scope: system
    enabled: true
    state: "{{ 'restarted' if (not grd_tls_cert.stat.exists) else 'started' }}"
    daemon_reload: true

# SSH config for all lab hosts — `ssh esxi-01` just works
- name: Create .ssh directory
  become: true
  ansible.builtin.file:
    path: /home/ubuntu/.ssh
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0700"

- name: Deploy SSH config for lab hosts
  become: true
  ansible.builtin.template:
    src: ssh_config.j2
    dest: /home/ubuntu/.ssh/config
    owner: ubuntu
    group: ubuntu
    mode: "0600"

# --- Third-party apt repositories ---
# All repos are added together, then a single cache update, then installs.
# On re-runs repos are unchanged → cache update and installs skip.

# kubectl for VKS cluster management in later phases
- name: Add Kubernetes apt repository key
  become: true
  ansible.builtin.get_url:
    url: https://pkgs.k8s.io/core:/stable:/v1.31/deb/Release.key
    dest: /etc/apt/keyrings/kubernetes.asc
    mode: "0644"

- name: Add Kubernetes apt repository
  become: true
  ansible.builtin.copy:
    content: |
      Types: deb
      URIs: https://pkgs.k8s.io/core:/stable:/v1.31/deb/
      Suites: /
      Signed-By: /etc/apt/keyrings/kubernetes.asc
    dest: /etc/apt/sources.list.d/kubernetes.sources
    mode: "0644"
  register: k8s_repo

# Conky displays lab environment info on the desktop (like BGInfo on Windows)
- name: Deploy conky configuration
  become: true
  ansible.builtin.template:
    src: conkyrc.j2
    dest: /home/ubuntu/.conkyrc
    owner: ubuntu
    group: ubuntu
    mode: "0644"

- name: Create GNOME autostart directory
  become: true
  ansible.builtin.file:
    path: /home/ubuntu/.config/autostart
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"

- name: Create conky autostart entry
  become: true
  ansible.builtin.copy:
    content: |
      [Desktop Entry]
      Type=Application
      Name=Conky
      Exec=conky --daemonize --pause=5
      Hidden=false
      X-GNOME-Autostart-enabled=true
    dest: /home/ubuntu/.config/autostart/conky.desktop
    owner: ubuntu
    group: ubuntu
    mode: "0644"

# IP masquerading allows nested hosts (10.0.0.0/16) to reach the internet
# via the gateway's public NIC. Required for VCF depot sync, content library
# updates, and VKS image pulls.
- name: Enable IP forwarding
  become: true
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_file: /etc/sysctl.d/99-lab-forwarding.conf
    reload: true
    state: present

- name: Add iptables masquerade rule
  become: true
  ansible.builtin.iptables:
    table: nat
    chain: POSTROUTING
    source: "{{ gateway_lab_network }}"
    out_interface: "{{ gateway_public_nic }}"
    jump: MASQUERADE
    state: present
  notify: save iptables

# FRR BGP peers with the NSX Tier-0 gateway on the edge uplink VLAN (60).
# The gateway advertises infrastructure routes; NSX advertises VKS pod/service
# CIDRs back. This enables pod-to-external and external-to-pod connectivity.
- name: Deploy FRR daemons configuration
  become: true
  ansible.builtin.template:
    src: daemons.j2
    dest: /etc/frr/daemons
    owner: frr
    group: frr
    mode: "0640"
  notify: restart frr

- name: Deploy FRR zebra configuration
  become: true
  ansible.builtin.template:
    src: zebra.conf.j2
    dest: /etc/frr/zebra.conf
    owner: frr
    group: frr
    mode: "0640"
  notify: restart frr

- name: Deploy FRR BGP configuration
  become: true
  ansible.builtin.template:
    src: bgpd.conf.j2
    dest: /etc/frr/bgpd.conf
    owner: frr
    group: frr
    mode: "0640"
  notify: restart frr

- name: Enable and start FRR
  become: true
  ansible.builtin.service:
    name: frr
    state: started
    enabled: true

# step-ca provides an internal CA with ACME support. TLS certificates for
# Keycloak and other lab services are issued from this CA. The root cert
# is distributed to ESXi hosts in Phase 2 (esxi_prepare role).
- name: Add Smallstep apt repository key
  become: true
  ansible.builtin.get_url:
    url: https://packages.smallstep.com/keys/apt/repo-signing-key.gpg
    dest: /etc/apt/keyrings/smallstep.asc
    mode: "0644"

- name: Add Smallstep apt repository
  become: true
  ansible.builtin.copy:
    content: |
      Types: deb
      URIs: https://packages.smallstep.com/stable/debian
      Suites: debs
      Components: main
      Signed-By: /etc/apt/keyrings/smallstep.asc
    dest: /etc/apt/sources.list.d/smallstep.sources
    mode: "0644"
  register: smallstep_repo

# VS Code provides an IDE on the gateway for editing Ansible playbooks,
# VKS manifests, and troubleshooting — accessible via RDP.
- name: Add Microsoft VS Code apt repository key
  become: true
  ansible.builtin.get_url:
    url: https://packages.microsoft.com/keys/microsoft.asc
    dest: /etc/apt/keyrings/microsoft.asc
    mode: "0644"

- name: Add Microsoft VS Code apt repository
  become: true
  ansible.builtin.copy:
    content: |
      Types: deb
      URIs: https://packages.microsoft.com/repos/code
      Suites: stable
      Components: main
      Architectures: amd64
      Signed-By: /etc/apt/keyrings/microsoft.asc
    dest: /etc/apt/sources.list.d/vscode.sources
    mode: "0644"
  register: vscode_repo

# Single apt cache update after all third-party repos are added.
# Skips on re-runs when repos haven't changed.
- name: Update apt cache for third-party repos
  become: true
  ansible.builtin.apt:
    update_cache: true
  when: k8s_repo is changed or smallstep_repo is changed or vscode_repo is changed

- name: Install third-party packages
  become: true
  ansible.builtin.apt:
    name: "{{ gateway_step_packages + gateway_vscode_packages + ['kubectl'] }}"
    state: present

# Derived deterministically from bootstrap_password so reruns always
# produce the same value — safe to overwrite on every run.
- name: Write step-ca password
  become: true
  ansible.builtin.copy:
    content: "{{ (bootstrap_password + 'step-ca') | hash('sha256') }}"
    dest: /root/.step-ca-password
    owner: root
    mode: "0600"

- name: Initialise step-ca
  become: true
  ansible.builtin.command:
    cmd: >
      step ca init
      --name="VKS Lab CA"
      --dns="127.0.0.1"
      --address=":443"
      --provisioner="lab-admin"
      --password-file=/root/.step-ca-password
    creates: /root/.step/config/ca.json

# Default max cert duration is 24h — raise to 1 year for lab services
- name: Set max certificate duration to 1 year
  become: true
  ansible.builtin.shell: |
    if jq -e '.authority.provisioners[] | select(.name == "lab-admin") | .claims.maxTLSCertDuration == "8760h"' /root/.step/config/ca.json > /dev/null 2>&1; then
      echo "already_set"
    else
      jq '(.authority.provisioners[] | select(.name == "lab-admin") | .claims) = {
        "maxTLSCertDuration": "8760h",
        "defaultTLSCertDuration": "720h"
      }' /root/.step/config/ca.json > /tmp/ca.json.tmp &&
      mv /tmp/ca.json.tmp /root/.step/config/ca.json
      echo "updated"
    fi
  register: cert_duration_result
  changed_when: "'updated' in cert_duration_result.stdout"
  notify: restart step-ca

- name: Export root CA certificate
  become: true
  ansible.builtin.copy:
    src: /root/.step/certs/root_ca.crt
    dest: "{{ ca_cert_path }}"
    remote_src: true
    mode: "0644"

# Configure step CLI defaults for the ubuntu user so that `step ca health`
# works without --ca-url/--root flags (step-ca was initialised as root).
- name: Create step CLI config directory for ubuntu user
  become: true
  ansible.builtin.file:
    path: /home/ubuntu/.step/config
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0700"

- name: Deploy step CLI defaults for ubuntu user
  become: true
  ansible.builtin.copy:
    content: |
      {
        "ca-url": "https://127.0.0.1:443",
        "root": "/usr/local/share/ca-certificates/lab-root-ca.crt"
      }
    dest: /home/ubuntu/.step/config/defaults.json
    owner: ubuntu
    group: ubuntu
    mode: "0644"

# Add root CA to system trust store so curl, wget, and Firefox trust it
- name: Install root CA into system trust store
  become: true
  ansible.builtin.copy:
    src: /root/.step/certs/root_ca.crt
    dest: /usr/local/share/ca-certificates/lab-root-ca.crt
    remote_src: true
    mode: "0644"
  register: system_ca_result

- name: Update system CA bundle
  become: true
  ansible.builtin.command: update-ca-certificates
  when: system_ca_result.changed

# Firefox enterprise policy — trust system CA store without manual config
- name: Create Firefox policy directory
  become: true
  ansible.builtin.file:
    path: /etc/firefox/policies
    state: directory
    mode: "0755"

- name: Deploy Firefox enterprise policy
  become: true
  ansible.builtin.copy:
    content: |
      {
        "policies": {
          "Certificates": {
            "ImportEnterpriseRoots": true
          },
          "DisplayBookmarksToolbar": "always",
          "ManagedBookmarks": [
            { "toplevel_name": "VCF Lab" },
            { "name": "vCenter (mgmt)", "url": "https://vcenter-mgmt.{{ lab_domain }}/ui" },
            { "name": "SDDC Manager", "url": "https://sddc-manager.{{ lab_domain }}/ui" },
            { "name": "NSX Manager (mgmt)", "url": "https://nsx-mgr-mgmt.{{ lab_domain }}" },
            { "name": "vCenter (wld)", "url": "https://vcenter-wld.{{ lab_domain }}/ui" },
            { "name": "NSX Manager (wld)", "url": "https://nsx-mgr-wld.{{ lab_domain }}" },
            { "name": "Keycloak", "url": "https://gateway.{{ lab_domain }}:8443/admin/lab/console" }
          ]
        }
      }
    dest: /etc/firefox/policies/policies.json
    mode: "0644"

# Fetch to controller so Phase 2 can push it to ESXi hosts via copy module
- name: Fetch root CA certificate to controller
  ansible.builtin.fetch:
    src: "{{ ca_cert_path }}"
    dest: "{{ ca_cert_path }}"
    flat: true

- name: Deploy step-ca systemd service
  become: true
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Smallstep CA
      After=network-online.target
      Wants=network-online.target

      [Service]
      ExecStart=/usr/bin/step-ca /root/.step/config/ca.json --password-file=/root/.step-ca-password
      Restart=on-failure
      User=root

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/step-ca.service
    mode: "0644"

- name: Enable and start step-ca
  become: true
  ansible.builtin.service:
    name: step-ca
    state: started
    enabled: true
    daemon_reload: true

# Wait for step-ca to be ready before docker_services role issues certs
- name: Wait for step-ca to be ready
  ansible.builtin.uri:
    url: https://127.0.0.1:443/health
    validate_certs: false
    status_code: [200]
  register: stepca_health
  until: stepca_health.status == 200
  retries: 30
  delay: 2
