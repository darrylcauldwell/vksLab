---
# Phase 1 — Gateway configuration
# The gateway is the single entry point for the entire nested lab. It provides:
#   - Inter-VLAN routing via VLAN sub-interfaces on ens34
#   - DNS (dnsmasq) for lab.dreamfold.dev with DHCP reservations for ESXi hosts
#   - NTP (chrony) — all VCF components sync time from the gateway
#   - CA (step-ca) — internal TLS certificates for all lab components
#   - NAT/masquerade — outbound internet for nested hosts via the public NIC
#   - BGP (FRR) — peers with NSX Tier-0 for VKS pod/service route exchange
#   - RDP (GNOME + xrdp) — remote desktop for managing web UIs
#
# Tags:
#   packages  — apt upgrade + package install
#   network   — netplan VLAN sub-interfaces
#   dns       — dnsmasq configuration
#   ntp       — chrony configuration
#   desktop   — GNOME settings, dconf, conky
#   shell     — zsh, Oh My Zsh, Powerlevel10k
#   xrdp      — xrdp + gnome-remote-desktop disable
#   repos     — third-party apt repositories + installs
#   routing   — IP forwarding, NAT, FRR/BGP
#   ca        — step-ca, certificates, Firefox policy

# systemd-resolved binds port 53, preventing dnsmasq from starting.
# Disable it and point resolv.conf at upstream DNS so apt works.
# Mask (not just disable) systemd-resolved — dnsmasq's systemd service
# tries to register with resolved via D-Bus after starting. Masking
# prevents the D-Bus activation from resurrecting it.
- name: Stop systemd-resolved
  become: true
  ansible.builtin.service:
    name: systemd-resolved
    state: stopped
  tags: [packages, dns]

- name: Mask systemd-resolved
  become: true
  ansible.builtin.systemd:
    name: systemd-resolved
    masked: true
  tags: [packages, dns]

- name: Configure resolv.conf with local dnsmasq and upstream fallback
  become: true
  ansible.builtin.copy:
    content: |
      nameserver 127.0.0.1
      {% for dns in gateway_upstream_dns %}
      nameserver {{ dns }}
      {% endfor %}
    dest: /etc/resolv.conf
    owner: root
    group: root
    mode: "0644"
  tags: [packages, dns]

- name: "LONG RUNNING TASK — Upgrading all packages (~5-10 min on first run)"
  ansible.builtin.debug:
    msg: "Running apt dist-upgrade with cache update. This is slow on first build."
  tags: packages

- name: Upgrade all packages to latest versions
  become: true
  ansible.builtin.apt:
    upgrade: dist
    update_cache: true
  tags: packages

# dist-upgrade can leave dpkg in a partially configured state (e.g.
# kernel updates triggering needrestart). Fix before installing packages.
- name: Fix any partially configured packages
  become: true
  ansible.builtin.command: dpkg --configure -a
  changed_when: false
  tags: packages

- name: "LONG RUNNING TASK — Installing packages (~3-5 min)"
  ansible.builtin.debug:
    msg: "Installing {{ gateway_packages | length }} packages."
  tags: packages

- name: Install required packages
  become: true
  ansible.builtin.apt:
    name: "{{ gateway_packages }}"
    state: present
  tags: packages

# Netplan configures the public NIC (ens33, DHCP) and six VLAN sub-interfaces
# on ens34 for management, vMotion, vSAN, host overlay, edge overlay, and
# edge uplink networks. MTU 9000 on storage/overlay VLANs.
- name: Deploy netplan configuration
  become: true
  ansible.builtin.template:
    src: 01-lab.yaml.j2
    dest: /etc/netplan/01-lab.yaml
    owner: root
    group: root
    mode: "0600"
  register: netplan_result
  tags: network

# Apply netplan immediately — VLAN sub-interfaces must be up before
# dnsmasq (binds to ens34) and step-ca (listens on VLAN IPs).
- name: Apply netplan now
  become: true
  ansible.builtin.command: netplan apply
  when: netplan_result.changed
  tags: network

# dnsmasq provides forward/reverse DNS for all lab hosts and DHCP on VLAN 10
# with static MAC→IP reservations. ESXi hosts PXE/DHCP boot and receive their
# management IP based on the MAC address assigned by vCD.
- name: Deploy dnsmasq configuration
  become: true
  ansible.builtin.template:
    src: lab.conf.j2
    dest: /etc/dnsmasq.d/lab.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart dnsmasq
  tags: dns

# chrony serves NTP to all lab components. VCF bringup validates time sync
# across all ESXi hosts — clock skew >1s causes validation failure.
- name: Deploy chrony configuration
  become: true
  ansible.builtin.template:
    src: chrony.conf.j2
    dest: /etc/chrony/chrony.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart chrony
  tags: ntp

- name: Enable and start dnsmasq
  become: true
  ansible.builtin.service:
    name: dnsmasq
    state: started
    enabled: true
  tags: dns

- name: Enable and start chrony
  become: true
  ansible.builtin.service:
    name: chrony
    state: started
    enabled: true
  tags: ntp

# apport crash reporter is noisy on a lab appliance — stale GNOME sessions
# after reboots trigger "System program problem detected" dialogs on RDP login.
- name: Disable apport crash reporter
  become: true
  ansible.builtin.service:
    name: apport
    state: stopped
    enabled: false
  tags: desktop

- name: Ensure apport stays disabled across reboots
  become: true
  ansible.builtin.lineinfile:
    path: /etc/default/apport
    regexp: '^enabled='
    line: 'enabled=0'
    state: present
  tags: desktop

# --- RDP via xrdp ---
#
# xrdp is a battle-tested RDP server that works with every RDP client
# (macOS Windows App, mstsc, FreeRDP). It creates an Xorg GNOME session
# per connection. No keyring, no D-Bus, no TLS negotiation issues.
#
# GRD (gnome-remote-desktop) was evaluated but has client compatibility
# issues with macOS Windows App (rdp_server_accept_nego failures) and
# its screen-sharing mode requires GNOME keyring which is locked on
# auto-login. xrdp is the pragmatic choice for a lab gateway.

# The vApp template may boot to multi-user.target (no GUI).
- name: Set default boot target to graphical
  become: true
  ansible.builtin.command: systemctl set-default graphical.target
  changed_when: false
  tags: xrdp

- name: Set keyboard layout
  become: true
  ansible.builtin.lineinfile:
    path: /etc/default/keyboard
    regexp: '^XKBLAYOUT='
    line: 'XKBLAYOUT="{{ gateway_keyboard_layout }}"'
    state: present
  tags: xrdp

- name: Install xrdp
  become: true
  ansible.builtin.apt:
    name:
      - xrdp
      - xorgxrdp
    state: present
  tags: xrdp

# Mark GNOME Initial Setup as complete so the welcome wizard is skipped
- name: Ensure .config directory exists for ubuntu user
  become: true
  ansible.builtin.file:
    path: /home/ubuntu/.config
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"
  tags: desktop

- name: Create gnome-initial-setup-done flag
  become: true
  ansible.builtin.copy:
    content: "yes"
    dest: /home/ubuntu/.config/gnome-initial-setup-done
    owner: ubuntu
    group: ubuntu
    mode: "0644"
  tags: desktop

# Set GNOME dock favourites via dconf profile (dconf write needs a D-Bus
# session which doesn't exist during Ansible). A system db override applies
# to all users and works without an active session.
- name: Create dconf profile for user defaults
  become: true
  ansible.builtin.copy:
    content: |
      user-db:user
      system-db:local
    dest: /etc/dconf/profile/user
    mode: "0644"
  tags: desktop

- name: Create dconf local database directory
  become: true
  ansible.builtin.file:
    path: /etc/dconf/db/local.d
    state: directory
    mode: "0755"
  tags: desktop

- name: Set GNOME favourite apps via dconf system database
  become: true
  ansible.builtin.copy:
    content: |
      [org/gnome/shell]
      favorite-apps=['firefox_firefox.desktop', 'org.gnome.Terminal.desktop', 'org.gnome.Nautilus.desktop']
    dest: /etc/dconf/db/local.d/01-favorites
    mode: "0644"
  register: dconf_favorites
  tags: desktop

- name: Update dconf system database
  become: true
  ansible.builtin.command: dconf update
  when: dconf_favorites.changed
  tags: desktop

# --- zsh + Oh My Zsh + Powerlevel10k ---

- name: Set zsh as default shell for ubuntu
  become: true
  ansible.builtin.user:
    name: ubuntu
    shell: /usr/bin/zsh
  tags: shell

- name: Download Oh My Zsh installer
  become: true
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh
    dest: /tmp/install-ohmyzsh.sh
    mode: "0755"
  tags: shell

- name: Install Oh My Zsh
  become: true
  become_user: ubuntu
  ansible.builtin.command:
    cmd: sh /tmp/install-ohmyzsh.sh
    creates: /home/ubuntu/.oh-my-zsh/oh-my-zsh.sh
  environment:
    HOME: /home/ubuntu
    RUNZSH: "no"
    CHSH: "no"
  tags: shell

- name: Install Powerlevel10k theme
  become: true
  become_user: ubuntu
  ansible.builtin.git:
    repo: https://github.com/romkatv/powerlevel10k.git
    dest: /home/ubuntu/.oh-my-zsh/custom/themes/powerlevel10k
    depth: 1
    version: master
  environment:
    HOME: /home/ubuntu
  tags: shell

- name: Clone zsh-autosuggestions plugin
  ansible.builtin.git:
    repo: https://github.com/zsh-users/zsh-autosuggestions.git
    dest: /home/ubuntu/.oh-my-zsh/custom/plugins/zsh-autosuggestions
    depth: 1
  tags: shell

- name: Clone zsh-syntax-highlighting plugin
  ansible.builtin.git:
    repo: https://github.com/zsh-users/zsh-syntax-highlighting.git
    dest: /home/ubuntu/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting
    depth: 1
  tags: shell

- name: Configure .zshrc
  become: true
  ansible.builtin.copy:
    content: |
      # Path to your Oh My Zsh installation
      export ZSH="$HOME/.oh-my-zsh"

      # Powerlevel10k theme (clean Git-aware prompt)
      ZSH_THEME="powerlevel10k/powerlevel10k"

      # Dev plugins
      plugins=(git zsh-autosuggestions zsh-syntax-highlighting)

      source $ZSH/oh-my-zsh.sh

      # Reload Powerlevel10k config
      [[ ! -f ~/.p10k.zsh ]] || source ~/.p10k.zsh
    dest: /home/ubuntu/.zshrc
    owner: ubuntu
    group: ubuntu
    mode: "0644"
  tags: shell

- name: Deploy Powerlevel10k configuration
  become: true
  ansible.builtin.copy:
    src: p10k.zsh
    dest: /home/ubuntu/.p10k.zsh
    owner: ubuntu
    group: ubuntu
    mode: "0644"
  tags: shell

# xrdp needs access to the TLS certificate used by the RDP listener
- name: Add xrdp user to ssl-cert group
  become: true
  ansible.builtin.user:
    name: xrdp
    groups: ssl-cert
    append: true
  tags: xrdp

# Default xrdp session uses Xorg — configure it to start a full GNOME
# session so the user gets the same desktop as a local login.
- name: Configure xrdp to use GNOME session
  become: true
  ansible.builtin.copy:
    content: |
      [Desktop Entry]
      Name=Xrdp Session
      Exec=env -u SESSION_MANAGER -u DBUS_SESSION_BUS_ADDRESS gnome-session --session=ubuntu
      Type=Application
    dest: /etc/xrdp/xsession.desktop
    owner: root
    group: root
    mode: "0644"
  notify: restart xrdp
  tags: xrdp

# Polkit rule to allow colord access without authentication prompts
# that block the RDP session at login
- name: Create polkit rule for colord in xrdp sessions
  become: true
  ansible.builtin.copy:
    content: |
      polkit.addRule(function(action, subject) {
          if ((action.id == "org.freedesktop.color-manager.create-device" ||
               action.id == "org.freedesktop.color-manager.create-profile" ||
               action.id == "org.freedesktop.color-manager.delete-device" ||
               action.id == "org.freedesktop.color-manager.delete-profile" ||
               action.id == "org.freedesktop.color-manager.modify-device" ||
               action.id == "org.freedesktop.color-manager.modify-profile") &&
              subject.isInGroup("ubuntu")) {
              return polkit.Result.YES;
          }
      });
    dest: /etc/polkit-1/rules.d/02-allow-colord.rules
    owner: root
    group: root
    mode: "0644"
  tags: xrdp

# gnome-remote-desktop ships with ubuntu-desktop-minimal and binds port 3389
# on startup via GDM. Disable it so xrdp can claim the port.
# Use command rather than service module — on first run GDM may not have
# started yet so the service may not be active/known to systemd.
- name: Disable gnome-remote-desktop service
  become: true
  ansible.builtin.command: systemctl disable --now gnome-remote-desktop.service
  register: grd_disable
  failed_when: false
  changed_when: grd_disable.rc == 0
  tags: xrdp

- name: Enable and start xrdp
  become: true
  ansible.builtin.service:
    name: xrdp
    state: started
    enabled: true
  tags: xrdp

# SSH config for all lab hosts — `ssh esxi-01` just works
- name: Create .ssh directory
  become: true
  ansible.builtin.file:
    path: /home/ubuntu/.ssh
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0700"
  tags: shell

- name: Deploy SSH config for lab hosts
  become: true
  ansible.builtin.template:
    src: ssh_config.j2
    dest: /home/ubuntu/.ssh/config
    owner: ubuntu
    group: ubuntu
    mode: "0600"
  tags: shell

# --- Third-party apt repositories ---
# All repos are added together, then a single cache update, then installs.
# On re-runs repos are unchanged → cache update and installs skip.

# kubectl for VKS cluster management in later phases
- name: Add Kubernetes apt repository key
  become: true
  ansible.builtin.get_url:
    url: https://pkgs.k8s.io/core:/stable:/v1.31/deb/Release.key
    dest: /etc/apt/keyrings/kubernetes.asc
    mode: "0644"
  tags: repos

- name: Add Kubernetes apt repository
  become: true
  ansible.builtin.copy:
    content: |
      Types: deb
      URIs: https://pkgs.k8s.io/core:/stable:/v1.31/deb/
      Suites: /
      Signed-By: /etc/apt/keyrings/kubernetes.asc
    dest: /etc/apt/sources.list.d/kubernetes.sources
    mode: "0644"
  register: k8s_repo
  tags: repos

# Conky displays lab environment info on the desktop (like BGInfo on Windows)
- name: Deploy conky configuration
  become: true
  ansible.builtin.template:
    src: conkyrc.j2
    dest: /home/ubuntu/.conkyrc
    owner: ubuntu
    group: ubuntu
    mode: "0644"
  tags: desktop

- name: Create GNOME autostart directory
  become: true
  ansible.builtin.file:
    path: /home/ubuntu/.config/autostart
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0755"
  tags: desktop

- name: Create conky autostart entry
  become: true
  ansible.builtin.copy:
    content: |
      [Desktop Entry]
      Type=Application
      Name=Conky
      Exec=conky --daemonize --pause=5
      Hidden=false
      X-GNOME-Autostart-enabled=true
    dest: /home/ubuntu/.config/autostart/conky.desktop
    owner: ubuntu
    group: ubuntu
    mode: "0644"
  tags: desktop

# IP masquerading allows nested hosts (10.0.0.0/16) to reach the internet
# via the gateway's public NIC. Required for VCF depot sync, content library
# updates, and VKS image pulls.
- name: Enable IP forwarding
  become: true
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    sysctl_file: /etc/sysctl.d/99-lab-forwarding.conf
    reload: true
    state: present
  tags: routing

- name: Add iptables masquerade rule
  become: true
  ansible.builtin.iptables:
    table: nat
    chain: POSTROUTING
    source: "{{ gateway_lab_network }}"
    out_interface: "{{ gateway_public_nic }}"
    jump: MASQUERADE
    state: present
  register: masquerade_result
  tags: routing

# Save immediately — handlers only run at end of play and are skipped
# if a later task fails, causing the rule to be lost on reboot.
- name: Persist iptables rules
  become: true
  ansible.builtin.shell: netfilter-persistent save
  when: masquerade_result.changed
  tags: routing

# FRR BGP peers with the NSX Tier-0 gateway on the edge uplink VLAN (60).
# The gateway advertises infrastructure routes; NSX advertises VKS pod/service
# CIDRs back. This enables pod-to-external and external-to-pod connectivity.

# FRR defaults to integrated config mode when frr.conf exists — it reads
# only frr.conf and ignores per-daemon files (bgpd.conf, zebra.conf).
# Remove it so FRR uses the per-daemon config files we deploy.
- name: Remove FRR integrated config file
  become: true
  ansible.builtin.file:
    path: /etc/frr/frr.conf
    state: absent
  notify: restart frr
  tags: routing

- name: Deploy FRR daemons configuration
  become: true
  ansible.builtin.template:
    src: daemons.j2
    dest: /etc/frr/daemons
    owner: frr
    group: frr
    mode: "0640"
  notify: restart frr
  tags: routing

- name: Deploy FRR zebra configuration
  become: true
  ansible.builtin.template:
    src: zebra.conf.j2
    dest: /etc/frr/zebra.conf
    owner: frr
    group: frr
    mode: "0640"
  notify: restart frr
  tags: routing

- name: Deploy FRR BGP configuration
  become: true
  ansible.builtin.template:
    src: bgpd.conf.j2
    dest: /etc/frr/bgpd.conf
    owner: frr
    group: frr
    mode: "0640"
  notify: restart frr
  tags: routing

- name: Enable and start FRR
  become: true
  ansible.builtin.service:
    name: frr
    state: started
    enabled: true
  tags: routing

# step-ca provides an internal CA with ACME support. TLS certificates for
# Keycloak and other lab services are issued from this CA. The root cert
# is distributed to ESXi hosts in Phase 3 (esxi_prepare role).
- name: Add Smallstep apt repository key
  become: true
  ansible.builtin.get_url:
    url: https://packages.smallstep.com/keys/apt/repo-signing-key.gpg
    dest: /etc/apt/keyrings/smallstep.asc
    mode: "0644"
  tags: [repos, ca]

- name: Add Smallstep apt repository
  become: true
  ansible.builtin.copy:
    content: |
      Types: deb
      URIs: https://packages.smallstep.com/stable/debian
      Suites: debs
      Components: main
      Signed-By: /etc/apt/keyrings/smallstep.asc
    dest: /etc/apt/sources.list.d/smallstep.sources
    mode: "0644"
  register: smallstep_repo
  tags: [repos, ca]

# VS Code provides an IDE on the gateway for editing Ansible playbooks,
# VKS manifests, and troubleshooting — accessible via RDP.
- name: Add Microsoft VS Code apt repository key
  become: true
  ansible.builtin.get_url:
    url: https://packages.microsoft.com/keys/microsoft.asc
    dest: /etc/apt/keyrings/microsoft.asc
    mode: "0644"
  tags: repos

- name: Add Microsoft VS Code apt repository
  become: true
  ansible.builtin.copy:
    content: |
      Types: deb
      URIs: https://packages.microsoft.com/repos/code
      Suites: stable
      Components: main
      Architectures: amd64
      Signed-By: /etc/apt/keyrings/microsoft.asc
    dest: /etc/apt/sources.list.d/vscode.sources
    mode: "0644"
  register: vscode_repo
  tags: repos

# Ghostty — GPU-accelerated terminal emulator (direct .deb from GitHub)
- name: Download Ghostty .deb package
  become: true
  ansible.builtin.get_url:
    url: "https://github.com/mkasberg/ghostty-ubuntu/releases/download/1.3.1-0-ppa1/ghostty_1.3.1-0.ppa1_amd64_24.04.deb"
    dest: /tmp/ghostty.deb
  tags: repos

- name: Install Ghostty
  become: true
  ansible.builtin.apt:
    deb: /tmp/ghostty.deb
    state: present
  tags: repos

# Single apt cache update after all third-party repos are added.
# Skips on re-runs when repos haven't changed.
- name: Update apt cache for third-party repos
  become: true
  ansible.builtin.apt:
    update_cache: true
  when: (k8s_repo is defined and k8s_repo is changed) or (smallstep_repo is defined and smallstep_repo is changed) or (vscode_repo is defined and vscode_repo is changed)
  tags: repos

- name: Install third-party packages
  become: true
  ansible.builtin.apt:
    name: "{{ gateway_step_packages + gateway_vscode_packages + ['kubectl'] }}"
    state: present
  tags: repos

# govc CLI for programmatic OVA deployment to ESXi (used in Phase 4)
- name: Install govc
  become: true
  ansible.builtin.shell: |
    if command -v govc > /dev/null 2>&1; then
      echo "already_installed"
    else
      curl -fsSL https://github.com/vmware/govmomi/releases/latest/download/govc_Linux_x86_64.tar.gz \
        | tar -xz -C /usr/local/bin govc
      chmod +x /usr/local/bin/govc
      echo "installed"
    fi
  register: govc_install
  changed_when: "'installed' in govc_install.stdout"
  tags: repos

# Derived deterministically from bootstrap_password so reruns always
# produce the same value — safe to overwrite on every run.
- name: Write step-ca password
  become: true
  ansible.builtin.copy:
    content: "{{ (bootstrap_password + 'step-ca') | hash('sha256') }}"
    dest: /root/.step-ca-password
    owner: root
    mode: "0600"
  tags: ca

- name: "LONG RUNNING TASK — Initialising step-ca (~1-2 min)"
  ansible.builtin.debug:
    msg: "Generating CA keypair and configuring ACME provisioner."
  tags: ca

- name: Initialise step-ca
  become: true
  ansible.builtin.command:
    cmd: >
      step ca init
      --name="VKS Lab CA"
      --dns="127.0.0.1"
      --address=":443"
      --provisioner="lab-admin"
      --password-file=/root/.step-ca-password
    creates: /root/.step/config/ca.json
  tags: ca

# Default max cert duration is 24h — raise to 1 year for lab services
- name: Set max certificate duration to 1 year
  become: true
  ansible.builtin.shell: |
    if jq -e '.authority.provisioners[] | select(.name == "lab-admin") | .claims.maxTLSCertDuration == "8760h"' /root/.step/config/ca.json > /dev/null 2>&1; then
      echo "already_set"
    else
      jq '(.authority.provisioners[] | select(.name == "lab-admin") | .claims) = {
        "maxTLSCertDuration": "8760h",
        "defaultTLSCertDuration": "720h"
      }' /root/.step/config/ca.json > /tmp/ca.json.tmp &&
      mv /tmp/ca.json.tmp /root/.step/config/ca.json
      echo "updated"
    fi
  register: cert_duration_result
  changed_when: "'updated' in cert_duration_result.stdout"
  notify: restart step-ca
  tags: ca

- name: Export root CA certificate
  become: true
  ansible.builtin.copy:
    src: /root/.step/certs/root_ca.crt
    dest: "{{ ca_cert_path }}"
    remote_src: true
    mode: "0644"
  tags: ca

# Configure step CLI defaults for the ubuntu user so that `step ca health`
# works without --ca-url/--root flags (step-ca was initialised as root).
- name: Create step CLI config directory for ubuntu user
  become: true
  ansible.builtin.file:
    path: /home/ubuntu/.step/config
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0700"
  tags: ca

- name: Deploy step CLI defaults for ubuntu user
  become: true
  ansible.builtin.copy:
    content: |
      {
        "ca-url": "https://127.0.0.1:443",
        "root": "/usr/local/share/ca-certificates/lab-root-ca.crt"
      }
    dest: /home/ubuntu/.step/config/defaults.json
    owner: ubuntu
    group: ubuntu
    mode: "0644"
  tags: ca

# Add root CA to system trust store so curl, wget, and Firefox trust it
- name: Install root CA into system trust store
  become: true
  ansible.builtin.copy:
    src: /root/.step/certs/root_ca.crt
    dest: /usr/local/share/ca-certificates/lab-root-ca.crt
    remote_src: true
    mode: "0644"
  register: system_ca_result
  tags: ca

- name: Update system CA bundle
  become: true
  ansible.builtin.command: update-ca-certificates
  when: system_ca_result.changed
  tags: ca

# Firefox enterprise policy — trust system CA store without manual config
- name: Create Firefox policy directory
  become: true
  ansible.builtin.file:
    path: /etc/firefox/policies
    state: directory
    mode: "0755"
  tags: [ca, desktop]

- name: Deploy Firefox enterprise policy
  become: true
  ansible.builtin.copy:
    content: |
      {
        "policies": {
          "Certificates": {
            "ImportEnterpriseRoots": true
          },
          "DisplayBookmarksToolbar": "always",
          "ManagedBookmarks": [
            { "toplevel_name": "VCF Lab" },
            { "name": "vCenter (mgmt)", "url": "https://vcenter-mgmt.{{ lab_domain }}/ui" },
            { "name": "SDDC Manager", "url": "https://sddc-manager.{{ lab_domain }}/ui" },
            { "name": "NSX Manager (mgmt)", "url": "https://nsx-mgr-mgmt.{{ lab_domain }}" },
            { "name": "vCenter (wld)", "url": "https://vcenter-wld.{{ lab_domain }}/ui" },
            { "name": "NSX Manager (wld)", "url": "https://nsx-mgr-wld.{{ lab_domain }}" },
            { "name": "Keycloak", "url": "https://gateway.{{ lab_domain }}:8443/admin/lab/console" }
          ]
        }
      }
    dest: /etc/firefox/policies/policies.json
    mode: "0644"
  tags: [ca, desktop]

# Fetch to controller so Phase 3 can push it to ESXi hosts via copy module
- name: Fetch root CA certificate to controller
  ansible.builtin.fetch:
    src: "{{ ca_cert_path }}"
    dest: "{{ ca_cert_path }}"
    flat: true
  tags: ca

- name: Deploy step-ca systemd service
  become: true
  ansible.builtin.copy:
    content: |
      [Unit]
      Description=Smallstep CA
      After=network-online.target
      Wants=network-online.target

      [Service]
      ExecStart=/usr/bin/step-ca /root/.step/config/ca.json --password-file=/root/.step-ca-password
      Restart=on-failure
      User=root

      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/step-ca.service
    mode: "0644"
  tags: ca

- name: Enable and start step-ca
  become: true
  ansible.builtin.service:
    name: step-ca
    state: started
    enabled: true
    daemon_reload: true
  tags: ca

# Wait for step-ca to be ready before docker_services role issues certs
- name: Wait for step-ca to be ready
  ansible.builtin.uri:
    url: https://127.0.0.1:443/health
    validate_certs: false
    status_code: [200]
  register: stepca_health
  until: stepca_health.status == 200
  retries: 30
  delay: 2
  tags: ca

# --- Ansible execution environment ---
# Phases 3+ run from the gateway for speed and reliability.
# The laptop runs Phase 0 (OVA upload) and Phase 1 (gateway bootstrap),
# then the gateway runs all subsequent phases locally.

- name: Add 1Password apt repository key
  become: true
  ansible.builtin.get_url:
    url: https://downloads.1password.com/linux/keys/1password.asc
    dest: /etc/apt/keyrings/1password.asc
    mode: "0644"
  tags: [repos, ansible-env]

- name: Add 1Password apt repository
  become: true
  ansible.builtin.copy:
    content: |
      Types: deb
      URIs: https://downloads.1password.com/linux/debian/amd64
      Suites: stable
      Components: main
      Architectures: amd64
      Signed-By: /etc/apt/keyrings/1password.asc
    dest: /etc/apt/sources.list.d/1password.sources
    mode: "0644"
  register: onepassword_repo
  tags: [repos, ansible-env]

- name: Update apt cache for 1Password repo
  become: true
  ansible.builtin.apt:
    update_cache: true
  when: onepassword_repo is changed
  tags: [repos, ansible-env]

- name: Install 1Password CLI
  become: true
  ansible.builtin.apt:
    name: 1password-cli
    state: present
  tags: ansible-env

- name: Clone lab repo to gateway
  ansible.builtin.git:
    repo: https://github.com/darrylcauldwell/dda-vcf.git
    dest: /home/ubuntu/dda-vcf
    version: main
    force: true
  tags: ansible-env

- name: "LONG RUNNING TASK — Installing Ansible collections (~2-5 min)"
  ansible.builtin.debug:
    msg: "Downloading collections from Galaxy and installing vendored vmware_vcf."
  tags: ansible-env

- name: Install Ansible collections
  ansible.builtin.command:
    cmd: ansible-galaxy collection install -r /home/ubuntu/dda-vcf/ansible/collections/requirements.yml
  register: collections_install
  changed_when: "'was installed' in collections_install.stdout"
  tags: ansible-env

- name: Install vmware-vcf SDK from PyPI
  ansible.builtin.pip:
    name: vmware-vcf
    state: latest
  become: true
  tags: ansible-env

- name: Create VCF backup directory
  ansible.builtin.file:
    path: /home/ubuntu/vcf-backups
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0700"
  tags: backups
