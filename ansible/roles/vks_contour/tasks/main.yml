---
# Phase 8 — Contour L7 ingress controller (VKS Standard Package)
# Requires cert-manager. Provides HTTPProxy CRD for multi-service routing.

# --- Ensure vcf_sdk is available ---

- name: Ensure vcf_sdk is available
  ansible.builtin.include_tasks: ../../common/tasks/ensure_vcf_sdk.yml
  when: inventory_hostname != 'localhost'

- name: Check if Contour is already enabled
  vmware_vcf.ansible.vcf_vcenter_supervisor_service:
    vcenter_hostname: "{{ vcenter_wld_hostname }}"
    vcenter_username: "{{ vcenter_wld_username }}"
    vcenter_password: "{{ vcenter_wld_password }}"
    action: get_cluster_service
    cluster_id: "{{ vks_supervisor_cluster }}"
    service_id: "{{ vks_contour_service_id }}"
  register: contour_status
  failed_when: false

- name: Get Contour versions
  vmware_vcf.ansible.vcf_vcenter_supervisor_service:
    vcenter_hostname: "{{ vcenter_wld_hostname }}"
    vcenter_username: "{{ vcenter_wld_username }}"
    vcenter_password: "{{ vcenter_wld_password }}"
    action: list_versions
    service_id: "{{ vks_contour_service_id }}"
  register: contour_versions
  when: contour_status.result is not defined or contour_status.failed | default(false)

- name: Set latest Contour version
  ansible.builtin.set_fact:
    vks_contour_version: "{{ contour_versions.result | sort(attribute='version', reverse=true) | first | attr('version') }}"
  when: contour_versions is not skipped

- name: Enable Contour on Supervisor cluster
  vmware_vcf.ansible.vcf_vcenter_supervisor_service:
    vcenter_hostname: "{{ vcenter_wld_hostname }}"
    vcenter_username: "{{ vcenter_wld_username }}"
    vcenter_password: "{{ vcenter_wld_password }}"
    action: enable_service
    cluster_id: "{{ vks_supervisor_cluster }}"
    service_id: "{{ vks_contour_service_id }}"
    spec:
      version: "{{ vks_contour_version }}"
  when: contour_status.result is not defined or contour_status.failed | default(false)

- name: Display Contour status
  ansible.builtin.debug:
    msg: "Contour {{ 'already enabled' if not (contour_status.failed | default(false)) else 'enabled (version ' + vks_contour_version + ')' }}"
