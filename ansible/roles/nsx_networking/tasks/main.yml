---
# Phase 7 — VCF Workload NSX Networking via collection modules
# Edge cluster, Tier-0/1 gateways, BGP, VPC, SNAT
#
# All API calls go through the vmware-vcf SDK (requests library)
# which honours the HTTPS_PROXY for SOCKS proxy support.

# --- Ensure DNS records for Phase 7 dependencies ---

- name: Ensure DNS for NSX networking
  ansible.builtin.include_tasks: ../../common/tasks/ensure_dns.yml
  vars:
    dns_records:
      - { hostname: nsx-mgr-wld, ip: "{{ host_ip['nsx-mgr-wld'] }}" }
      - { hostname: nsx-vip-wld, ip: "{{ host_ip['nsx-vip-wld'] }}" }
      - { hostname: edge-01, ip: "{{ host_ip['edge-01'] }}" }
      - { hostname: edge-02, ip: "{{ host_ip['edge-02'] }}" }

# --- Discover transport zones ---
# Transport zone names are defined in the workload domain spec (Phase 6).
# Look them up to get the full path (which includes the UUID).

- name: Get all transport zones
  vmware_vcf.ansible.vcf_nsx_info:
    nsx_hostname: "{{ nsx_manager_hostname }}"
    nsx_username: "{{ nsx_username }}"
    nsx_password: "{{ nsx_password }}"
    gather: transport_zones
  register: all_tzs

- name: Set VLAN transport zone path
  ansible.builtin.set_fact:
    nsx_vlan_tz_path: "{{ (all_tzs.result | selectattr('display_name', 'equalto', nsx_vlan_tz_name) | first).path }}"

- name: Set Overlay transport zone name
  ansible.builtin.set_fact:
    nsx_overlay_tz_display_name: "{{ (all_tzs.result | selectattr('display_name', 'equalto', nsx_overlay_tz_name) | first).display_name }}"

- name: Display discovered transport zones
  ansible.builtin.debug:
    msg: "VLAN TZ path: {{ nsx_vlan_tz_path }}, Overlay TZ: {{ nsx_overlay_tz_display_name }}"

# --- Pre-Flight: Create Required Segments and IP Pools ---

- name: Create management network segment (vlan-10)
  vmware_vcf.ansible.vcf_nsx_segment:
    nsx_hostname: "{{ nsx_manager_hostname }}"
    nsx_username: "{{ nsx_username }}"
    nsx_password: "{{ nsx_password }}"
    state: present
    segment_id: vlan-10
    spec:
      display_name: vlan-10
      vlan_ids:
        - "{{ vlans.management.id }}"
      transport_zone_path: "{{ nsx_vlan_tz_path }}"
      subnets:
        - gateway_address: "{{ vlans.management.gateway }}/24"

- name: Create edge uplink segment (edge-uplink-vlan-60)
  vmware_vcf.ansible.vcf_nsx_segment:
    nsx_hostname: "{{ nsx_manager_hostname }}"
    nsx_username: "{{ nsx_username }}"
    nsx_password: "{{ nsx_password }}"
    state: present
    segment_id: "edge-uplink-vlan-{{ nsx_tier0_uplink_vlan }}"
    spec:
      display_name: "edge-uplink-vlan-{{ nsx_tier0_uplink_vlan }}"
      vlan_ids:
        - "{{ nsx_tier0_uplink_vlan }}"
      transport_zone_path: "{{ nsx_vlan_tz_path }}"
      subnets:
        - gateway_address: "{{ vlans.edge_uplink.gateway }}/24"

- name: Create edge TEP IP pool
  vmware_vcf.ansible.vcf_nsx_ip_pool:
    nsx_hostname: "{{ nsx_manager_hostname }}"
    nsx_username: "{{ nsx_username }}"
    nsx_password: "{{ nsx_password }}"
    state: present
    pool_id: edge-tep-pool
    spec:
      display_name: edge-tep-pool
      subnets:
        - cidr: "{{ ip_pool['edge-tep-pool'].subnet }}"
          allocation_ranges:
            - start: "{{ ip_pool['edge-tep-pool'].start_ip }}"
              end: "{{ ip_pool['edge-tep-pool'].end_ip }}"
          gateway_ip: "{{ ip_pool['edge-tep-pool'].gateway }}"

# --- Edge Cluster ---

- name: Create Edge transport nodes
  vmware_vcf.ansible.vcf_nsx_edge:
    nsx_hostname: "{{ nsx_manager_hostname }}"
    nsx_username: "{{ nsx_username }}"
    nsx_password: "{{ nsx_password }}"
    state: present
    resource_type: edge_node
    resource_id: "{{ item.name }}"
    spec:
      display_name: "{{ item.name }}"
      node_deployment_info:
        deployment_type: VIRTUAL_MACHINE
        deployment_config:
          vm_deployment_config:
            placement_type: VsphereDeploymentConfig
            compute_id: workload-cluster
            management_network_id: /infra/segments/vlan-10
          form_factor: "{{ nsx_edge_size }}"
          node_user_settings:
            cli_username: admin
            cli_password: "{{ nsx_password }}"
      host_switch_spec:
        host_switches:
          - host_switch_type: NVDS
            host_switch_name: edge-overlay
            transport_zone_endpoints:
              - transport_zone_name: "{{ nsx_overlay_tz_display_name }}"
            ip_assignment_spec:
              ip_pool_name: edge-tep-pool
              resource_type: StaticIpPoolSpec
          - host_switch_type: NVDS
            host_switch_name: edge-uplink
            transport_zone_endpoints:
              - transport_zone_name: "{{ nsx_vlan_tz_name }}"
            ip_assignment_spec:
              resource_type: AssignedByDhcp
  loop: "{{ nsx_edge_vms }}"

- name: Create Edge cluster
  vmware_vcf.ansible.vcf_nsx_edge:
    nsx_hostname: "{{ nsx_manager_hostname }}"
    nsx_username: "{{ nsx_username }}"
    nsx_password: "{{ nsx_password }}"
    state: present
    resource_type: edge_cluster
    resource_id: "{{ nsx_edge_cluster_name }}"
    spec:
      display_name: "{{ nsx_edge_cluster_name }}"
      members: >-
        {{ nsx_edge_vms | map(attribute='name')
           | map('regex_replace', '(.*)', '{"transport_node_id": "\1"}')
           | map('from_json') | list }}

# --- Tier-0 Gateway ---

- name: Create Tier-0 gateway
  vmware_vcf.ansible.vcf_nsx_gateway:
    nsx_hostname: "{{ nsx_manager_hostname }}"
    nsx_username: "{{ nsx_username }}"
    nsx_password: "{{ nsx_password }}"
    state: present
    gateway_type: tier0
    gateway_id: "{{ nsx_tier0_name }}"
    spec:
      display_name: "{{ nsx_tier0_name }}"
      ha_mode: "{{ nsx_tier0_ha_mode }}"

- name: Create Tier-0 uplink interface
  vmware_vcf.ansible.vcf_nsx_routing:
    nsx_hostname: "{{ nsx_manager_hostname }}"
    nsx_username: "{{ nsx_username }}"
    nsx_password: "{{ nsx_password }}"
    action: set_interface
    gateway_type: tier0
    gateway_id: "{{ nsx_tier0_name }}"
    resource_id: uplink-01
    spec:
      display_name: uplink-01
      type: EXTERNAL
      edge_path: "/infra/sites/default/enforcement-points/default/edge-clusters/{{ nsx_edge_cluster_name }}"
      segment_path: "/infra/segments/edge-uplink-vlan-{{ nsx_tier0_uplink_vlan }}"
      subnets:
        - ip_addresses:
            - "{{ nsx_tier0_uplink_ip }}"
          prefix_len: "{{ nsx_tier0_uplink_prefix }}"

- name: Configure BGP on Tier-0
  vmware_vcf.ansible.vcf_nsx_routing:
    nsx_hostname: "{{ nsx_manager_hostname }}"
    nsx_username: "{{ nsx_username }}"
    nsx_password: "{{ nsx_password }}"
    action: set_bgp
    gateway_type: tier0
    gateway_id: "{{ nsx_tier0_name }}"
    spec:
      local_as_num: "{{ nsx_bgp_local_asn }}"
      enabled: true
      route_aggregations: []

- name: Configure BGP neighbor (gateway)
  vmware_vcf.ansible.vcf_nsx_routing:
    nsx_hostname: "{{ nsx_manager_hostname }}"
    nsx_username: "{{ nsx_username }}"
    nsx_password: "{{ nsx_password }}"
    action: set_bgp_neighbor
    gateway_type: tier0
    gateway_id: "{{ nsx_tier0_name }}"
    resource_id: gateway-peer
    spec:
      display_name: Gateway BGP Peer
      neighbor_address: "{{ nsx_bgp_neighbor_ip }}"
      remote_as_num: "{{ nsx_bgp_neighbor_asn }}"
      keep_alive_time: "{{ bgp_keepalive }}"
      hold_down_time: "{{ bgp_holdtime }}"

- name: Configure Tier-0 route redistribution
  vmware_vcf.ansible.vcf_nsx_routing:
    nsx_hostname: "{{ nsx_manager_hostname }}"
    nsx_username: "{{ nsx_username }}"
    nsx_password: "{{ nsx_password }}"
    action: set_redistribution
    gateway_type: tier0
    gateway_id: "{{ nsx_tier0_name }}"
    spec:
      enabled: true
      redistribution_rules:
        - name: connected-and-nat
          route_redistribution_types:
            - TIER0_CONNECTED
            - TIER0_NAT

# --- Tier-1 Gateway ---

- name: Create Tier-1 gateway
  vmware_vcf.ansible.vcf_nsx_gateway:
    nsx_hostname: "{{ nsx_manager_hostname }}"
    nsx_username: "{{ nsx_username }}"
    nsx_password: "{{ nsx_password }}"
    state: present
    gateway_type: tier1
    gateway_id: "{{ nsx_tier1_name }}"
    spec:
      display_name: "{{ nsx_tier1_name }}"
      tier0_path: "/infra/tier-0s/{{ nsx_tier0_name }}"
      route_advertisement_types:
        - TIER1_CONNECTED
        - TIER1_NAT
        - TIER1_LB_VIP

# --- VPC ---

- name: Create VPC project
  vmware_vcf.ansible.vcf_nsx_vpc:
    nsx_hostname: "{{ nsx_manager_hostname }}"
    nsx_username: "{{ nsx_username }}"
    nsx_password: "{{ nsx_password }}"
    state: present
    resource_type: project
    project_id: "{{ nsx_vpc_project_name }}"
    spec:
      display_name: "{{ nsx_vpc_project_name }}"

- name: Create VPC
  vmware_vcf.ansible.vcf_nsx_vpc:
    nsx_hostname: "{{ nsx_manager_hostname }}"
    nsx_username: "{{ nsx_username }}"
    nsx_password: "{{ nsx_password }}"
    state: present
    resource_type: vpc
    project_id: "{{ nsx_vpc_project_name }}"
    vpc_id: "{{ nsx_vpc_name }}"
    spec:
      display_name: "{{ nsx_vpc_name }}"
      connectivity_path: "/infra/tier-0s/{{ nsx_tier0_name }}"

# --- SNAT Rules ---

- name: Create SNAT rules on Tier-0
  vmware_vcf.ansible.vcf_nsx_nat:
    nsx_hostname: "{{ nsx_manager_hostname }}"
    nsx_username: "{{ nsx_username }}"
    nsx_password: "{{ nsx_password }}"
    state: present
    gateway_type: tier0
    gateway_id: "{{ nsx_tier0_name }}"
    rule_id: "{{ item.name }}"
    spec:
      display_name: "{{ item.name }}"
      action: SNAT
      source_network: "{{ item.source_network }}"
      translated_network: "{{ item.translated_ip }}"
      enabled: true
      logging: false
  loop: "{{ nsx_snat_rules }}"

# --- Verification ---

- name: Verify BGP adjacency on gateway
  ansible.builtin.shell: vtysh -c 'show ip bgp summary'
  delegate_to: gateway
  register: bgp_summary
  changed_when: false

- name: Display BGP summary
  ansible.builtin.debug:
    msg: "{{ bgp_summary.stdout_lines }}"
