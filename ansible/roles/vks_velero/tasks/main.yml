---
# Phase 8 — Velero backup/restore (VKS Standard Package)
# Requires MinIO as S3-compatible storage backend.

# --- Ensure vcf_sdk is available ---

- name: Ensure vcf_sdk is available
  ansible.builtin.include_tasks: ../../common/tasks/ensure_vcf_sdk.yml

- name: Check if Velero is already enabled
  vmware_vcf.ansible.vcf_vcenter_supervisor_service:
    vcenter_hostname: "{{ vcenter_wld_hostname }}"
    vcenter_username: "{{ vcenter_wld_username }}"
    vcenter_password: "{{ vcenter_wld_password }}"
    action: get_cluster_service
    cluster_id: "{{ vks_supervisor_cluster }}"
    service_id: "{{ vks_velero_service_id }}"
  register: velero_status
  failed_when: false

- name: Get Velero versions
  vmware_vcf.ansible.vcf_vcenter_supervisor_service:
    vcenter_hostname: "{{ vcenter_wld_hostname }}"
    vcenter_username: "{{ vcenter_wld_username }}"
    vcenter_password: "{{ vcenter_wld_password }}"
    action: list_versions
    service_id: "{{ vks_velero_service_id }}"
  register: velero_versions
  when: velero_status.result is not defined or velero_status.failed | default(false)

- name: Set latest Velero version
  ansible.builtin.set_fact:
    vks_velero_version: "{{ velero_versions.result | sort(attribute='version', reverse=true) | first | attr('version') }}"
  when: velero_versions is not skipped

- name: Enable Velero on Supervisor cluster
  vmware_vcf.ansible.vcf_vcenter_supervisor_service:
    vcenter_hostname: "{{ vcenter_wld_hostname }}"
    vcenter_username: "{{ vcenter_wld_username }}"
    vcenter_password: "{{ vcenter_wld_password }}"
    action: enable_service
    cluster_id: "{{ vks_supervisor_cluster }}"
    service_id: "{{ vks_velero_service_id }}"
    spec:
      version: "{{ vks_velero_version }}"
  when: velero_status.result is not defined or velero_status.failed | default(false)

# --- Configure Velero with MinIO backend ---

- name: Create BackupStorageLocation
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: velero.io/v1
      kind: BackupStorageLocation
      metadata:
        name: default
        namespace: velero
      spec:
        provider: aws
        objectStorage:
          bucket: "{{ vks_velero_s3_bucket }}"
        config:
          region: "{{ vks_velero_s3_region }}"
          s3ForcePathStyle: "true"
          s3Url: "{{ vks_velero_s3_url }}"
        credential:
          name: velero-minio-credentials
          key: cloud
        default: true

- name: Create VolumeSnapshotLocation for vSphere CSI
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: velero.io/v1
      kind: VolumeSnapshotLocation
      metadata:
        name: default
        namespace: velero
      spec:
        provider: csi

- name: Create daily backup schedule
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: velero.io/v1
      kind: Schedule
      metadata:
        name: "{{ vks_velero_schedule_name }}"
        namespace: velero
      spec:
        schedule: "{{ vks_velero_schedule_cron }}"
        template:
          includedNamespaces:
            - "{{ vks_services_namespace }}"
          snapshotVolumes: true
          ttl: 168h0m0s

- name: Wait for BackupStorageLocation to be available
  kubernetes.core.k8s_info:
    api_version: velero.io/v1
    kind: BackupStorageLocation
    name: default
    namespace: velero
  register: bsl_status
  until: >
    bsl_status.resources | length > 0 and
    (bsl_status.resources[0].status.phase | default('')) == 'Available'
  retries: 20
  delay: 10

- name: Display Velero status
  ansible.builtin.debug:
    msg: >-
      Velero configured. BSL: MinIO ({{ vks_velero_s3_url }}/{{ vks_velero_s3_bucket }}).
      Schedule: {{ vks_velero_schedule_name }} ({{ vks_velero_schedule_cron }}).
