---
# Phase 5 — VCF Management Components
#
# Deploys VCF Operations, Collector, and Fleet Management via SDDC Manager API.
# Must complete before Identity Broker OIDC (which uses VCF Operations APIs).
#
# VCF Operations for Logs is deployed separately via Fleet Management UI
# after this deployment completes.

# --- Ensure vcf_sdk is available ---

- name: Ensure vcf_sdk is available
  ansible.builtin.include_tasks: ../../common/tasks/ensure_vcf_sdk.yml
  when: inventory_hostname != 'localhost'

# --- Ensure DNS records exist on gateway ---

- name: Ensure DNS for management components
  ansible.builtin.include_tasks: ../../common/tasks/ensure_dns.yml
  vars:
    dns_records:
      - { hostname: sddc-manager, ip: "{{ host_ip['sddc-manager'] }}" }
      - { hostname: vcenter-mgmt, ip: "{{ host_ip['vcenter-mgmt'] }}" }
      - { hostname: nsx-mgr-mgmt, ip: "{{ host_ip['nsx-mgr-mgmt'] }}" }
      - { hostname: vcf-ops, ip: "{{ host_ip['vcf-ops'] }}" }
      - { hostname: vcf-ops-collector, ip: "{{ host_ip['vcf-ops-collector'] }}" }
      - { hostname: vcf-ops-fleet, ip: "{{ host_ip['vcf-ops-fleet'] }}" }
      - { hostname: vcf-ops-logs, ip: "{{ host_ip['vcf-ops-logs'] }}" }
      - { hostname: vcf-ops-net, ip: "{{ host_ip['vcf-ops-net'] }}" }

# --- Ensure required bundles are downloaded ---
# Best practice: start bundle downloads manually via SDDC Manager UI
# immediately after bringup (Phase 3) while other phases proceed.
# This step is a safety net — if bundles weren't downloaded manually,
# it will trigger downloads and wait (can take 30+ minutes).

- name: Ensure VCF Operations bundles are downloaded
  ansible.builtin.command:
    cmd: "python3 {{ role_path }}/files/ensure_bundles.py"
  environment:
    SDDC_HOSTNAME: "{{ vcf_mgmt_hostname }}"
    SDDC_USERNAME: "{{ vcf_mgmt_username }}"
    SDDC_PASSWORD: "{{ vcf_mgmt_password }}"
  register: bundle_result

- name: Display bundle download status
  ansible.builtin.debug:
    msg: "{{ bundle_result.stdout_lines }}"

# --- Check current status ---

- name: Check current management components status
  vmware_vcf.ansible.vcf_management_components:
    sddc_hostname: "{{ vcf_mgmt_hostname }}"
    sddc_username: "{{ vcf_mgmt_username }}"
    sddc_password: "{{ vcf_mgmt_password }}"
    state: info
  register: mgmt_status
  failed_when: false

- name: Display current management components status
  ansible.builtin.debug:
    msg: "{{ mgmt_status.result | default('Not deployed') }}"

# --- Deploy ---

- name: Display deployment spec
  ansible.builtin.debug:
    msg: "{{ vcf_mgmt_components_spec | to_nice_json }}"

- name: Progress — deploying VCF Management Components
  ansible.builtin.debug:
    msg: "LONG RUNNING TASK — Deploying VCF Management Components (~30-60 min). Monitor progress at https://{{ vcf_mgmt_hostname }}. Track in SDDC Manager -> Tasks. This task will wait up to 2 hours for completion."

- name: Deploy VCF Management Components
  vmware_vcf.ansible.vcf_management_components:
    sddc_hostname: "{{ vcf_mgmt_hostname }}"
    sddc_username: "{{ vcf_mgmt_username }}"
    sddc_password: "{{ vcf_mgmt_password }}"
    state: present
    spec: "{{ vcf_mgmt_components_spec }}"
    validate: true
    wait: true
    wait_timeout: 7200
  register: deploy_result

- name: Display deployment result
  ansible.builtin.debug:
    msg: "VCF Management Components deployed: {{ deploy_result.result }}"
