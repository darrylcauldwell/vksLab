---
# Phase 5 — Deploy VCF Management Components
#
# Deploys VCF Operations, Collector, and Fleet Management via SDDC Manager API.
# Must complete before Identity Broker OIDC (which uses VCF Operations APIs).
#
# VCF Operations for Logs is deployed separately via Fleet Management UI
# after this deployment completes.

# --- Ensure DNS records exist on gateway ---

- name: Ensure DNS records for management components
  ansible.builtin.lineinfile:
    path: /etc/dnsmasq.d/lab.conf
    line: "host-record={{ item.hostname }}.{{ lab_domain }},{{ item.ip }}"
    regexp: "^host-record={{ item.hostname }}\\.{{ lab_domain | regex_escape }}"
    state: present
  loop:
    - { hostname: vcf-ops, ip: "{{ lab_mgmt_prefix }}.7" }
    - { hostname: vcf-ops-collector, ip: "{{ lab_mgmt_prefix }}.23" }
    - { hostname: vcf-ops-fleet, ip: "{{ lab_mgmt_prefix }}.24" }
  delegate_to: gateway
  become: true
  vars:
    ansible_connection: ssh
  register: dns_changes

- name: Restart dnsmasq if DNS records changed
  ansible.builtin.service:
    name: dnsmasq
    state: restarted
  delegate_to: gateway
  become: true
  vars:
    ansible_connection: ssh
  when: dns_changes.changed

- name: Verify DNS resolution from gateway
  ansible.builtin.command:
    cmd: "dig +short {{ item }}"
  loop:
    - "vcf-ops.{{ lab_domain }}"
    - "vcf-ops-collector.{{ lab_domain }}"
    - "vcf-ops-fleet.{{ lab_domain }}"
  delegate_to: gateway
  vars:
    ansible_connection: ssh
  register: dns_check
  changed_when: false

- name: Display DNS resolution
  ansible.builtin.debug:
    msg: "{{ item.item }}: {{ item.stdout }}"
  loop: "{{ dns_check.results }}"
  loop_control:
    label: "{{ item.item }}"

# --- Authenticate to SDDC Manager ---

- name: Get SDDC Manager bearer token
  vmware_vcf.ansible.vcf_sddc_info:
    sddc_hostname: "{{ vcf_mgmt_hostname }}"
    sddc_username: "{{ vcf_mgmt_username }}"
    sddc_password: "{{ vcf_mgmt_password }}"
    gather: token
  register: token_response
  no_log: true

- name: Set bearer token facts
  ansible.builtin.set_fact:
    sddc_token: "{{ token_response.result.bearer_token }}"
    sddc_refresh_token: "{{ token_response.result.refresh_token }}"
  no_log: true

# --- Check current status ---

- name: Check current management components status
  vmware_vcf.ansible.vcf_management_components:
    sddc_hostname: "{{ vcf_mgmt_hostname }}"
    sddc_bearer_token: "{{ sddc_token }}"
    sddc_refresh_token: "{{ sddc_refresh_token }}"
    state: info
  register: mgmt_status
  failed_when: false

- name: Display current management components status
  ansible.builtin.debug:
    msg: "{{ mgmt_status.result | default('Not deployed') }}"

# --- Deploy ---

- name: Display deployment spec
  ansible.builtin.debug:
    msg: "{{ vcf_mgmt_components_spec | to_nice_json }}"

- name: Deploy VCF Management Components
  vmware_vcf.ansible.vcf_management_components:
    sddc_hostname: "{{ vcf_mgmt_hostname }}"
    sddc_bearer_token: "{{ sddc_token }}"
    sddc_refresh_token: "{{ sddc_refresh_token }}"
    state: present
    spec: "{{ vcf_mgmt_components_spec }}"
    validate: true
    wait: true
    wait_timeout: 7200
  register: deploy_result

- name: Display deployment result
  ansible.builtin.debug:
    msg: "VCF Management Components deployed: {{ deploy_result.result }}"
