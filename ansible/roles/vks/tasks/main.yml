---
# Phase 8 — VCF Workload VKS: Content library, Supervisor, Namespace, VKS cluster
#
# All vCenter API calls go through vmware_vcf.ansible collection modules
# which use the requests library (SOCKS proxy compatible).

# --- Ensure vcf_sdk is available ---

- name: Ensure vcf_sdk is available
  ansible.builtin.include_tasks: ../../common/tasks/ensure_vcf_sdk.yml

# --- Ensure DNS for Phase 8 dependencies ---

- name: Ensure DNS for VKS
  ansible.builtin.include_tasks: ../../common/tasks/ensure_dns.yml
  vars:
    dns_records:
      - { hostname: vcenter-wld, ip: "{{ host_ip['vcenter-wld'] }}" }
      - { hostname: nsx-mgr-wld, ip: "{{ host_ip['nsx-mgr-wld'] }}" }

# --- Content Library ---

- name: Create subscribed content library
  vmware_vcf.ansible.vcf_vcenter_content_library:
    vcenter_hostname: "{{ vcenter_wld_hostname }}"
    vcenter_username: "{{ vcenter_wld_username }}"
    vcenter_password: "{{ vcenter_wld_password }}"
    state: present
    library_type: subscribed
    spec:
      name: "{{ vks_content_library_name }}"
      subscription_info:
        subscription_url: "{{ vks_content_library_url }}"
        automatic_sync_enabled: true
        on_demand: true
      storage_backings:
        - type: DATASTORE
          datastore_id: "{{ vks_datastore_id | default('datastore-1') }}"
  register: content_library_result

# --- Supervisor ---

- name: Check Supervisor status
  vmware_vcf.ansible.vcf_vcenter_supervisor:
    vcenter_hostname: "{{ vcenter_wld_hostname }}"
    vcenter_username: "{{ vcenter_wld_username }}"
    vcenter_password: "{{ vcenter_wld_password }}"
    action: list_supervisors
  register: supervisor_check

- name: Enable Supervisor on workload cluster
  vmware_vcf.ansible.vcf_vcenter_supervisor:
    vcenter_hostname: "{{ vcenter_wld_hostname }}"
    vcenter_username: "{{ vcenter_wld_username }}"
    vcenter_password: "{{ vcenter_wld_password }}"
    action: enable_supervisor
    cluster_id: "{{ vks_supervisor_cluster }}"
    spec:
      size_hint: SMALL
      network_provider: NSX_VPC
      default_kubernetes_service_content_library: "{{ vks_content_library_name }}"
  when: supervisor_check.result | length == 0

- name: Wait for Supervisor to be running
  vmware_vcf.ansible.vcf_vcenter_supervisor:
    vcenter_hostname: "{{ vcenter_wld_hostname }}"
    vcenter_username: "{{ vcenter_wld_username }}"
    vcenter_password: "{{ vcenter_wld_password }}"
    action: list_supervisors
  register: supervisor_status
  until: >
    (supervisor_status.result | selectattr('cluster', 'equalto', vks_supervisor_cluster) | first).config_status | default('') == "RUNNING"
  retries: 90
  delay: 30

# --- vSphere Namespace ---

- name: Create vSphere namespace
  vmware_vcf.ansible.vcf_vcenter_supervisor:
    vcenter_hostname: "{{ vcenter_wld_hostname }}"
    vcenter_username: "{{ vcenter_wld_username }}"
    vcenter_password: "{{ vcenter_wld_password }}"
    action: create_namespace
    spec:
      namespace: "{{ vks_namespace }}"
      cluster: "{{ vks_supervisor_cluster }}"
      vm_service_spec:
        vm_classes:
          - best-effort-small
          - best-effort-medium
        content_libraries:
          - "{{ vks_content_library_name }}"
      storage_specs:
        - policy: "{{ vks_storage_class }}"
  register: namespace_result

# --- VKS Cluster ---

- name: Discover available Kubernetes versions
  vmware_vcf.ansible.vcf_vcenter_supervisor:
    vcenter_hostname: "{{ vcenter_wld_hostname }}"
    vcenter_username: "{{ vcenter_wld_username }}"
    vcenter_password: "{{ vcenter_wld_password }}"
    action: list_k8s_versions
    cluster_id: "{{ vks_supervisor_cluster }}"
  register: k8s_versions

- name: Set latest Kubernetes version
  ansible.builtin.set_fact:
    vks_kubernetes_version: "{{ k8s_versions.result | sort(attribute='version', reverse=true) | first | attr('version') }}"

- name: Template VKS cluster manifest
  ansible.builtin.template:
    src: vks-cluster.yml.j2
    dest: /tmp/vks-cluster.yml
    mode: "0644"

- name: Apply VKS cluster manifest
  kubernetes.core.k8s:
    state: present
    src: /tmp/vks-cluster.yml
    wait: true
    wait_timeout: 1800
  register: vks_cluster_result

- name: Wait for VKS cluster to be provisioned
  kubernetes.core.k8s_info:
    api_version: cluster.x-k8s.io/v1beta1
    kind: Cluster
    name: "{{ vks_cluster_name }}"
    namespace: "{{ vks_namespace }}"
  register: cluster_status
  until: cluster_status.resources[0].status.phase | default('') == "Provisioned"
  retries: 60
  delay: 30

# --- Storage Verification ---

- name: Create test PVC
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: v1
      kind: PersistentVolumeClaim
      metadata:
        name: test-pvc
        namespace: "{{ vks_namespace }}"
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: "{{ vks_storage_class }}"
        resources:
          requests:
            storage: 1Gi
    wait: true
    wait_timeout: 300

- name: Verify PVC is bound
  kubernetes.core.k8s_info:
    kind: PersistentVolumeClaim
    name: test-pvc
    namespace: "{{ vks_namespace }}"
  register: pvc_status
  until: pvc_status.resources[0].status.phase == "Bound"
  retries: 20
  delay: 15

- name: Delete test PVC
  kubernetes.core.k8s:
    state: absent
    kind: PersistentVolumeClaim
    name: test-pvc
    namespace: "{{ vks_namespace }}"

# --- Test Workload ---

- name: Template test workload manifest
  ansible.builtin.template:
    src: test-workload.yml.j2
    dest: /tmp/test-workload.yml
    mode: "0644"

- name: Deploy test nginx workload
  kubernetes.core.k8s:
    state: present
    src: /tmp/test-workload.yml
    wait: true
    wait_timeout: 300

- name: Wait for nginx LoadBalancer IP
  kubernetes.core.k8s_info:
    kind: Service
    name: nginx-test
    namespace: "{{ vks_namespace }}"
  register: nginx_svc
  until: >
    nginx_svc.resources[0].status.loadBalancer.ingress | default([]) | length > 0
  retries: 20
  delay: 15

- name: Display nginx LoadBalancer IP
  ansible.builtin.debug:
    msg: "Nginx accessible at http://{{ nginx_svc.resources[0].status.loadBalancer.ingress[0].ip }}"
