---
# Phase 8 — Harbor container registry (VKS Standard Package)
# Requires cert-manager and Contour. Provides proxy cache for container images.

# --- Ensure vcf_sdk is available ---

- name: Ensure vcf_sdk is available
  ansible.builtin.include_tasks: ../../common/tasks/ensure_vcf_sdk.yml
  when: inventory_hostname != 'localhost'

- name: Check if Harbor is already enabled
  vmware_vcf.ansible.vcf_vcenter_supervisor_service:
    vcenter_hostname: "{{ vcenter_wld_hostname }}"
    vcenter_username: "{{ vcenter_wld_username }}"
    vcenter_password: "{{ vcenter_wld_password }}"
    action: get_cluster_service
    cluster_id: "{{ vks_supervisor_cluster }}"
    service_id: "{{ vks_harbor_service_id }}"
  register: harbor_status
  failed_when: false

- name: Get Harbor versions
  vmware_vcf.ansible.vcf_vcenter_supervisor_service:
    vcenter_hostname: "{{ vcenter_wld_hostname }}"
    vcenter_username: "{{ vcenter_wld_username }}"
    vcenter_password: "{{ vcenter_wld_password }}"
    action: list_versions
    service_id: "{{ vks_harbor_service_id }}"
  register: harbor_versions
  when: harbor_status.result is not defined or harbor_status.failed | default(false)

- name: Set latest Harbor version
  ansible.builtin.set_fact:
    vks_harbor_version: "{{ harbor_versions.result | sort(attribute='version', reverse=true) | first | attr('version') }}"
  when: harbor_versions is not skipped

- name: Enable Harbor on Supervisor cluster
  vmware_vcf.ansible.vcf_vcenter_supervisor_service:
    vcenter_hostname: "{{ vcenter_wld_hostname }}"
    vcenter_username: "{{ vcenter_wld_username }}"
    vcenter_password: "{{ vcenter_wld_password }}"
    action: enable_service
    cluster_id: "{{ vks_supervisor_cluster }}"
    service_id: "{{ vks_harbor_service_id }}"
    spec:
      version: "{{ vks_harbor_version }}"
  when: harbor_status.result is not defined or harbor_status.failed | default(false)

- name: Create Contour HTTPProxy for Harbor (TLS via lab CA)
  kubernetes.core.k8s:
    state: present
    definition:
      apiVersion: projectcontour.io/v1
      kind: HTTPProxy
      metadata:
        name: harbor
        namespace: "{{ vks_services_namespace }}"
        annotations:
          cert-manager.io/cluster-issuer: lab-ca
      spec:
        virtualhost:
          fqdn: "{{ vks_harbor_hostname }}"
          tls:
            secretName: harbor-tls
        routes:
          - conditions:
              - prefix: /
            services:
              - name: harbor-core
                port: 80

# --- Configure GHCR proxy cache project ---

- name: Wait for Harbor API to be ready
  ansible.builtin.uri:
    url: "https://{{ vks_harbor_hostname }}/api/v2.0/health"
    validate_certs: true
    status_code: [200]
  register: harbor_health
  until: harbor_health.status == 200
  retries: 30
  delay: 15

- name: Check if ghcr-proxy project exists
  ansible.builtin.uri:
    url: "https://{{ vks_harbor_hostname }}/api/v2.0/projects/ghcr-proxy"
    validate_certs: true
    method: GET
    headers:
      Authorization: "Basic {{ ('admin:' + bootstrap_password) | b64encode }}"
    status_code: [200, 404]
  register: ghcr_project_check

- name: Create GHCR registry endpoint
  ansible.builtin.uri:
    url: "https://{{ vks_harbor_hostname }}/api/v2.0/registries"
    validate_certs: true
    method: POST
    headers:
      Authorization: "Basic {{ ('admin:' + bootstrap_password) | b64encode }}"
      Content-Type: application/json
    body_format: json
    body:
      name: ghcr
      type: github-ghcr
      url: https://ghcr.io
    status_code: [201, 409]
  when: ghcr_project_check.status == 404

- name: Get GHCR registry ID
  ansible.builtin.uri:
    url: "https://{{ vks_harbor_hostname }}/api/v2.0/registries?name=ghcr"
    validate_certs: true
    method: GET
    headers:
      Authorization: "Basic {{ ('admin:' + bootstrap_password) | b64encode }}"
  register: ghcr_registry
  when: ghcr_project_check.status == 404

- name: Create ghcr-proxy project
  ansible.builtin.uri:
    url: "https://{{ vks_harbor_hostname }}/api/v2.0/projects"
    validate_certs: true
    method: POST
    headers:
      Authorization: "Basic {{ ('admin:' + bootstrap_password) | b64encode }}"
      Content-Type: application/json
    body_format: json
    body:
      project_name: ghcr-proxy
      registry_id: "{{ ghcr_registry.json[0].id }}"
      public: true
      metadata:
        public: "true"
    status_code: [201]
  when: ghcr_project_check.status == 404

- name: Display Harbor status
  ansible.builtin.debug:
    msg: >-
      Harbor configured. UI at https://{{ vks_harbor_hostname }}.
      Pull images via: harbor.{{ lab_domain }}/ghcr-proxy/<owner>/<image>:<tag>
