vcf_auto_hostname: "vcf-auto.{{ lab_domain }}"

# SDDC Manager (for deployment)
vcf_mgmt_hostname: "sddc-manager.{{ lab_domain }}"
vcf_mgmt_username: admin@local
vcf_mgmt_password: "{{ sddc_admin_password }}"

# Keycloak OIDC
keycloak_hostname: "gateway.{{ lab_domain }}"
keycloak_port: 8443
keycloak_realm: lab

# Provider organisation
vcf_auto_provider_org_name: lab-provider

# Tenant organisation
vcf_auto_tenant_org_name: lab-tenant
vcf_auto_tenant_project_name: lab-project

# VKSM
vcf_auto_vksm_proxy_version: "0.4.0"

# Workload vCenter (for VKSM Supervisor Service upload)
vcenter_wld_hostname: "vcenter-wld.{{ lab_domain }}"
vcenter_wld_username: "administrator@vsphere.local"
vcenter_wld_password: "{{ vcenter_sso_password }}"
vks_supervisor_cluster: workload-cluster
