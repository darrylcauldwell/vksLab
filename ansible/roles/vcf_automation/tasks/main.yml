---
# Phase 9 — VCF Automation
# Deploy VCF Automation, configure Provider/Tenant organisations,
# enable VKSM, and configure self-service catalog.

# --- Ensure DNS ---

- name: Ensure DNS for VCF Automation
  ansible.builtin.include_tasks: ../../common/tasks/ensure_dns.yml
  vars:
    dns_records:
      - { hostname: vcf-auto, ip: "{{ host_ip['vcf-auto'] }}" }
      - { hostname: sddc-manager, ip: "{{ host_ip['sddc-manager'] }}" }

# --- Deploy VCF Automation via SDDC Manager ---

- name: Get SDDC Manager bearer token
  vmware_vcf.ansible.vcf_sddc_info:
    sddc_hostname: "{{ vcf_mgmt_hostname }}"
    sddc_username: "{{ vcf_mgmt_username }}"
    sddc_password: "{{ vcf_mgmt_password }}"
    gather: token
  register: token_response
  no_log: true

- name: Set bearer token facts
  ansible.builtin.set_fact:
    sddc_token: "{{ token_response.result.bearer_token }}"
    sddc_refresh_token: "{{ token_response.result.refresh_token }}"
  no_log: true

# VCF Automation deployment via SDDC Manager API
# Note: The exact API spec for VCF Automation deployment will need
# validation against the SDDC Manager API when we reach this phase.
# The deployment pattern follows vcf_mgmt_components (Phase 5).

- name: "LONG RUNNING TASK — Deploying VCF Automation (~45-60 min)"
  ansible.builtin.debug:
    msg: "VCF Automation deployment starting. Monitor progress in SDDC Manager → Tasks."

