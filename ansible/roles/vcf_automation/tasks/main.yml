---
# Phase 9 — VCF Automation
# Deploy VCF Automation, configure Provider/Tenant organisations,
# enable VKSM, and configure self-service catalog.

# --- Ensure vcf_sdk is available ---

- name: Ensure vcf_sdk is available
  ansible.builtin.include_tasks: ../../common/tasks/ensure_vcf_sdk.yml

# --- Ensure DNS ---

- name: Ensure DNS for VCF Automation
  ansible.builtin.include_tasks: ../../common/tasks/ensure_dns.yml
  vars:
    dns_records:
      - { hostname: vcf-auto, ip: "{{ host_ip['vcf-auto'] }}" }
      - { hostname: sddc-manager, ip: "{{ host_ip['sddc-manager'] }}" }

# --- Deploy VCF Automation via SDDC Manager ---

- name: Check VCF Automation deployment status
  vmware_vcf.ansible.vcf_automation:
    sddc_hostname: "{{ vcf_mgmt_hostname }}"
    sddc_username: "{{ vcf_mgmt_username }}"
    sddc_password: "{{ vcf_mgmt_password }}"
    state: info
  register: vcf_auto_status
  failed_when: false

- name: Display current VCF Automation status
  ansible.builtin.debug:
    msg: "{{ vcf_auto_status.result | default('Not deployed') }}"

- name: Progress — deploying VCF Automation
  ansible.builtin.debug:
    msg: "LONG RUNNING TASK — Deploying VCF Automation (~45-60 min). Monitor progress at https://{{ vcf_mgmt_hostname }}. Track in SDDC Manager -> Tasks. This task will wait up to 2 hours for completion."
  when: vcf_auto_status.result | default({}) | length == 0

- name: Deploy VCF Automation
  vmware_vcf.ansible.vcf_automation:
    sddc_hostname: "{{ vcf_mgmt_hostname }}"
    sddc_username: "{{ vcf_mgmt_username }}"
    sddc_password: "{{ vcf_mgmt_password }}"
    state: present
    spec: "{{ vcf_auto_deploy_spec }}"
    validate: true
    wait: true
    wait_timeout: 7200
  register: deploy_result
  when: vcf_auto_status.result | default({}) | length == 0

- name: Display deployment result
  ansible.builtin.debug:
    msg: "VCF Automation deployed: {{ deploy_result.result | default(vcf_auto_status.result) }}"

# --- Wait for VCF Automation to be accessible ---

- name: Wait for VCF Automation HTTPS to be reachable
  ansible.builtin.uri:
    url: "https://{{ vcf_auto_hostname }}/health"
    method: GET
    validate_certs: false
    status_code: [200, 204, 301, 302, 401, 403]
  register: health_check
  retries: 30
  delay: 30
  until: health_check.status in [200, 204, 301, 302, 401, 403]
  failed_when: false

- name: Display VCF Automation accessibility
  ansible.builtin.debug:
    msg: "VCF Automation reachable: {{ health_check.status | default('unreachable') }}"

# --- Step 1: Configure Keycloak OIDC clients on gateway ---

- name: Create VCF Automation Provider OIDC client in Keycloak
  community.general.keycloak_client:
    auth_keycloak_url: "https://{{ keycloak_hostname }}:{{ keycloak_port }}"
    auth_realm: master
    auth_username: admin
    auth_password: "{{ keycloak_admin_password }}"
    validate_certs: false
    realm: "{{ keycloak_realm }}"
    client_id: "{{ vcf_auto_provider_oidc_client_id }}"
    name: VCF Automation Provider
    secret: "{{ vcf_auto_provider_oidc_client_secret }}"
    enabled: true
    protocol: openid-connect
    public_client: false
    standard_flow_enabled: true
    protocol_mappers:
      - name: group-membership
        protocol: openid-connect
        protocolMapper: oidc-group-membership-mapper
        config:
          claim.name: groups
          full.path: "false"
          id.token.claim: "true"
          access.token.claim: "true"
          userinfo.token.claim: "true"
    state: present
  delegate_to: gateway
  vars:
    ansible_connection: ssh

- name: Create VCF Automation Tenant OIDC client in Keycloak
  community.general.keycloak_client:
    auth_keycloak_url: "https://{{ keycloak_hostname }}:{{ keycloak_port }}"
    auth_realm: master
    auth_username: admin
    auth_password: "{{ keycloak_admin_password }}"
    validate_certs: false
    realm: "{{ keycloak_realm }}"
    client_id: "{{ vcf_auto_tenant_oidc_client_id }}"
    name: VCF Automation Tenant
    secret: "{{ vcf_auto_tenant_oidc_client_secret }}"
    enabled: true
    protocol: openid-connect
    public_client: false
    standard_flow_enabled: true
    protocol_mappers:
      - name: group-membership
        protocol: openid-connect
        protocolMapper: oidc-group-membership-mapper
        config:
          claim.name: groups
          full.path: "false"
          id.token.claim: "true"
          access.token.claim: "true"
          userinfo.token.claim: "true"
    state: present
  delegate_to: gateway
  vars:
    ansible_connection: ssh

- name: Display Keycloak OIDC clients configured
  ansible.builtin.debug:
    msg: "Keycloak OIDC clients created: {{ vcf_auto_provider_oidc_client_id }}, {{ vcf_auto_tenant_oidc_client_id }}"

# --- Step 2: Configure Provider Organisation with Keycloak OIDC ---
# VCF Automation REST API — POST /csp/gateway/am/api/orgs/{orgId}/identity-providers
# The Provider Org is the built-in org that exists after deployment.
# We configure it to use Keycloak as the OIDC identity source.

- name: Fetch step-ca root certificate from gateway
  ansible.builtin.fetch:
    src: /etc/step-ca/certs/root_ca.crt
    dest: /tmp/lab-root-ca.crt
    flat: true
  delegate_to: gateway
  vars:
    ansible_connection: ssh

- name: Get VCF Automation CSP token
  # VCF Automation uses a CSP-style token endpoint at /csp/gateway/am/api/login
  # The default admin credentials are set during SDDC Manager deployment.
  ansible.builtin.uri:
    url: "https://{{ vcf_auto_hostname }}/csp/gateway/am/api/login"
    method: POST
    body_format: json
    body:
      username: admin
      password: "{{ vcf_mgmt_password }}"
    validate_certs: false
    status_code: [200]
  register: vcf_auto_csp_token
  no_log: true

- name: Set VCF Automation access token
  ansible.builtin.set_fact:
    vcf_auto_access_token: "{{ vcf_auto_csp_token.json.cspAuthToken }}"
  no_log: true

- name: Get Provider Organisation ID
  # VCF Automation REST API — GET /csp/gateway/am/api/orgs
  # The first org returned is the Provider org.
  ansible.builtin.uri:
    url: "https://{{ vcf_auto_hostname }}/csp/gateway/am/api/orgs"
    method: GET
    headers:
      Authorization: "Bearer {{ vcf_auto_access_token }}"
    validate_certs: false
  register: vcf_auto_orgs

- name: Set Provider Org ID
  ansible.builtin.set_fact:
    vcf_auto_provider_org_id: "{{ vcf_auto_orgs.json.items[0].id }}"

- name: Read lab CA certificate
  ansible.builtin.slurp:
    src: "{{ ca_cert_path }}"
  register: lab_ca_cert

- name: Configure Provider Org OIDC identity source
  # VCF Automation REST API — POST /csp/gateway/am/api/orgs/{orgId}/identity-providers
  # Configures Keycloak as the external OIDC identity source for the Provider org.
  ansible.builtin.uri:
    url: "https://{{ vcf_auto_hostname }}/csp/gateway/am/api/orgs/{{ vcf_auto_provider_org_id }}/identity-providers"
    method: POST
    headers:
      Authorization: "Bearer {{ vcf_auto_access_token }}"
      Content-Type: application/json
    body_format: json
    body:
      name: Keycloak
      type: OIDC
      issuerUri: "https://{{ keycloak_hostname }}:{{ keycloak_port }}/realms/{{ keycloak_realm }}"
      clientId: "{{ vcf_auto_provider_oidc_client_id }}"
      clientSecret: "{{ vcf_auto_provider_oidc_client_secret }}"
      groupsClaim: groups
      pemEncoded: "{{ lab_ca_cert.content | b64decode }}"
    validate_certs: false
    status_code: [200, 201]
  register: provider_oidc_result
  # API may return 409 if already configured — treat as success
  failed_when: provider_oidc_result.status not in [200, 201, 409]

- name: Map vcf-admins group to Organisation Administrator in Provider Org
  # VCF Automation REST API — PUT /csp/gateway/am/api/orgs/{orgId}/groups
  # Maps the Keycloak vcf-admins group to the org_owner role.
  ansible.builtin.uri:
    url: "https://{{ vcf_auto_hostname }}/csp/gateway/am/api/orgs/{{ vcf_auto_provider_org_id }}/groups"
    method: PUT
    headers:
      Authorization: "Bearer {{ vcf_auto_access_token }}"
      Content-Type: application/json
    body_format: json
    body:
      displayName: vcf-admins
      organizationRoles:
        - name: org_owner
    validate_certs: false
    status_code: [200, 201]
  failed_when: false

- name: Display Provider Org OIDC configuration
  ansible.builtin.debug:
    msg: "Provider Org '{{ vcf_auto_provider_org_name }}' configured with Keycloak OIDC"

# --- Step 3: Create Tenant Organisation ---
# VCF Automation REST API — POST /csp/gateway/am/api/orgs

- name: Create Tenant Organisation
  # VCF Automation REST API — POST /csp/gateway/am/api/orgs
  ansible.builtin.uri:
    url: "https://{{ vcf_auto_hostname }}/csp/gateway/am/api/orgs"
    method: POST
    headers:
      Authorization: "Bearer {{ vcf_auto_access_token }}"
      Content-Type: application/json
    body_format: json
    body:
      name: "{{ vcf_auto_tenant_org_name }}"
      displayName: "{{ vcf_auto_tenant_org_name }}"
    validate_certs: false
    status_code: [200, 201]
  register: tenant_org_result
  failed_when: tenant_org_result.status not in [200, 201, 409]

- name: Set Tenant Org ID
  ansible.builtin.set_fact:
    vcf_auto_tenant_org_id: "{{ tenant_org_result.json.id | default('') }}"
  when: tenant_org_result.status in [200, 201]

- name: Get Tenant Org ID (if already exists)
  ansible.builtin.uri:
    url: "https://{{ vcf_auto_hostname }}/csp/gateway/am/api/orgs"
    method: GET
    headers:
      Authorization: "Bearer {{ vcf_auto_access_token }}"
    validate_certs: false
  register: all_orgs
  when: tenant_org_result.status == 409

- name: Set Tenant Org ID from existing orgs
  ansible.builtin.set_fact:
    vcf_auto_tenant_org_id: "{{ (all_orgs.json.items | selectattr('name', 'equalto', vcf_auto_tenant_org_name) | first).id }}"
  when: tenant_org_result.status == 409

- name: Configure Tenant Org OIDC identity source
  # VCF Automation REST API — POST /csp/gateway/am/api/orgs/{orgId}/identity-providers
  ansible.builtin.uri:
    url: "https://{{ vcf_auto_hostname }}/csp/gateway/am/api/orgs/{{ vcf_auto_tenant_org_id }}/identity-providers"
    method: POST
    headers:
      Authorization: "Bearer {{ vcf_auto_access_token }}"
      Content-Type: application/json
    body_format: json
    body:
      name: Keycloak
      type: OIDC
      issuerUri: "https://{{ keycloak_hostname }}:{{ keycloak_port }}/realms/{{ keycloak_realm }}"
      clientId: "{{ vcf_auto_tenant_oidc_client_id }}"
      clientSecret: "{{ vcf_auto_tenant_oidc_client_secret }}"
      groupsClaim: groups
      pemEncoded: "{{ lab_ca_cert.content | b64decode }}"
    validate_certs: false
    status_code: [200, 201]
  register: tenant_oidc_result
  failed_when: tenant_oidc_result.status not in [200, 201, 409]

- name: Map vcf-operators group to Project Administrator in Tenant Org
  # VCF Automation REST API — PUT /csp/gateway/am/api/orgs/{orgId}/groups
  ansible.builtin.uri:
    url: "https://{{ vcf_auto_hostname }}/csp/gateway/am/api/orgs/{{ vcf_auto_tenant_org_id }}/groups"
    method: PUT
    headers:
      Authorization: "Bearer {{ vcf_auto_access_token }}"
      Content-Type: application/json
    body_format: json
    body:
      displayName: vcf-operators
      organizationRoles:
        - name: project_admin
    validate_certs: false
    status_code: [200, 201]
  failed_when: false

- name: Display Tenant Organisation created
  ansible.builtin.debug:
    msg: "Tenant Org '{{ vcf_auto_tenant_org_name }}' created (ID: {{ vcf_auto_tenant_org_id }})"

# --- Step 4: Create Project mapping to NSX Project ---
# VCF Automation REST API — POST /project-service/api/projects
# The project connects VCF Automation to the NSX VPC/Project for
# self-service network and Kubernetes provisioning.

- name: Create VCF Automation Project
  # VCF Automation REST API — POST /project-service/api/projects
  # This maps to the NSX Project for VPC networking.
  ansible.builtin.uri:
    url: "https://{{ vcf_auto_hostname }}/project-service/api/projects"
    method: POST
    headers:
      Authorization: "Bearer {{ vcf_auto_access_token }}"
      Content-Type: application/json
      orgId: "{{ vcf_auto_tenant_org_id }}"
    body_format: json
    body:
      name: "{{ vcf_auto_tenant_project_name }}"
      description: "Lab project mapped to NSX Project {{ vcf_auto_nsx_project_name }}"
      constraints:
        network:
          - tag: "nsx-project:{{ vcf_auto_nsx_project_name }}"
    validate_certs: false
    status_code: [200, 201]
  register: project_result
  failed_when: project_result.status not in [200, 201, 409]

- name: Display Project creation result
  ansible.builtin.debug:
    msg: "Project '{{ vcf_auto_tenant_project_name }}' created in tenant org"

# --- Step 5: Upload VKSM Supervisor Management Proxy manifest ---
# This registers the Supervisor Management Proxy service in vCenter
# so that VCF Automation can manage VKS clusters through it.

- name: Upload VKSM Supervisor Management Proxy to vCenter
  vmware_vcf.ansible.vcf_vcenter_supervisor_service:
    vcenter_hostname: "{{ vcenter_wld_hostname }}"
    vcenter_username: "{{ vcenter_wld_username }}"
    vcenter_password: "{{ vcenter_wld_password }}"
    action: enable_service
    cluster_id: "{{ vks_supervisor_cluster }}"
    service_id: supervisor-management-proxy
    spec:
      version: "{{ vcf_auto_vksm_proxy_version }}"
  register: vksm_upload_result
  failed_when: false

- name: Display VKSM upload result
  ansible.builtin.debug:
    msg: "VKSM Supervisor Management Proxy: {{ vksm_upload_result.result | default('upload attempted') }}"

# --- Step 6: Configure VKSM with VCF Automation FQDN ---
# VCF Automation REST API — PUT /vksm/api/v1/config
# Tells VKSM where to find VCF Automation for self-service VKS provisioning.

- name: Configure VKSM with VCF Automation endpoint
  # VCF Automation REST API — PUT /vksm/api/v1/config
  # Registers the VCF Automation FQDN so VKSM can proxy VKS requests.
  ansible.builtin.uri:
    url: "https://{{ vcf_auto_hostname }}/vksm/api/v1/config"
    method: PUT
    headers:
      Authorization: "Bearer {{ vcf_auto_access_token }}"
      Content-Type: application/json
    body_format: json
    body:
      automationEndpoint: "https://{{ vcf_auto_hostname }}"
    validate_certs: false
    status_code: [200, 201, 204]
  register: vksm_config_result
  failed_when: vksm_config_result.status not in [200, 201, 204, 409]

- name: Display VKSM configuration result
  ansible.builtin.debug:
    msg: "VKSM configured with VCF Automation endpoint: https://{{ vcf_auto_hostname }}"

# --- Summary ---

- name: Display VCF Automation Phase 9 summary
  ansible.builtin.debug:
    msg: >-
      Phase 9 complete.
      VCF Automation deployed at https://{{ vcf_auto_hostname }}.
      Provider Org '{{ vcf_auto_provider_org_name }}' configured with Keycloak OIDC.
      Tenant Org '{{ vcf_auto_tenant_org_name }}' created with project '{{ vcf_auto_tenant_project_name }}'.
      VKSM Supervisor Management Proxy enabled and configured.
