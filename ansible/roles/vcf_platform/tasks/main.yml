---
# Phase 5 — Platform hygiene tasks
# CA certificate replacement and backup configuration
# Note: VCF Installer VM removal is a manual step (no SDDC Manager API for it)

# --- Authenticate to SDDC Manager ---

- name: Get SDDC Manager bearer token
  vmware_vcf.ansible.vcf_sddc_info:
    sddc_hostname: "sddc-manager.{{ lab_domain }}"
    sddc_username: admin@local
    sddc_password: "{{ sddc_admin_password }}"
    gather: token
  register: token_response
  no_log: true

- name: Set bearer token facts
  ansible.builtin.set_fact:
    sddc_token: "{{ token_response.result.bearer_token }}"
    sddc_refresh_token: "{{ token_response.result.refresh_token }}"
  no_log: true

# --- CA Certificate Replacement ---
# TODO: Replace VCF component self-signed certs with step-ca issued certs
#   1. Import step-ca root cert as trusted CA in SDDC Manager
#   2. Generate CSRs for vCenter, NSX Manager, SDDC Manager
#   3. Sign CSRs with step-ca on the gateway
#   4. Install signed certificates via SDDC Manager API

- name: CA certificate replacement (not yet implemented)
  ansible.builtin.debug:
    msg: "Certificate replacement pending — VCF components using self-signed certificates"

# --- Configure SDDC Manager Backups ---
# Backups target the gateway via SFTP.

- name: Create backup directory on gateway
  ansible.builtin.file:
    path: /home/ubuntu/vcf-backups
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0700"
  delegate_to: gateway
  vars:
    ansible_connection: ssh

- name: Get gateway SSH host key fingerprint
  ansible.builtin.shell:
    cmd: "ls /etc/ssh/ssh_host_*_key.pub | head -1 | xargs ssh-keygen -lf | awk '{print $2}'"
  register: ssh_fingerprint
  changed_when: false
  delegate_to: gateway
  vars:
    ansible_connection: ssh

- name: Verify fingerprint was retrieved
  ansible.builtin.assert:
    that: ssh_fingerprint.stdout | length > 0
    fail_msg: "Failed to retrieve SSH fingerprint from gateway. stdout={{ ssh_fingerprint.stdout }} stderr={{ ssh_fingerprint.stderr }}"

- name: Display SSH fingerprint
  ansible.builtin.debug:
    msg: "Gateway SSH fingerprint: {{ ssh_fingerprint.stdout }}"

- name: Configure SDDC Manager backup target
  vmware_vcf.ansible.vcf_backup:
    sddc_hostname: "sddc-manager.{{ lab_domain }}"
    sddc_bearer_token: "{{ sddc_token }}"
    sddc_refresh_token: "{{ sddc_refresh_token }}"
    action: set_config
    spec:
      backupLocations:
        - directoryPath: /home/ubuntu/vcf-backups
          password: "{{ bootstrap_password }}"
          port: 22
          protocol: SFTP
          server: "{{ lab_gateway }}"
          username: ubuntu
          sshFingerprint: "{{ ssh_fingerprint.stdout }}"
      encryption:
        passphrase: "{{ sddc_admin_password }}"
      isCurrentBackupInProgress: false
  register: backup_config

- name: Display backup configuration
  ansible.builtin.debug:
    msg: "Backup configured: {{ backup_config }}"
