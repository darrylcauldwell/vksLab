---
# Single validation poll iteration
# Required vars: vcf_bringup_hostname, _vcf_token, _validation_id

- name: "Poll validation [{{ poll_iteration }}] ({{ poll_iteration * 10 }}s)"
  vmware_vcf.ansible.vcf_cloud_builder:
    hostname: "{{ vcf_bringup_hostname }}"
    bearer_token: "{{ _vcf_token }}"
    state: get_validation
    id: "{{ _validation_id }}"
  register: _poll_result

- name: "Validation [{{ poll_iteration }}] ({{ poll_iteration * 10 }}s): {{ _poll_result.msg | default('polling...') }}"
  ansible.builtin.debug:
    msg: "{{ _poll_result.msg | default('polling...') }}"

- name: Set completion state
  ansible.builtin.set_fact:
    _poll_complete: "{{ _poll_result.execution_status | default('') == 'COMPLETED' }}"
    _poll_final: "{{ _poll_result }}"

- name: Wait 10s
  ansible.builtin.pause:
    seconds: 10
  when: _poll_result.execution_status | default('') != 'COMPLETED'
