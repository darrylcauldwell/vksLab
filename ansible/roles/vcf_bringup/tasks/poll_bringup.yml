---
# Single bringup poll iteration
# Required vars: vcf_bringup_hostname, vcf_bringup_username, vcf_bringup_password
#                _vcf_token, _bringup_id
#
# Every 50 iterations (~50 min): re-authenticates with username/password to get fresh token.
# All other iterations: uses existing bearer_token (no auth request).

- name: "Poll bringup [{{ poll_iteration }}] ({{ poll_iteration }}m) — with token refresh"
  vmware_vcf.ansible.vcf_cloud_builder:
    hostname: "{{ vcf_bringup_hostname }}"
    username: "{{ vcf_bringup_username }}"
    password: "{{ vcf_bringup_password }}"
    state: get_bringup
    id: "{{ _bringup_id }}"
  register: _poll_result
  failed_when: false
  when: poll_iteration % 50 == 0

- name: Update token after refresh
  ansible.builtin.set_fact:
    _vcf_token: "{{ _poll_result.bearer_token }}"
  when:
    - poll_iteration % 50 == 0
    - _poll_result.bearer_token is defined
  no_log: true

- name: "Poll bringup [{{ poll_iteration }}] ({{ poll_iteration }}m)"
  vmware_vcf.ansible.vcf_cloud_builder:
    hostname: "{{ vcf_bringup_hostname }}"
    bearer_token: "{{ _vcf_token }}"
    state: get_bringup
    id: "{{ _bringup_id }}"
  register: _poll_result
  failed_when: false
  when: poll_iteration % 50 != 0

- name: "Bringup [{{ poll_iteration }}] ({{ poll_iteration }}m): {{ _poll_result.msg | default(_poll_result.status | default('UNKNOWN')) }}"
  ansible.builtin.debug:
    msg: "{{ _poll_result.msg | default(_poll_result.status | default('UNKNOWN')) }}"

- name: Set completion state
  ansible.builtin.set_fact:
    _poll_complete: "{{ _poll_result.status | default('') in ['COMPLETED_WITH_SUCCESS', 'COMPLETED_WITH_FAILURE'] }}"
    _poll_final: "{{ _poll_result }}"
  when: _poll_result is not failed

- name: Wait 60s
  ansible.builtin.pause:
    seconds: 60
  when: _poll_result.status | default('') not in ['COMPLETED_WITH_SUCCESS', 'COMPLETED_WITH_FAILURE']
