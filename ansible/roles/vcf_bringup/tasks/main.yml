---
# VCF management domain bringup via Cloud Builder API

# --- Depot configuration and bundle download ---
# The VCF Installer needs bundles downloaded from the depot before
# validation or bringup can proceed.

- name: Get VCF Installer API token
  ansible.builtin.uri:
    url: "https://{{ vcf_bringup_hostname }}/v1/tokens"
    method: POST
    body_format: json
    body:
      username: "{{ vcf_bringup_username }}"
      password: "{{ vcf_bringup_password }}"
    validate_certs: false
    status_code: 200
  register: token_response

- name: Configure VCF depot
  ansible.builtin.uri:
    url: "https://{{ vcf_bringup_hostname }}/v1/system/settings/depot"
    method: PUT
    headers:
      Authorization: "Bearer {{ token_response.json.accessToken }}"
    body_format: json
    body:
      offlineAccount:
        username: "{{ depot_username }}"
        password: "{{ depot_password }}"
      depotConfiguration:
        isOfflineDepot: true
        hostname: "{{ vcf_depot_url }}"
        port: 443
    validate_certs: false
    status_code: [200, 202, 204]
    timeout: 300
  register: depot_result

- name: Display depot configuration result
  ansible.builtin.debug:
    msg: "Depot configured: {{ depot_result.status }}"

# Bundle download is a manual step via the VCF Installer UI (see deliver guide §6.2.1).
# Automation tracked in GitHub issue #80.

# --- Pre-validation: vSAN ESA HCL bypass and timestamp patch ---
# Nested ESXi uses virtual NVMe disks not on the vSAN HCL. VCF 9.0.1+
# has a built-in bypass via the domainmanager property below. Also patch
# the HCL timestamp in case the OVA is > 90 days old.
#
# All SSH commands use a script block to avoid shell escaping issues.
# Each step is independent — failures are handled individually.

- name: Create vSAN ESA workaround script
  ansible.builtin.copy:
    dest: /tmp/vcf-vsan-workaround.sh
    mode: "0755"
    content: |
      #!/bin/bash
      set -e

      # 1. Enable vSAN ESA HCL bypass (idempotent)
      PROP_FILE=/etc/vmware/vcf/domainmanager/application-prod.properties
      PROP_KEY="vsan.esa.sddc.managed.disk.claim=true"
      if grep -q "$PROP_KEY" "$PROP_FILE" 2>/dev/null; then
        echo "HCL_BYPASS: already configured"
      else
        echo "$PROP_KEY" >> "$PROP_FILE"
        echo "HCL_BYPASS: added property"
      fi

      # 2. Restart domainmanager to pick up the property change
      systemctl restart domainmanager
      echo "DOMAINMANAGER: restarted"

      # 3. Wait for domainmanager to be ready
      for i in $(seq 1 12); do
        if systemctl is-active --quiet domainmanager; then
          echo "DOMAINMANAGER: ready"
          break
        fi
        sleep 5
      done

      # 4. Patch HCL timestamp (if file exists)
      HCL_FILE=/nfs/vmware/vcf/nfs-mount/vsan-hcl/all.json
      if [ -f "$HCL_FILE" ]; then
        NOW=$(date -u +%Y-%m-%dT%H:%M:%SZ)
        sed -i "s/\"timestamp\":\"[^\"]*\"/\"timestamp\":\"$NOW\"/" "$HCL_FILE"
        sed -i "s/\"jsonUpdatedTime\":\"[^\"]*\"/\"jsonUpdatedTime\":\"$NOW\"/" "$HCL_FILE"
        echo "HCL_TIMESTAMP: patched to $NOW"
      else
        echo "HCL_TIMESTAMP: file not found (skipped)"
      fi

      echo "WORKAROUNDS: complete"

- name: Copy workaround script to VCF Installer
  ansible.builtin.shell: >
    sshpass -e scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
    /tmp/vcf-vsan-workaround.sh root@{{ vcf_bringup_hostname }}:/tmp/vcf-vsan-workaround.sh
  environment:
    SSHPASS: "{{ vcf_bringup_password }}"

- name: Execute vSAN ESA workarounds on VCF Installer
  ansible.builtin.shell: >
    sshpass -e ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
    root@{{ vcf_bringup_hostname }} /tmp/vcf-vsan-workaround.sh
  environment:
    SSHPASS: "{{ vcf_bringup_password }}"
  register: workarounds

- name: Display workaround results
  ansible.builtin.debug:
    msg: "{{ workarounds.stdout_lines | default(['No output']) }}"

- name: Wait for VCF Installer API to be ready after domainmanager restart
  ansible.builtin.uri:
    url: "https://{{ vcf_bringup_hostname }}/v1/tokens"
    method: POST
    body_format: json
    body:
      username: "{{ vcf_bringup_username }}"
      password: "{{ vcf_bringup_password }}"
    validate_certs: false
    status_code: 200
  register: api_ready
  until: api_ready.status == 200
  retries: 24
  delay: 10

# --- Bringup validation and deployment ---

- name: Display bringup spec being submitted
  ansible.builtin.debug:
    msg: "{{ vcf_bringup_spec | to_nice_json }}"

- name: Validate bringup spec
  vcf_cloud_builder:
    hostname: "{{ vcf_bringup_hostname }}"
    username: "{{ vcf_bringup_username }}"
    password: "{{ vcf_bringup_password }}"
    state: validated
    spec: "{{ vcf_bringup_spec }}"
  register: validation_result

- name: Display validation result
  ansible.builtin.debug:
    var: validation_result

- name: Start VCF bringup
  vcf_cloud_builder:
    hostname: "{{ vcf_bringup_hostname }}"
    username: "{{ vcf_bringup_username }}"
    password: "{{ vcf_bringup_password }}"
    state: deployed
    spec: "{{ vcf_bringup_spec }}"
    timeout: 7200
    poll_interval: 60
  register: bringup_result

- name: Display bringup result
  ansible.builtin.debug:
    var: bringup_result

- name: Verify management components are accessible
  ansible.builtin.uri:
    url: "https://{{ item }}.{{ lab_domain }}"
    validate_certs: false
    status_code: [200, 301, 302]
  loop:
    - vcenter-mgmt
    - sddc-manager
    - nsx-mgr-mgmt
  retries: 10
  delay: 30
  register: component_check
  until: component_check.status in [200, 301, 302]
