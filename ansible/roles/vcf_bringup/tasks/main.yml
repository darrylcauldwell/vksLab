---
# VCF management domain bringup via collection module
#
# All API calls go through the vmware_vcf.ansible collection
# which uses the requests library (SOCKS proxy compatible).
#
# Prerequisites (manual):
#   - VCF Installer OVA deployed (Phase 4 Play 1)
#   - vSAN ESA HCL bypass applied (deliver guide §6.2.2)

# --- Ensure vcf_sdk and dependencies are available ---

- name: Ensure vcf_sdk is available
  ansible.builtin.include_tasks: ../../common/tasks/ensure_vcf_sdk.yml

# --- Ensure DNS for Phase 4 dependencies ---

- name: Ensure DNS for bringup
  ansible.builtin.include_tasks: ../../common/tasks/ensure_dns.yml
  vars:
    dns_records:
      - { hostname: vcf-installer, ip: "{{ host_ip['vcf-installer'] }}" }
      - { hostname: vcenter-mgmt, ip: "{{ host_ip['vcenter-mgmt'] }}" }
      - { hostname: sddc-manager, ip: "{{ host_ip['sddc-manager'] }}" }
      - { hostname: nsx-mgr-mgmt, ip: "{{ host_ip['nsx-mgr-mgmt'] }}" }
      - { hostname: nsx-mgr-mgmt-01, ip: "{{ host_ip['nsx-mgr-mgmt-01'] }}" }
      - { hostname: esxi-01, ip: "{{ host_ip['esxi-01'] }}" }
      - { hostname: esxi-02, ip: "{{ host_ip['esxi-02'] }}" }
      - { hostname: esxi-03, ip: "{{ host_ip['esxi-03'] }}" }
      - { hostname: esxi-04, ip: "{{ host_ip['esxi-04'] }}" }

# --- Verify depot connectivity ---

- name: Verify depot is reachable from gateway
  ansible.builtin.command:
    cmd: "curl -sk -o /dev/null -w '%{http_code}' https://{{ vcf_depot_url }}/"
  changed_when: false
  failed_when: false
  register: depot_check

- name: Display depot connectivity
  ansible.builtin.debug:
    msg: "Depot {{ vcf_depot_url }}: HTTP {{ depot_check.stdout | default('unreachable') }}"

# --- Configure depot and download bundles ---

- name: Configure VCF offline depot
  ansible.builtin.uri:
    url: "https://{{ vcf_bringup_hostname }}/v1/sddcs/depot"
    method: PUT
    user: "{{ vcf_bringup_username }}"
    password: "{{ vcf_bringup_password }}"
    force_basic_auth: true
    validate_certs: false
    body_format: json
    body: "{{ vcf_bringup_depot_spec }}"
    status_code: [200, 202]
  register: depot_result

- name: Display depot configuration
  ansible.builtin.debug:
    msg: "Depot configured: {{ depot_result.json | default('OK') }}"

# Note: Bundle download is triggered automatically by the VCF Installer
# after depot configuration. Bundles must complete downloading before
# bringup can proceed. Check status via the VCF Installer UI (deliver guide §6.2.1).

# --- Validate bringup spec against OpenAPI schema ---

- name: Validate bringup spec against VCF Installer OpenAPI schema
  ansible.builtin.command:
    cmd: "python3 /home/ubuntu/dda-vcf/ansible/scripts/validate_spec.py --schema vcf-installer --type SddcSpec -"
    stdin: "{{ vcf_bringup_spec | to_json }}"
  register: spec_validation
  changed_when: false
  failed_when: "'VALIDATION FAILED' in spec_validation.stdout"

- name: Display spec validation result
  ansible.builtin.debug:
    msg: "{{ spec_validation.stdout_lines }}"

# --- Bringup deployment ---

- name: Display bringup spec being submitted
  ansible.builtin.debug:
    msg: "{{ vcf_bringup_spec | to_nice_json }}"

- name: Progress — VCF management domain bringup
  ansible.builtin.debug:
    msg: "LONG RUNNING TASK — VCF management domain bringup (~3-4 hours). Monitor progress at https://{{ vcf_bringup_hostname }}. Track in VCF Installer UI. This task will wait up to 4 hours for completion."

- name: Validate and deploy management domain
  vmware_vcf.ansible.vcf_cloud_builder:
    hostname: "{{ vcf_bringup_hostname }}"
    username: "{{ vcf_bringup_username }}"
    password: "{{ vcf_bringup_password }}"
    state: deployed
    spec: "{{ vcf_bringup_spec }}"
    nested_lab: true
    deploy_timeout: 14400
    poll_interval: 60
  register: bringup_result

- name: Display bringup result
  ansible.builtin.debug:
    var: bringup_result
