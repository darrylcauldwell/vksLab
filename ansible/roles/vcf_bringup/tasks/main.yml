---
# VCF management domain bringup via Cloud Builder API

# --- Depot configuration and bundle download ---
# The VCF Installer needs bundles downloaded from the depot before
# validation or bringup can proceed.

- name: Get VCF Installer API token
  ansible.builtin.uri:
    url: "https://{{ vcf_bringup_hostname }}/v1/tokens"
    method: POST
    body_format: json
    body:
      username: "{{ vcf_bringup_username }}"
      password: "{{ vcf_bringup_password }}"
    validate_certs: false
    status_code: 200
  register: token_response

- name: Configure VCF depot
  ansible.builtin.uri:
    url: "https://{{ vcf_bringup_hostname }}/v1/system/settings/depot"
    method: PUT
    headers:
      Authorization: "Bearer {{ token_response.json.accessToken }}"
    body_format: json
    body:
      offlineAccount:
        username: "{{ depot_username }}"
        password: "{{ depot_password }}"
      depotConfiguration:
        isOfflineDepot: true
        hostname: "{{ vcf_depot_url }}"
        port: 443
    validate_certs: false
    status_code: [200, 202, 204]
    timeout: 300
  register: depot_result

- name: Display depot configuration result
  ansible.builtin.debug:
    msg: "Depot configured: {{ depot_result.status }}"

- name: List available bundles
  ansible.builtin.uri:
    url: "https://{{ vcf_bringup_hostname }}/v1/bundles"
    method: GET
    headers:
      Authorization: "Bearer {{ token_response.json.accessToken }}"
    validate_certs: false
  register: bundles_response

- name: Extract bundle list from response
  ansible.builtin.set_fact:
    bundle_list: "{{ bundles_response.json.elements | default(bundles_response.json) }}"

- name: Display available bundles
  ansible.builtin.debug:
    msg: "{{ bundle_list | length }} bundles found"

- name: Display bundle details
  ansible.builtin.debug:
    msg: "{{ item.id | default('unknown') }} — {{ item.downloadStatus | default('unknown') }}"
  loop: "{{ bundle_list }}"
  loop_control:
    label: "{{ item.id | default('unknown') }}"
  when: bundle_list | length > 0

- name: Download bundles not yet downloaded
  ansible.builtin.uri:
    url: "https://{{ vcf_bringup_hostname }}/v1/bundles/{{ item.id }}"
    method: PATCH
    headers:
      Authorization: "Bearer {{ token_response.json.accessToken }}"
    body_format: json
    body:
      bundleDownloadSpec:
        downloadNow: true
    validate_certs: false
    status_code: [200, 202]
    timeout: 120
  loop: "{{ bundle_list | selectattr('downloadStatus', 'ne', 'SUCCESSFUL') | list }}"
  loop_control:
    label: "{{ item.id }}"
  register: download_tasks
  when: bundle_list | selectattr('downloadStatus', 'ne', 'SUCCESSFUL') | list | length > 0

- name: Display bundle download summary
  ansible.builtin.debug:
    msg: >-
      {{ bundle_list | selectattr('downloadStatus', 'ne', 'SUCCESSFUL') | list | length }} bundles
      need downloading, {{ bundle_list | selectattr('downloadStatus', 'eq', 'SUCCESSFUL') | list | length }}
      already downloaded.

# --- Pre-validation: vSAN HCL timestamp patch ---
# VCF validates the HCL file timestamp is < 90 days old. Patch it to
# today's date to avoid false failures with older OVAs. Non-blocking
# since VCF 9.0.1+ has a built-in bypass for nested environments.

- name: Patch vSAN HCL timestamp on VCF Installer
  ansible.builtin.shell: >
    sshpass -e ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
    vcf@{{ vcf_bringup_hostname }}
    "sudo sed -i 's/\"timestamp\":\"[^\"]*\"/\"timestamp\":\"'$(date -u +%%Y-%%m-%%dT%%H:%%M:%%SZ)'\"/' /nfs/vmware/vcf/nfs-mount/vsan-hcl/all.json &&
    sudo sed -i 's/\"jsonUpdatedTime\":\"[^\"]*\"/\"jsonUpdatedTime\":\"'$(date -u +%%Y-%%m-%%dT%%H:%%M:%%SZ)'\"/' /nfs/vmware/vcf/nfs-mount/vsan-hcl/all.json &&
    echo patched"
  environment:
    SSHPASS: "{{ vcf_bringup_password }}"
  register: hcl_patch
  failed_when: false
  changed_when: "'patched' in hcl_patch.stdout | default('')"

- name: Display HCL patch result
  ansible.builtin.debug:
    msg: "{{ 'HCL timestamp patched' if hcl_patch.rc | default(1) == 0 else 'HCL patch skipped (file may not exist or VCF 9.0.1+ bypass active)' }}"

# --- Bringup validation and deployment ---

- name: Display bringup spec being submitted
  ansible.builtin.debug:
    msg: "{{ vcf_bringup_spec | to_nice_json }}"

- name: Validate bringup spec
  vcf_cloud_builder:
    hostname: "{{ vcf_bringup_hostname }}"
    username: "{{ vcf_bringup_username }}"
    password: "{{ vcf_bringup_password }}"
    state: validated
    spec: "{{ vcf_bringup_spec }}"
  register: validation_result

- name: Display validation result
  ansible.builtin.debug:
    var: validation_result

- name: Start VCF bringup
  vcf_cloud_builder:
    hostname: "{{ vcf_bringup_hostname }}"
    username: "{{ vcf_bringup_username }}"
    password: "{{ vcf_bringup_password }}"
    state: deployed
    spec: "{{ vcf_bringup_spec }}"
    timeout: 7200
    poll_interval: 60
  register: bringup_result

- name: Display bringup result
  ansible.builtin.debug:
    var: bringup_result

- name: Verify management components are accessible
  ansible.builtin.uri:
    url: "https://{{ item }}.{{ lab_domain }}"
    validate_certs: false
    status_code: [200, 301, 302]
  loop:
    - vcenter-mgmt
    - sddc-manager
    - nsx-mgr-mgmt
  retries: 10
  delay: 30
  register: component_check
  until: component_check.status in [200, 301, 302]
