---
# VCF management domain bringup via collection module
#
# All API calls go through the vmware_vcf.ansible collection
# which uses the requests library (SOCKS proxy compatible).
#
# Prerequisites (manual):
#   - VCF Installer OVA deployed (Phase 4 Play 1)
#   - vSAN ESA HCL bypass applied (deliver guide §6.2.2)

# --- Ensure vcf_sdk and dependencies are available ---
# ensure_vcf_sdk is for gateway hosts (apt install, copy to dist-packages).
# On localhost, vcf_sdk is pre-installed via scripts/fix_localhost_sdk.sh.

- name: Ensure vcf_sdk is available (gateway only)
  ansible.builtin.include_tasks: ../../common/tasks/ensure_vcf_sdk.yml
  when: inventory_hostname != 'localhost'

# --- Ensure DNS for Phase 4 dependencies ---

- name: Ensure DNS for bringup
  ansible.builtin.include_tasks: ../../common/tasks/ensure_dns.yml
  vars:
    dns_records:
      - { hostname: vcf-installer, ip: "{{ host_ip['vcf-installer'] }}" }
      - { hostname: vcenter-mgmt, ip: "{{ host_ip['vcenter-mgmt'] }}" }
      - { hostname: sddc-manager, ip: "{{ host_ip['sddc-manager'] }}" }
      - { hostname: nsx-mgr-mgmt, ip: "{{ host_ip['nsx-mgr-mgmt'] }}" }
      - { hostname: nsx-mgr-mgmt-01, ip: "{{ host_ip['nsx-mgr-mgmt-01'] }}" }
      - { hostname: esxi-01, ip: "{{ host_ip['esxi-01'] }}" }
      - { hostname: esxi-02, ip: "{{ host_ip['esxi-02'] }}" }
      - { hostname: esxi-03, ip: "{{ host_ip['esxi-03'] }}" }
      - { hostname: esxi-04, ip: "{{ host_ip['esxi-04'] }}" }

# --- Manual step: configure depot via VCF Installer UI ---
# Depot configuration is an SDDC Manager API (POST bringup), not available
# on the VCF Installer. Configure the offline depot and wait for bundle
# download to complete via the VCF Installer UI before proceeding.
# See deliver guide §6.2.1.

- name: "MANUAL — Configure depot, download bundles, and apply vSAN HCL bypass"
  ansible.builtin.pause:
    prompt: |

      ============================================================
      MANUAL STEPS — VCF Installer pre-bringup configuration
      ============================================================

      STEP 1 — Depot configuration (VCF Installer UI)

        Open https://{{ vcf_bringup_hostname }} in a browser.
        1. Log in (admin@local)
        2. Navigate to Depot Settings
        3. Select Offline Depot and enter credentials:
             Hostname: {{ vcf_depot_url }}
             Username: (Broadcom depot username)
             Password: (Broadcom depot password)
        4. Save and wait for bundle downloads to complete:
             - SDDC Manager
             - vCenter Server
             - NSX Manager
           This typically takes 30-60 minutes.
        5. Verify all three bundles show "Downloaded" status.

      STEP 2 — vSAN ESA HCL bypass (SSH to VCF Installer)

        From the gateway, SSH to the VCF Installer and switch to root:
          ssh vcf@vcf-installer.lab.dreamfold.dev
          su -

        2a. Enable vSAN ESA disk claim bypass (both properties files):
          grep -q 'vsan.esa.sddc.managed.disk.claim=true' \
            /etc/vmware/vcf/domainmanager/application-prod.properties || \
            echo 'vsan.esa.sddc.managed.disk.claim=true' >> \
            /etc/vmware/vcf/domainmanager/application-prod.properties

          grep -q 'vsan.esa.sddc.managed.disk.claim=true' \
            /etc/vmware/vcf/domainmanager/application.properties || \
            echo 'vsan.esa.sddc.managed.disk.claim=true' >> \
            /etc/vmware/vcf/domainmanager/application.properties

        2b. Restart domainmanager and wait for it:
          systemctl restart domainmanager
          sleep 30
          systemctl is-active domainmanager

        2c. Patch vSAN HCL timestamp (if OVA is > 90 days old):
          python3 -c "
          import json, time
          f = '/nfs/vmware/vcf/nfs-mount/vsan-hcl/all.json'
          d = json.load(open(f))
          d['timestamp'] = int(time.time())
          json.dump(d, open(f, 'w'))
          print('Patched timestamp to', d['timestamp'])
          "

        2d. Verify:
          grep vsan.esa.sddc.managed.disk.claim \
            /etc/vmware/vcf/domainmanager/application-prod.properties

        See deliver guide §6.2.2 and Broadcom KB 408300.

      Press Enter when both steps are complete

# --- Validate bringup spec against OpenAPI schema ---

- name: Validate bringup spec against VCF Installer OpenAPI schema
  ansible.builtin.command:
    cmd: "python3 {{ playbook_dir }}/../scripts/validate_spec.py --schema vcf-installer --type SddcSpec -"
    stdin: "{{ vcf_bringup_spec | to_json }}"
  register: spec_validation
  changed_when: false
  failed_when: "'VALIDATION FAILED' in spec_validation.stdout"

- name: Display spec validation result
  ansible.builtin.debug:
    msg: "{{ spec_validation.stdout_lines }}"

# --- Bringup spec ---

- name: Display bringup spec
  ansible.builtin.debug:
    msg: "{{ vcf_bringup_spec | to_nice_json }}"

# --- Start validation (authenticates once, returns token) ---

- name: Start SDDC validation
  vmware_vcf.ansible.vcf_cloud_builder:
    hostname: "{{ vcf_bringup_hostname }}"
    username: "{{ vcf_bringup_username }}"
    password: "{{ vcf_bringup_password }}"
    state: start_validation
    spec: "{{ vcf_bringup_spec }}"
  register: _validation_start
  no_log: false

- name: Set validation and token facts
  ansible.builtin.set_fact:
    _validation_id: "{{ _validation_start.id }}"
    _vcf_token: "{{ _validation_start.bearer_token }}"
    _vcf_refresh_token: "{{ _validation_start.refresh_token }}"
  no_log: true

- name: Display validation ID
  ansible.builtin.debug:
    msg: "Validation started: {{ _validation_id }}"

- name: Reset poll state
  ansible.builtin.set_fact:
    _poll_complete: false
    _poll_final: {}

- name: Poll validation
  ansible.builtin.include_tasks: poll_validation.yml
  loop: "{{ range(360) | list }}"
  loop_control:
    loop_var: poll_iteration
    label: "poll {{ poll_iteration }}"
  when: not (_poll_complete | default(false) | bool)

- name: Fail if validation timed out
  ansible.builtin.fail:
    msg: "Validation timed out after 1 hour."
  when: not (_poll_complete | bool)

# --- Display validation results ---

- name: Display all validation checks
  ansible.builtin.debug:
    msg: "{{ ('✓' if item.resultStatus == 'SUCCEEDED' else '✗') }} [{{ item.resultStatus }}] {{ item.description | default('Unknown') }}"
  loop: "{{ _poll_final.validationChecks | default([]) }}"
  loop_control:
    label: "{{ item.description | default('check') }}"

- name: Fail if unexpected validation errors
  vars:
    _failed_checks: "{{ _poll_final.validationChecks | default([]) | selectattr('resultStatus', 'equalto', 'FAILED') | list }}"
    _known_safe_codes:
      - VSAN_ESA_HOST_NOT_HCL_COMPATIBLE
      - NO_VSAN_ESA_CERTIFIED_DISKS
      - EXISTING_SDDC_VALIDATION_WARNING
    _unexpected: "{{ _failed_checks | map(attribute='errorResponse') | map(attribute='errorCode', default='') | reject('in', _known_safe_codes) | list }}"
  ansible.builtin.fail:
    msg: >-
      Validation failed with {{ _unexpected | length }} unexpected error(s).
      Failed checks: {{ _failed_checks | map(attribute='description') | list }}
  when:
    - _poll_final.resultStatus | default('') != 'SUCCEEDED'
    - _unexpected | length > 0

# --- Start and poll bringup ---

- name: Start SDDC bringup
  vmware_vcf.ansible.vcf_cloud_builder:
    hostname: "{{ vcf_bringup_hostname }}"
    username: "{{ vcf_bringup_username }}"
    password: "{{ vcf_bringup_password }}"
    state: start_bringup
    spec: "{{ vcf_bringup_spec }}"
  register: _bringup_start

- name: Set bringup and token facts
  ansible.builtin.set_fact:
    _bringup_id: "{{ _bringup_start.id }}"
    _vcf_token: "{{ _bringup_start.bearer_token }}"
    _vcf_refresh_token: "{{ _bringup_start.refresh_token }}"
  no_log: true

- name: Display bringup ID
  ansible.builtin.debug:
    msg: "Bringup started: {{ _bringup_id }}. Monitor at https://{{ vcf_bringup_hostname }}"

- name: Reset poll state
  ansible.builtin.set_fact:
    _poll_complete: false
    _poll_final: {}

- name: Poll bringup
  ansible.builtin.include_tasks: poll_bringup.yml
  loop: "{{ range(240) | list }}"
  loop_control:
    loop_var: poll_iteration
    label: "poll {{ poll_iteration }}"
  when: not (_poll_complete | default(false) | bool)

- name: Fail if bringup timed out
  ansible.builtin.fail:
    msg: "Bringup timed out after 4 hours."
  when: not (_poll_complete | bool)

- name: Fail if bringup failed
  ansible.builtin.fail:
    msg: "SDDC bringup failed: {{ _poll_final.status | default('UNKNOWN') }}"
  when: "'FAILURE' in (_poll_final.status | default(''))"

- name: Bringup complete
  ansible.builtin.debug:
    msg: "SDDC bringup {{ _poll_final.status }}"
