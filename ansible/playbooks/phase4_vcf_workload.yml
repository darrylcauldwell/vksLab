---
# Phase 4 — VCF Workload Domain
# Commissions workload hosts and creates a VI workload domain.
# Runs on localhost — API calls reach SDDC Manager via SOCKS proxy through the gateway.
# Requires: ssh -D 1080 -N ubuntu@<gateway-public-ip>
- name: Phase 4 — VCF workload domain
  hosts: localhost
  connection: local
  gather_facts: false
  environment:
    HTTPS_PROXY: "socks5h://localhost:1080"
  roles:
    - vcf_workload_domain
