---
# Phase 4 — VCF Workload Domain
# Commissions workload hosts and creates a VI workload domain
- name: Phase 4 — VCF workload domain
  hosts: jumpbox
  gather_facts: false
  vars:
    sddc_hostname: sddc-manager.lab.dreamfold.dev
    sddc_username: admin@local
    sddc_password: >-
      {{ lookup('community.hashi_vault.vault_kv2_get',
         'sddc-manager/admin-password',
         engine_mount_point='secret',
         url=openbao_url,
         token=openbao_token).secret.value }}
    esxi_password: >-
      {{ lookup('community.hashi_vault.vault_kv2_get',
         'esxi/root-password',
         engine_mount_point='secret',
         url=openbao_url,
         token=openbao_token).secret.value }}
    workload_hosts:
      - fqdn: "esxi-05.{{ lab_domain }}"
        username: root
        password: "{{ esxi_password }}"
        networkPoolName: mgmt-network-pool
        storageType: VSAN
      - fqdn: "esxi-06.{{ lab_domain }}"
        username: root
        password: "{{ esxi_password }}"
        networkPoolName: mgmt-network-pool
        storageType: VSAN
      - fqdn: "esxi-07.{{ lab_domain }}"
        username: root
        password: "{{ esxi_password }}"
        networkPoolName: mgmt-network-pool
        storageType: VSAN
    workload_domain_spec:
      domainName: workload-domain
      vcenterSpec:
        name: vcenter-wld
        networkDetailsSpec:
          ipAddress: 10.0.10.9
          dnsName: "vcenter-wld.{{ lab_domain }}"
          gateway: "{{ lab_gateway }}"
          subnetMask: 255.255.255.0
        rootPassword: "{{ sddc_password }}"
      nsxTSpec:
        nsxManagerSpecs:
          - name: nsx-mgr-wld
            networkDetailsSpec:
              ipAddress: 10.0.10.10
              dnsName: "nsx-mgr-wld.{{ lab_domain }}"
              gateway: "{{ lab_gateway }}"
              subnetMask: 255.255.255.0
        nsxManagerAdminPassword: >-
          {{ lookup('community.hashi_vault.vault_kv2_get',
             'nsx/admin-password',
             engine_mount_point='secret',
             url=openbao_url,
             token=openbao_token).secret.value }}
      computeSpec:
        clusterSpecs:
          - name: workload-cluster
            hostSpecs: "{{ workload_hosts }}"
            datastoreSpec:
              vsanDatastoreSpec:
                datastoreName: workload-vsan-ds
                esaEnabled: true

  tasks:
    - name: Commission workload hosts into free pool
      vcf_sddc_host:
        sddc_hostname: "{{ sddc_hostname }}"
        username: "{{ sddc_username }}"
        password: "{{ sddc_password }}"
        state: commissioned
        hosts: "{{ workload_hosts }}"
        timeout: 3600
      register: commission_result

    - name: Display commission result
      ansible.builtin.debug:
        var: commission_result

    - name: Validate workload domain spec
      vcf_sddc_domain:
        sddc_hostname: "{{ sddc_hostname }}"
        username: "{{ sddc_username }}"
        password: "{{ sddc_password }}"
        state: validated
        domain_spec: "{{ workload_domain_spec }}"
      register: domain_validation

    - name: Display domain validation result
      ansible.builtin.debug:
        var: domain_validation

    - name: Create workload domain
      vcf_sddc_domain:
        sddc_hostname: "{{ sddc_hostname }}"
        username: "{{ sddc_username }}"
        password: "{{ sddc_password }}"
        state: present
        domain_spec: "{{ workload_domain_spec }}"
        timeout: 5400
      register: domain_result

    - name: Display domain creation result
      ansible.builtin.debug:
        var: domain_result

    - name: Verify workload vCenter is accessible
      ansible.builtin.uri:
        url: "https://vcenter-wld.{{ lab_domain }}"
        validate_certs: false
        status_code: [200, 301, 302]
      register: wld_vcenter_check
      retries: 10
      delay: 30
      until: wld_vcenter_check.status in [200, 301, 302]

    - name: Verify workload NSX Manager is accessible
      ansible.builtin.uri:
        url: "https://nsx-mgr-wld.{{ lab_domain }}"
        validate_certs: false
        status_code: [200, 301, 302]
      register: wld_nsx_check
      retries: 10
      delay: 30
      until: wld_nsx_check.status in [200, 301, 302]
