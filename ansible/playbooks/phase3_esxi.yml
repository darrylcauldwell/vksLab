---
# Phase 3 — Nested ESXi Host Preparation
#
# Play 1 — Bootstrap passwords (gateway-delegated):
#   After Reset System Configuration (§4.3), root password is blank.
#   Connects via sshpass from gateway, sets bootstrap_password.
#
# Play 2 — Set identity (gateway-delegated, one host at a time):
#   Sets hostname, regenerates SSL cert, restarts hostd/vpxa.
#   Runs from gateway via sshpass to avoid Ansible SSH ControlMaster
#   corruption when hostd restarts drop connections.
#
# Play 3 — Configure networking and services (gateway-delegated):
#   Switches vmk0 DHCP→static, DNS, NTP, SSH/Shell, lockdown, CEIP.
#   Runs via sshpass because the network switch disrupts Ansible's
#   ProxyJump SSH connections.
#
# Play 4 — Prepare hosts (Ansible direct, serial):
#   Storage (NVMe discovery, VMFS), CA cert, validation.
#   All tasks that don't disrupt SSH connectivity.

- name: Phase 3 — Ensure 1Password session
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Ensure 1Password session
      ansible.builtin.include_tasks: ../roles/common/tasks/ensure_1password.yml

- name: Phase 3 — Pre-flight ESXi connectivity check
  hosts: gateways
  gather_facts: false
  tasks:
    - name: Verify all ESXi hosts are reachable on port 443
      ansible.builtin.wait_for:
        host: "{{ hostvars[item]['ansible_host'] }}"
        port: 443
        timeout: 10
      loop: "{{ groups['esxi'] }}"
      loop_control:
        label: "{{ item }}"

    - name: Display connectivity check passed
      ansible.builtin.debug:
        msg: "All {{ groups['esxi'] | length }} ESXi hosts are reachable"

- name: Phase 3 — Bootstrap ESXi passwords (via gateway)
  hosts: gateways
  gather_facts: false
  become: true
  vars:
    ssh_opts: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10"
  tasks:
    - name: Check which ESXi hosts have blank passwords
      ansible.builtin.shell: >
        sshpass -p '' ssh {{ ssh_opts }}
        root@{{ hostvars[item]['ansible_host'] }} echo ok
      loop: "{{ groups['esxi'] }}"
      loop_control:
        label: "{{ item }}"
      register: blank_check
      failed_when: false
      changed_when: false

    - name: Show blank check results
      ansible.builtin.debug:
        msg: "{{ item.item }}: rc={{ item.rc }} stderr={{ item.stderr | default('') }}"
      loop: "{{ blank_check.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Set bootstrap password on hosts with blank password
      ansible.builtin.shell: >
        sshpass -p '' ssh {{ ssh_opts }}
        root@{{ hostvars[item.item]['ansible_host'] }}
        "esxcli system account set -i root -p '$SSHPASS' -c '$SSHPASS'"
      environment:
        SSHPASS: "{{ bootstrap_password }}"
      loop: "{{ blank_check.results | selectattr('rc', 'eq', 0) | list }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Verify bootstrap password was set
      ansible.builtin.shell: >
        sshpass -e ssh {{ ssh_opts }}
        root@{{ hostvars[item]['ansible_host'] }} echo ok
      environment:
        SSHPASS: "{{ bootstrap_password }}"
      loop: "{{ groups['esxi'] }}"
      loop_control:
        label: "{{ item }}"
      changed_when: false
      register: verify_check

    - name: Show verification failures
      ansible.builtin.debug:
        msg: "{{ item.item }}: {{ item.stderr | default(item.msg | default('unknown error')) }}"
      loop: "{{ verify_check.results | rejectattr('rc', 'eq', 0) | list }}"
      loop_control:
        label: "{{ item.item }}"
      when: verify_check.results | rejectattr('rc', 'eq', 0) | list | length > 0

    - name: Fail if any host verification failed
      ansible.builtin.assert:
        that: verify_check.results | rejectattr('rc', 'eq', 0) | list | length == 0
        fail_msg: "Bootstrap password verification failed on one or more hosts — see above"

    - name: Bootstrap summary
      ansible.builtin.debug:
        msg: >-
          {{ blank_check.results | selectattr('rc', 'eq', 0) | list | length }} host(s) bootstrapped,
          {{ blank_check.results | rejectattr('rc', 'eq', 0) | list | length }} already had password.

- name: Phase 3 — Set ESXi identity (via gateway, one host at a time)
  hosts: gateways
  gather_facts: false
  become: true
  vars:
    ssh_opts: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10"
    esxi_hosts: "{{ groups['esxi'] }}"
  tasks:
    - name: Set hostname, regenerate SSL cert, restart hostd
      ansible.builtin.include_tasks: phase3_identity_host.yml
      loop: "{{ esxi_hosts }}"
      loop_control:
        loop_var: esxi_host
        label: "{{ esxi_host }}"

- name: Phase 3 — Configure ESXi networking and services (via gateway)
  hosts: gateways
  gather_facts: false
  become: true
  vars:
    ssh_opts: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=10"
    esxi_hosts: "{{ groups['esxi'] }}"
  tasks:
    - name: Configure networking, services, and settings
      ansible.builtin.include_tasks: phase3_configure_host.yml
      loop: "{{ esxi_hosts }}"
      loop_control:
        loop_var: esxi_host
        label: "{{ esxi_host }}"

- name: Phase 3 — Clear stale ESXi SSH keys from gateway
  hosts: gateways
  gather_facts: false
  become: true
  tasks:
    - name: Remove stale ESXi host keys from gateway known_hosts
      ansible.builtin.shell: |
        {% for host in groups['esxi'] %}
        ssh-keygen -R {{ hostvars[host]['ansible_host'] }} 2>/dev/null || true
        ssh-keygen -R {{ host }}.{{ lab_domain }} 2>/dev/null || true
        {% endfor %}
      changed_when: false

- name: Phase 3 — Prepare ESXi hosts
  hosts: esxi
  gather_facts: false
  serial: 1
  roles:
    - esxi_prepare
