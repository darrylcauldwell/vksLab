---
# Phase 3 — VCF Management Domain Bringup
# Drives Cloud Builder to deploy vCenter, SDDC Manager, and NSX Manager
- name: Phase 3 — VCF management domain bringup
  hosts: jumpbox
  gather_facts: false
  vars:
    cloud_builder_hostname: vcf-installer.lab.dreamfold.dev
    cloud_builder_username: admin
    cloud_builder_password: >-
      {{ lookup('community.hashi_vault.vault_kv2_get',
         'vcenter/sso-password',
         engine_mount_point='secret',
         url=openbao_url,
         token=openbao_token).secret.value }}
    bringup_spec_path: "{{ playbook_dir }}/../../configs/vcf-bringup.json"
  tasks:
    - name: Validate bringup spec
      vcf_cloud_builder:
        hostname: "{{ cloud_builder_hostname }}"
        username: "{{ cloud_builder_username }}"
        password: "{{ cloud_builder_password }}"
        state: validated
        spec: "{{ bringup_spec_path }}"
      register: validation_result

    - name: Display validation result
      ansible.builtin.debug:
        var: validation_result

    - name: Start VCF bringup
      vcf_cloud_builder:
        hostname: "{{ cloud_builder_hostname }}"
        username: "{{ cloud_builder_username }}"
        password: "{{ cloud_builder_password }}"
        state: deployed
        spec: "{{ bringup_spec_path }}"
        timeout: 7200
        poll_interval: 60
      register: bringup_result

    - name: Display bringup result
      ansible.builtin.debug:
        var: bringup_result

    - name: Verify vCenter is accessible
      ansible.builtin.uri:
        url: "https://vcenter-mgmt.{{ lab_domain }}"
        validate_certs: false
        status_code: [200, 301, 302]
      register: vcenter_check
      retries: 10
      delay: 30
      until: vcenter_check.status in [200, 301, 302]

    - name: Verify SDDC Manager is accessible
      ansible.builtin.uri:
        url: "https://sddc-manager.{{ lab_domain }}"
        validate_certs: false
        status_code: [200, 301, 302]
      register: sddc_check
      retries: 10
      delay: 30
      until: sddc_check.status in [200, 301, 302]

    - name: Verify NSX Manager is accessible
      ansible.builtin.uri:
        url: "https://nsx-mgr-mgmt.{{ lab_domain }}"
        validate_certs: false
        status_code: [200, 301, 302]
      register: nsx_check
      retries: 10
      delay: 30
      until: nsx_check.status in [200, 301, 302]
