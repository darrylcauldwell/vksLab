---
# Phase 5 — VCF Platform Services
# VCF Operations, Identity Broker (Keycloak OIDC), and CA certificate replacement.
# Run after Phase 4 (management domain) so management components and trusted certs
# are in place before the workload domain is created.
- name: Phase 5 — VCF Platform Services
  hosts: localhost
  connection: local
  gather_facts: false
  environment:
    HTTPS_PROXY: "socks5h://localhost:1080"
  pre_tasks:
    - name: Ensure SOCKS proxy
      ansible.builtin.include_tasks: ../roles/common/tasks/ensure_socks.yml
  roles:
    - vcf_mgmt_components
    - vcf_identity
    - vcf_platform
