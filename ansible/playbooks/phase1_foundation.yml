---
# Phase 1 — Foundation: gateway services, Docker containers, routing, BGP
#
# Run everything:
#   ansible-playbook playbooks/phase1_foundation.yml
#
# Run only specific sections:
#   ansible-playbook playbooks/phase1_foundation.yml --tags keycloak
#   ansible-playbook playbooks/phase1_foundation.yml --tags shell
#   ansible-playbook playbooks/phase1_foundation.yml --tags verify
#
# Available tags:
#   packages  — apt upgrade + package install
#   network   — netplan VLAN sub-interfaces
#   dns       — dnsmasq configuration
#   ntp       — chrony configuration
#   desktop   — GNOME settings, dconf, conky
#   shell     — zsh, Oh My Zsh, Powerlevel10k
#   xrdp      — xrdp + gnome-remote-desktop disable
#   repos     — third-party apt repositories + installs
#   routing   — IP forwarding, NAT, FRR/BGP
#   ca        — step-ca, certificates, Firefox policy
#   keycloak  — Docker, Keycloak container, realm, users, OIDC clients
#   verify    — foundation verification checks

- name: Phase 1 — Ensure 1Password session
  hosts: localhost
  connection: local
  gather_facts: true
  tasks:
    - name: Ensure 1Password session
      ansible.builtin.include_tasks: ../roles/common/tasks/ensure_1password.yml

- name: Phase 1 — Configure gateway
  hosts: gateways
  gather_facts: true
  become: false
  roles:
    - gateway
    - docker_services

- name: Phase 1 — Foundation verification
  hosts: gateways
  gather_facts: false
  become: true
  vars_files:
    - ../roles/gateway/defaults/main.yml
  tasks:
    - name: "Verify DNS — forward lookup"
      ansible.builtin.command:
        cmd: dig +short @127.0.0.1 gateway.{{ lab_domain }}
      register: dns_result
      changed_when: false
      failed_when: gateway_ip not in dns_result.stdout
      tags: verify

    - name: "Verify NTP — chrony has synced source"
      ansible.builtin.shell:
        cmd: chronyc sources | grep '^\^'
      register: ntp_result
      changed_when: false
      failed_when: ntp_result.rc != 0
      tags: verify

    - name: "Verify CA — step-ca health"
      ansible.builtin.command:
        cmd: step ca health
      register: ca_result
      changed_when: false
      failed_when: "'ok' not in ca_result.stdout"
      tags: verify

    - name: "Verify VLAN sub-interfaces (including management on VLAN {{ vlan['management'].vlan_id }})"
      ansible.builtin.shell:
        cmd: "ip addr show {{ gateway_vlan_trunk_nic }}.{{ item.vlan }} | grep 'inet {{ item.ip }}'"
      loop: "{{ gateway_vlan_interfaces }}"
      loop_control:
        label: "{{ gateway_vlan_trunk_nic }}.{{ item.vlan }} ({{ item.description }})"
      register: vlan_result
      changed_when: false
      failed_when: vlan_result.rc != 0
      tags: verify

    - name: "Verify inter-VLAN routing — ping vMotion gateway"
      ansible.builtin.command:
        cmd: ping -c 1 -W 2 {{ vlan['vmotion'].gateway }}
      register: ping_result
      changed_when: false
      failed_when: ping_result.rc != 0
      tags: verify

    - name: "Verify FRR service is active"
      ansible.builtin.command:
        cmd: systemctl is-active frr
      register: frr_result
      changed_when: false
      failed_when: "'active' not in frr_result.stdout"
      tags: verify

    - name: "Verify FRR BGP configuration"
      ansible.builtin.shell:
        cmd: vtysh -c 'show running-config' | grep 'router bgp 65000'
      register: bgp_result
      changed_when: false
      failed_when: bgp_result.rc != 0
      tags: verify

    - name: "Verify Keycloak — realm accessible"
      ansible.builtin.uri:
        url: "https://127.0.0.1:{{ keycloak_port | default(8443) }}/realms/{{ keycloak_realm }}"
        validate_certs: false
        status_code: [200]
      register: keycloak_result
      changed_when: false
      failed_when: keycloak_result.status != 200
      tags: verify

    - name: "Verify IP masquerade — iptables NAT rule present"
      ansible.builtin.shell:
        cmd: iptables -t nat -L POSTROUTING -n | grep MASQUERADE
      register: masq_result
      changed_when: false
      failed_when: masq_result.rc != 0
      tags: verify

    - name: "Verify dnsmasq — all lab hostnames resolve"
      ansible.builtin.command:
        cmd: "dig +short @127.0.0.1 {{ item }}.{{ lab_domain }}"
      loop:
        - vcf-installer
        - vcenter-mgmt
        - sddc-manager
        - nsx-mgr-mgmt
        - esxi-01
        - esxi-05
      register: dns_all
      changed_when: false
      failed_when: dns_all.stdout | length == 0
      tags: verify

    - name: Foundation verification summary
      ansible.builtin.debug:
        msg: >-
          All checks passed: DNS, NTP, CA, VLANs, inter-VLAN routing,
          FRR/BGP, Keycloak, IP masquerade, lab hostname resolution.
      tags: verify

- name: Phase 1 — Trust lab CA on operator workstation
  hosts: localhost
  connection: local
  gather_facts: true
  tasks:
    - name: Fetch lab root CA certificate from gateway
      ansible.builtin.shell: >
        scp -o StrictHostKeyChecking=no
        ubuntu@{{ gateway_public_ip }}:/tmp/lab-root-ca.crt
        {{ ansible_env.HOME }}/.lab-root-ca.crt
      args:
        creates: "{{ ansible_env.HOME }}/.lab-root-ca.crt"
      tags: ca

    - name: Trust lab root CA in macOS system keychain
      ansible.builtin.shell: >
        security verify-cert -c {{ ansible_env.HOME }}/.lab-root-ca.crt 2>/dev/null
        && echo "already_trusted"
        || (sudo security add-trusted-cert -d -r trustRoot
        -k /Library/Keychains/System.keychain
        {{ ansible_env.HOME }}/.lab-root-ca.crt
        && echo "imported")
      register: ca_import
      changed_when: "'imported' in ca_import.stdout"
      when: ansible_os_family == 'Darwin'
      tags: ca
