---
# Phase 4b — VCF Identity Broker
# Registers Keycloak OIDC as external identity provider.
# Run after Phase 4 (workload domain) so SSO is available for Phase 5+ UI access.
# Requires: ssh -D 1080 -N ubuntu@<gateway-public-ip>
- name: Phase 4b — VCF Identity Broker
  hosts: localhost
  connection: local
  gather_facts: false
  environment:
    HTTPS_PROXY: "socks5h://localhost:1080"
  roles:
    - vcf_identity
