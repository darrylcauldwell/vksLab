---
# Phase 0 — Operator workstation setup
#
# Configures the local machine (the operator's laptop) with settings
# required to manage the lab, and uploads artifacts to the gateway.
#
# Prerequisites:
#   - VCF Installer OVA downloaded to ~/Downloads/
#   - Gateway VM accessible via SSH (vApp powered on, Phase 1 complete)
#   - SSH key copied to gateway (ssh-copy-id ubuntu@<gateway_ip>)
#
# Usage:
#   ansible-playbook playbooks/phase0_operator.yml --connection=local
#
# Available tags:
#   ova       — upload VCF Installer OVA to gateway
#   ssh       — SSH config, key clearing, SOCKS tunnel, LaunchAgent
#   ca        — fetch and trust lab root CA
#   bookmarks — generate Firefox bookmarks HTML

- name: Phase 0 — Configure operator workstation
  hosts: localhost
  connection: local
  gather_facts: true
  vars:
    vcf_installer_ova_local: "{{ lookup('fileglob', '~/Downloads/VCF-*.ova') }}"
    vcf_installer_ova_remote: /home/ubuntu/vcf-installer.ova
  tasks:
    - name: Verify VCF Installer OVA exists locally
      ansible.builtin.assert:
        that: vcf_installer_ova_local | length > 0
        fail_msg: >-
          No VCF Installer OVA found matching ~/Downloads/VCF-*.ova.
          Download the OVA from the VCF depot and place it in ~/Downloads/.
      tags: ova

    - name: Show OVA source path
      ansible.builtin.debug:
        msg: "Using OVA: {{ vcf_installer_ova_local }}"
      tags: ova

    - name: Check if OVA already exists on gateway
      ansible.builtin.shell: >
        ssh -o StrictHostKeyChecking=no ubuntu@{{ gateway_public_ip }}
        test -f {{ vcf_installer_ova_remote }} && echo "exists" || echo "missing"
      register: ova_check
      changed_when: false
      tags: ova

    - name: Upload VCF Installer OVA to gateway
      ansible.builtin.shell: >
        scp -o StrictHostKeyChecking=no
        "{{ vcf_installer_ova_local }}"
        ubuntu@{{ gateway_public_ip }}:{{ vcf_installer_ova_remote }}
      when: "'missing' in ova_check.stdout"
      tags: ova

    - name: Clear stale ESXi SSH host keys from local known_hosts
      ansible.builtin.shell: |
        {% for host in groups['esxi'] %}
        ssh-keygen -R {{ hostvars[host]['ansible_host'] }} 2>/dev/null || true
        {% endfor %}
        ssh-keygen -R {{ gateway_public_ip }} 2>/dev/null || true
      changed_when: false
      tags: ssh

    - name: Add SSH config entry for lab SOCKS tunnel
      ansible.builtin.blockinfile:
        path: "{{ ansible_env.HOME }}/.ssh/config"
        marker: "# {mark} ANSIBLE MANAGED — VKS Lab SOCKS tunnel"
        create: true
        mode: "0600"
        block: |
          Host lab-tunnel
            HostName {{ gateway_public_ip }}
            User ubuntu
            DynamicForward 1080
            ExitOnForwardFailure yes
            ServerAliveInterval 30
            ServerAliveCountMax 3
      tags: ssh

    - name: Deploy PAC file for lab domain proxy routing
      ansible.builtin.copy:
        content: |
          function FindProxyForURL(url, host) {
            if (shExpMatch(host, "*.{{ lab_domain }}")) {
              return "SOCKS5 127.0.0.1:1080";
            }
            return "DIRECT";
          }
        dest: "{{ ansible_env.HOME }}/.lab-proxy.pac"
        mode: "0644"
      tags: ssh

    - name: Deploy LaunchAgent for automatic SOCKS tunnel
      ansible.builtin.copy:
        content: |
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>Label</key>
            <string>dev.dreamfold.lab-tunnel</string>
            <key>ProgramArguments</key>
            <array>
              <string>/usr/bin/ssh</string>
              <string>-N</string>
              <string>-o</string>
              <string>ExitOnForwardFailure=yes</string>
              <string>-o</string>
              <string>ServerAliveInterval=30</string>
              <string>-o</string>
              <string>ServerAliveCountMax=3</string>
              <string>lab-tunnel</string>
            </array>
            <key>RunAtLoad</key>
            <true/>
            <key>KeepAlive</key>
            <dict>
              <key>NetworkState</key>
              <true/>
            </dict>
            <key>ThrottleInterval</key>
            <integer>30</integer>
            <key>StandardErrorPath</key>
            <string>/tmp/lab-tunnel.err</string>
          </dict>
          </plist>
        dest: "{{ ansible_env.HOME }}/Library/LaunchAgents/dev.dreamfold.lab-tunnel.plist"
        mode: "0644"
      register: launch_agent
      tags: ssh

    - name: Restart SOCKS tunnel LaunchAgent
      ansible.builtin.shell: >
        launchctl bootout gui/$(id -u) {{ ansible_env.HOME }}/Library/LaunchAgents/dev.dreamfold.lab-tunnel.plist 2>/dev/null;
        launchctl bootstrap gui/$(id -u) {{ ansible_env.HOME }}/Library/LaunchAgents/dev.dreamfold.lab-tunnel.plist
      changed_when: true
      tags: ssh

    - name: Fetch lab root CA certificate from gateway
      ansible.builtin.shell: >
        scp -o StrictHostKeyChecking=no
        ubuntu@{{ gateway_public_ip }}:/tmp/lab-root-ca.crt
        {{ ansible_env.HOME }}/.lab-root-ca.crt
      args:
        creates: "{{ ansible_env.HOME }}/.lab-root-ca.crt"
      tags: ca

    - name: Trust lab root CA in macOS system keychain
      ansible.builtin.shell: >
        security verify-cert -c {{ ansible_env.HOME }}/.lab-root-ca.crt 2>/dev/null
        && echo "already_trusted"
        || (sudo security add-trusted-cert -d -r trustRoot
        -k /Library/Keychains/System.keychain
        {{ ansible_env.HOME }}/.lab-root-ca.crt
        && echo "imported")
      register: ca_import
      changed_when: "'imported' in ca_import.stdout"
      tags: ca

    - name: Generate Firefox bookmarks HTML for import
      ansible.builtin.copy:
        content: |
          <!DOCTYPE NETSCAPE-Bookmark-file-1>
          <META HTTP-EQUIV="Content-Type" CONTENT="text/html; charset=UTF-8">
          <TITLE>Bookmarks</TITLE>
          <H1>Bookmarks</H1>
          <DL><p>
            <DT><H3 PERSONAL_TOOLBAR_FOLDER="true">Bookmarks Toolbar</H3>
            <DL><p>
              <DT><H3>VCF Lab</H3>
              <DL><p>
                <DT><A HREF="https://vcf-installer.{{ lab_domain }}">VCF Installer</A>
                <DT><A HREF="https://vcenter-mgmt.{{ lab_domain }}/ui">vCenter (mgmt)</A>
                <DT><A HREF="https://sddc-manager.{{ lab_domain }}/ui">SDDC Manager</A>
                <DT><A HREF="https://nsx-mgr-mgmt.{{ lab_domain }}">NSX Manager (mgmt)</A>
                <DT><A HREF="https://vcenter-wld.{{ lab_domain }}/ui">vCenter (wld)</A>
                <DT><A HREF="https://nsx-mgr-wld.{{ lab_domain }}">NSX Manager (wld)</A>
                <DT><A HREF="https://vcf-ops.{{ lab_domain }}">VCF Operations</A>
                <DT><A HREF="https://vcf-auto.{{ lab_domain }}">VCF Automation</A>
                <DT><H3>ESXi Hosts</H3>
                <DL><p>
                  <DT><A HREF="https://esxi-01.{{ lab_domain }}/ui">esxi-01</A>
                  <DT><A HREF="https://esxi-02.{{ lab_domain }}/ui">esxi-02</A>
                  <DT><A HREF="https://esxi-03.{{ lab_domain }}/ui">esxi-03</A>
                  <DT><A HREF="https://esxi-04.{{ lab_domain }}/ui">esxi-04</A>
                  <DT><A HREF="https://esxi-05.{{ lab_domain }}/ui">esxi-05</A>
                  <DT><A HREF="https://esxi-06.{{ lab_domain }}/ui">esxi-06</A>
                  <DT><A HREF="https://esxi-07.{{ lab_domain }}/ui">esxi-07</A>
                </DL><p>
              </DL><p>
            </DL><p>
          </DL><p>
        dest: "{{ ansible_env.HOME }}/Desktop/vcf-lab-bookmarks.html"
        mode: "0644"
      tags: bookmarks

    - name: Operator workstation setup complete
      ansible.builtin.debug:
        msg: >-
          Operator workstation configured.
          VCF Installer OVA: {{ vcf_installer_ova_remote }} on gateway.
          SOCKS tunnel starts automatically on login and reconnects if dropped.
          Firefox auto-routes *.{{ lab_domain }} traffic through the tunnel.
          Browse lab UIs at their real FQDNs (e.g. https://esxi-01.lab.dreamfold.dev).
          Stop tunnel: launchctl bootout gui/$(id -u) ~/Library/LaunchAgents/dev.dreamfold.lab-tunnel.plist
