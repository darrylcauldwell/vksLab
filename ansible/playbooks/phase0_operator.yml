---
# Phase 0 — Operator workstation setup
#
# Configures the local machine (the operator's laptop) with settings
# required to manage the lab, and uploads artifacts to the gateway.
#
# Prerequisites:
#   - VCF Installer OVA downloaded to ~/Downloads/
#   - Gateway VM accessible via SSH (vApp powered on, Phase 1 complete)
#   - SSH key copied to gateway (ssh-copy-id ubuntu@<gateway_ip>)
#
# Usage: ansible-playbook playbooks/phase0_operator.yml --connection=local

- name: Phase 0 — Configure operator workstation
  hosts: localhost
  connection: local
  gather_facts: true
  vars:
    vcf_installer_ova_local: "{{ lookup('fileglob', '~/Downloads/VCF-*.ova') }}"
    vcf_installer_ova_remote: /home/ubuntu/vcf-installer.ova
  tasks:
    - name: Verify VCF Installer OVA exists locally
      ansible.builtin.assert:
        that: vcf_installer_ova_local | length > 0
        fail_msg: >-
          No VCF Installer OVA found matching ~/Downloads/VCF-*.ova.
          Download the OVA from the VCF depot and place it in ~/Downloads/.

    - name: Show OVA source path
      ansible.builtin.debug:
        msg: "Using OVA: {{ vcf_installer_ova_local }}"

    - name: Check if OVA already exists on gateway
      ansible.builtin.shell: >
        ssh -o StrictHostKeyChecking=no ubuntu@{{ gateway_public_ip }}
        test -f {{ vcf_installer_ova_remote }} && echo "exists" || echo "missing"
      register: ova_check
      changed_when: false

    - name: Upload VCF Installer OVA to gateway
      ansible.builtin.shell: >
        scp -o StrictHostKeyChecking=no
        "{{ vcf_installer_ova_local }}"
        ubuntu@{{ gateway_public_ip }}:{{ vcf_installer_ova_remote }}
      when: "'missing' in ova_check.stdout"

    - name: Add SSH config entry for lab SOCKS tunnel
      ansible.builtin.blockinfile:
        path: "{{ ansible_env.HOME }}/.ssh/config"
        marker: "# {mark} ANSIBLE MANAGED — VKS Lab SOCKS tunnel"
        create: true
        mode: "0600"
        block: |
          Host lab-tunnel
            HostName {{ gateway_public_ip }}
            User ubuntu
            DynamicForward 1080
            ExitOnForwardFailure yes
            ServerAliveInterval 30
            ServerAliveCountMax 3

    - name: Operator workstation setup complete
      ansible.builtin.debug:
        msg: >-
          Operator workstation configured.
          VCF Installer OVA: {{ vcf_installer_ova_remote }} on gateway.
          SOCKS proxy: run 'ssh -N lab-tunnel' then configure browser to use localhost:1080.
          Browse lab UIs at their real FQDNs (e.g. https://esxi-01.lab.dreamfold.dev).
