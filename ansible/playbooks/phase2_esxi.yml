---
# Phase 2 — Nested ESXi Host Preparation
#
# Bootstrap play: after Reset System Configuration (§4.3), ESXi root password
# is blank. This play runs on the gateway and uses sshpass to connect to each
# ESXi host with a blank password and set it to the bootstrap credential from
# 1Password. Hosts that already have a password are skipped (ignore_errors).
#
# Prepare play: configures hostname, DNS, NTP, password, vSAN ESA, and CA cert.

- name: Phase 2 — Bootstrap ESXi passwords (via gateway)
  hosts: gateways
  gather_facts: false
  become: true
  tasks:
    - name: Check which ESXi hosts have blank passwords
      ansible.builtin.shell: >
        sshpass -p '' ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=5
        root@{{ hostvars[item]['ansible_host'] }} echo ok
      loop: "{{ groups['esxi'] }}"
      loop_control:
        label: "{{ item }}"
      register: blank_check
      failed_when: false
      changed_when: false

    - name: Show blank check results
      ansible.builtin.debug:
        msg: "{{ item.item }}: rc={{ item.rc }} stderr={{ item.stderr | default('') }}"
      loop: "{{ blank_check.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Set bootstrap password on hosts with blank password
      ansible.builtin.shell: >
        sshpass -p '' ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
        root@{{ hostvars[item.item]['ansible_host'] }}
        "esxcli system account set -i root -p '{{ bootstrap_password }}' -c '{{ bootstrap_password }}'"
      loop: "{{ blank_check.results | selectattr('rc', 'eq', 0) | list }}"
      loop_control:
        label: "{{ item.item }}"
      no_log: true

    - name: Verify bootstrap password was set
      ansible.builtin.shell: >
        sshpass -p '{{ bootstrap_password }}' ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=5
        root@{{ hostvars[item]['ansible_host'] }} echo ok
      loop: "{{ groups['esxi'] }}"
      loop_control:
        label: "{{ item }}"
      changed_when: false
      register: verify_check

    - name: Show verification failures
      ansible.builtin.debug:
        msg: "{{ item.item }}: {{ item.stderr | default(item.msg | default('unknown error')) }}"
      loop: "{{ verify_check.results | rejectattr('rc', 'eq', 0) | list }}"
      loop_control:
        label: "{{ item.item }}"
      when: verify_check.results | rejectattr('rc', 'eq', 0) | list | length > 0

    - name: Fail if any host verification failed
      ansible.builtin.assert:
        that: verify_check.results | rejectattr('rc', 'eq', 0) | list | length == 0
        fail_msg: "Bootstrap password verification failed on one or more hosts — see above"

    - name: Bootstrap summary
      ansible.builtin.debug:
        msg: >-
          {{ blank_check.results | selectattr('rc', 'eq', 0) | list | length }} host(s) bootstrapped,
          {{ blank_check.results | rejectattr('rc', 'eq', 0) | list | length }} already had password.

- name: Phase 2 — Regenerate SSL certificates (one host at a time)
  hosts: esxi
  gather_facts: false
  serial: 1
  tasks:
    - name: Set hostname and FQDN
      ansible.builtin.shell: >
        esxcli system hostname set
        --fqdn={{ inventory_hostname }}.{{ lab_domain }}
      register: hostname_result
      changed_when: hostname_result.rc == 0

    - name: Regenerate SSL certificate and restart hostd
      ansible.builtin.shell: >
        /sbin/generate-certificates &&
        /etc/init.d/hostd restart &&
        /etc/init.d/vpxa restart
      changed_when: true

    - name: Reset SSH connection
      ansible.builtin.meta: reset_connection

    - name: Wait for SSH to come back
      ansible.builtin.wait_for_connection:
        delay: 10
        timeout: 120

    - name: Wait for hostd to be ready
      ansible.builtin.shell: >
        vim-cmd hostsvc/hostsummary > /dev/null 2>&1
      register: hostd_ready
      until: hostd_ready.rc == 0
      retries: 20
      delay: 5
      changed_when: false

    - name: Verify certificate CN matches FQDN
      ansible.builtin.shell: >
        openssl x509 -in /etc/vmware/ssl/rui.crt -noout -subject | grep -q {{ inventory_hostname }}.{{ lab_domain }}
      changed_when: false

- name: Phase 2 — Prepare ESXi hosts
  hosts: esxi
  gather_facts: false
  roles:
    - esxi_prepare
