[defaults]
inventory = inventory/hosts.yml
roles_path = roles
library = library
collections_path = collections
host_key_checking = false
retry_files_enabled = false
vars_plugins_enabled = host_group_vars,physical_design
vars_plugins = plugins/vars

[privilege_escalation]
become = false

[ssh_connection]
pipelining = true
# Gateway is reached directly; all other lab hosts use ProxyJump through gateway
# Override per-group via ansible_ssh_common_args in inventory
