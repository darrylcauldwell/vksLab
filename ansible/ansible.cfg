[defaults]
inventory = inventory/hosts.yml
roles_path = roles
library = library
collections_path = collections
host_key_checking = false
retry_files_enabled = false

[privilege_escalation]
become = false

[ssh_connection]
pipelining = true
# vEOS NAT forwards SSH to jumpbox; jumpbox is the bastion for all lab hosts
# Override per-group via ansible_ssh_common_args in inventory
