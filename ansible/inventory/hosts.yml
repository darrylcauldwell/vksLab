all:
  vars:
    # All lab hosts (except gateway) reach via ProxyJump through gateway
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ControlMaster=no -o ProxyJump=ubuntu@{{ gateway_public_ip }}"
  hosts:
    localhost:
      ansible_connection: local
      ansible_python_interpreter: "{{ lookup('env', 'DDA_VENV_PYTHON') }}"
  children:
    gateways:
      hosts:
        gateway:
          ansible_host: "{{ gateway_public_ip }}"
          ansible_user: ubuntu
          ansible_password: "{{ gateway_password }}"
          ansible_become_pass: "{{ gateway_password }}"
          ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ControlMaster=auto -o ControlPersist=60s -o ControlPath=/tmp/ansible-ssh-%h-%p-%r"
    esxi:
      vars:
        ansible_user: root
        ansible_password: "{{ bootstrap_password }}"
        ansible_remote_tmp: /tmp/.ansible/tmp
      children:
        esxi_management:
          hosts:
            esxi-01:
              ansible_host: "{{ host_ip['esxi-01'] }}"
            esxi-02:
              ansible_host: "{{ host_ip['esxi-02'] }}"
            esxi-03:
              ansible_host: "{{ host_ip['esxi-03'] }}"
            esxi-04:
              ansible_host: "{{ host_ip['esxi-04'] }}"
        esxi_workload:
          hosts:
            esxi-05:
              ansible_host: "{{ host_ip['esxi-05'] }}"
            esxi-06:
              ansible_host: "{{ host_ip['esxi-06'] }}"
            esxi-07:
              ansible_host: "{{ host_ip['esxi-07'] }}"
    vcf_appliances:
      hosts:
        vcf-installer:
          ansible_host: "{{ host_ip['vcf-installer'] }}"
        vcenter-mgmt:
          ansible_host: "{{ host_ip['vcenter-mgmt'] }}"
        sddc-manager:
          ansible_host: "{{ host_ip['sddc-manager'] }}"
        nsx-mgr-mgmt:
          ansible_host: "{{ host_ip['nsx-mgr-mgmt'] }}"
        vcenter-wld:
          ansible_host: "{{ host_ip['vcenter-wld'] }}"
        nsx-mgr-wld:
          ansible_host: "{{ host_ip['nsx-mgr-wld'] }}"
    nsx_edges:
      hosts:
        edge-01:
          ansible_host: "{{ host_ip['edge-01'] }}"
        edge-02:
          ansible_host: "{{ host_ip['edge-02'] }}"
