# Lab-wide variables
lab_domain: lab.dreamfold.dev

# Base network prefix — change this to relocate the entire lab
lab_network_prefix: "10.0"

# VLAN IDs (defined separately to avoid circular references with prefix vars)
vlan_id_mgmt: 10
vlan_id_vmotion: 20
vlan_id_vsan: 30
vlan_id_host_overlay: 40
vlan_id_edge_overlay: 50
vlan_id_edge_uplink: 60

# Per-VLAN subnet prefixes (derived from prefix + VLAN ID)
lab_mgmt_prefix: "{{ lab_network_prefix }}.{{ vlan_id_mgmt }}"
lab_vmotion_prefix: "{{ lab_network_prefix }}.{{ vlan_id_vmotion }}"
lab_vsan_prefix: "{{ lab_network_prefix }}.{{ vlan_id_vsan }}"
lab_overlay_prefix: "{{ lab_network_prefix }}.{{ vlan_id_host_overlay }}"
lab_edge_tep_prefix: "{{ lab_network_prefix }}.{{ vlan_id_edge_overlay }}"
lab_uplink_prefix: "{{ lab_network_prefix }}.{{ vlan_id_edge_uplink }}"

# Global services — all on management VLAN
lab_gateway: "{{ lab_mgmt_prefix }}.1"
lab_dns_server: "{{ lab_mgmt_prefix }}.1"
lab_ntp_servers:
  - "{{ lab_mgmt_prefix }}.1"

# Gateway public IP (stored in 1Password after vCD deployment)
gateway_public_ip: "{{ lookup('community.general.onepassword', 'Lab Bootstrap', field='ip_address', vault=onepassword_vault) }}"

# 1Password vault and item names for secret lookups
onepassword_vault: Employee

# Bootstrap password — simple, typed manually into vCD console and ESXi DCUI
bootstrap_password: "{{ lookup('community.general.onepassword', 'Lab Bootstrap', field='password', vault=onepassword_vault) }}"

# Runtime passwords — complex, injected by Ansible (never typed manually)
esxi_root_password: "{{ lookup('community.general.onepassword', 'ESXi Root', field='password', vault=onepassword_vault) }}"
vcenter_sso_password: "{{ lookup('community.general.onepassword', 'vCenter SSO', field='password', vault=onepassword_vault) }}"
sddc_admin_password: "{{ lookup('community.general.onepassword', 'SDDC Manager', field='password', vault=onepassword_vault) }}"
nsx_admin_password: "{{ lookup('community.general.onepassword', 'NSX Manager', field='password', vault=onepassword_vault) }}"
keycloak_admin_password: "{{ lookup('community.general.onepassword', 'Keycloak Admin', field='password', vault=onepassword_vault) }}"
depot_username: "{{ lookup('community.general.onepassword', 'Offline Depot', field='username', vault=onepassword_vault) }}"
depot_password: "{{ lookup('community.general.onepassword', 'Offline Depot', field='password', vault=onepassword_vault) }}"

# CA certificate
ca_cert_path: /tmp/lab-root-ca.crt

# Network configuration
vlans:
  management:
    id: "{{ vlan_id_mgmt }}"
    subnet: "{{ lab_network_prefix }}.{{ vlan_id_mgmt }}.0/24"
    gateway: "{{ lab_network_prefix }}.{{ vlan_id_mgmt }}.1"
    mtu: 1500
  vmotion:
    id: "{{ vlan_id_vmotion }}"
    subnet: "{{ lab_network_prefix }}.{{ vlan_id_vmotion }}.0/24"
    gateway: "{{ lab_network_prefix }}.{{ vlan_id_vmotion }}.1"
    mtu: 8900
  vsan:
    id: "{{ vlan_id_vsan }}"
    subnet: "{{ lab_network_prefix }}.{{ vlan_id_vsan }}.0/24"
    gateway: "{{ lab_network_prefix }}.{{ vlan_id_vsan }}.1"
    mtu: 8900
  host_overlay:
    id: "{{ vlan_id_host_overlay }}"
    subnet: "{{ lab_network_prefix }}.{{ vlan_id_host_overlay }}.0/24"
    gateway: "{{ lab_network_prefix }}.{{ vlan_id_host_overlay }}.1"
    mtu: 8900
  edge_overlay:
    id: "{{ vlan_id_edge_overlay }}"
    subnet: "{{ lab_network_prefix }}.{{ vlan_id_edge_overlay }}.0/24"
    gateway: "{{ lab_network_prefix }}.{{ vlan_id_edge_overlay }}.1"
    mtu: 8900
  edge_uplink:
    id: "{{ vlan_id_edge_uplink }}"
    subnet: "{{ lab_network_prefix }}.{{ vlan_id_edge_uplink }}.0/24"
    gateway: "{{ lab_network_prefix }}.{{ vlan_id_edge_uplink }}.1"
    mtu: 1500

# VCF depot
vcf_depot_url: depot.vcf-gcp.broadcom.net

# BGP configuration
bgp_local_asn: 65000
bgp_nsx_asn: 65001
bgp_router_id: "{{ lab_uplink_prefix }}.1"
bgp_nsx_uplink_ip: "{{ lab_uplink_prefix }}.2"
bgp_keepalive: 60
bgp_holdtime: 180

# VKS configuration
vks_cluster_name: vks-cluster-01
vks_namespace: vks-workloads
vks_pod_cidr: "192.168.0.0/16"
vks_service_cidr: "10.96.0.0/12"
vks_vm_class: best-effort-medium
vks_storage_class: vsan-default-storage-policy
vks_control_plane_replicas: 3
vks_worker_replicas: 3
