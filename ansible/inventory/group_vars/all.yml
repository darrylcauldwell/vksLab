# Lab-wide variables
lab_domain: lab.dreamfold.dev

# --- DDA convenience lookups ---
# These derive from pd_* variables injected by the physical_design vars plugin.
# The design document (docs/markdown/physical-design.md) is the authoritative source.

# Host IP lookup dict: host_ip['sddc-manager'] → '10.0.10.3'
host_ip: "{{ dict(pd_hosts | map(attribute='hostname') | zip(pd_hosts | map(attribute='ip'))) }}"

# VLAN lookup dict: vlan['management'] → {vlan_id: 10, subnet: ..., gateway: ..., mtu: ...}
vlan: "{{ dict(pd_vlans | map(attribute='name') | zip(pd_vlans)) }}"

# IP pool lookup dict: ip_pool['workload-tep-pool'] → {start_ip: ..., end_ip: ..., ...}
ip_pool: "{{ dict(pd_ip_pools | map(attribute='pool_name') | zip(pd_ip_pools)) }}"

# BGP lookup dict: bgp_peer['gateway'] → {ip: '10.0.60.1', asn: 65000, ...}
bgp_peer: "{{ dict(pd_bgp | map(attribute='peer_name') | zip(pd_bgp)) }}"

# --- Derived variables (backwards compatibility) ---
# These map old variable names to DDA lookups so existing roles work during migration.

lab_gateway: "{{ host_ip['gateway'] }}"
lab_dns_server: "{{ host_ip['gateway'] }}"
lab_ntp_servers:
  - "{{ host_ip['gateway'] }}"

# Gateway public IP (stored in 1Password after vCD deployment)
gateway_public_ip: "{{ lookup('community.general.onepassword', 'Lab Bootstrap', field='ip_address', vault=onepassword_vault) }}"

# 1Password vault and item names for secret lookups
onepassword_vault: Employee

# Bootstrap password — simple, typed manually into vCD console and ESXi DCUI
bootstrap_password: "{{ lookup('community.general.onepassword', 'Lab Bootstrap', field='password', vault=onepassword_vault) }}"

# Runtime passwords — complex, injected by Ansible (never typed manually)
esxi_root_password: "{{ lookup('community.general.onepassword', 'ESXi Root', field='password', vault=onepassword_vault) }}"
vcenter_sso_password: "{{ lookup('community.general.onepassword', 'vCenter SSO', field='password', vault=onepassword_vault) }}"
sddc_admin_password: "{{ lookup('community.general.onepassword', 'SDDC Manager', field='password', vault=onepassword_vault) }}"
nsx_admin_password: "{{ lookup('community.general.onepassword', 'NSX Manager', field='password', vault=onepassword_vault) }}"
keycloak_admin_password: "{{ lookup('community.general.onepassword', 'Keycloak Admin', field='password', vault=onepassword_vault) }}"
depot_username: "{{ lookup('community.general.onepassword', 'Offline Depot', field='username', vault=onepassword_vault) }}"
depot_password: "{{ lookup('community.general.onepassword', 'Offline Depot', field='password', vault=onepassword_vault) }}"

# Keycloak
keycloak_realm: lab

# CA certificate
ca_cert_path: /tmp/lab-root-ca.crt

# VCF depot
vcf_depot_url: depot.vcf-gcp.broadcom.net

# VKS configuration
vks_cluster_name: vks-cluster-01
vks_namespace: vks-workloads
vks_pod_cidr: "192.168.0.0/16"
vks_service_cidr: "10.96.0.0/12"
vks_vm_class: best-effort-medium
vks_storage_class: vsan-default-storage-policy
vks_control_plane_replicas: 3
vks_worker_replicas: 3
