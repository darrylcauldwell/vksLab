# Gateway-local inventory — used when running playbooks FROM the gateway.
# No ProxyJump needed; gateway targets localhost; ESXi hosts reached directly.
#
# Usage (from gateway):
#   cd ~/vksLab/ansible
#   ansible-playbook -i inventory/hosts-gateway.yml playbooks/phase2_esxi.yml
all:
  vars:
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ControlMaster=no"
  children:
    gateways:
      hosts:
        gateway:
          ansible_host: 127.0.0.1
          ansible_user: ubuntu
          ansible_connection: local
    esxi:
      vars:
        ansible_user: root
        ansible_password: "{{ bootstrap_password }}"
        ansible_remote_tmp: /tmp/.ansible/tmp
      children:
        esxi_management:
          hosts:
            esxi-01:
              ansible_host: "{{ host_ip['esxi-01'] }}"
            esxi-02:
              ansible_host: "{{ host_ip['esxi-02'] }}"
            esxi-03:
              ansible_host: "{{ host_ip['esxi-03'] }}"
            esxi-04:
              ansible_host: "{{ host_ip['esxi-04'] }}"
        esxi_workload:
          hosts:
            esxi-05:
              ansible_host: "{{ host_ip['esxi-05'] }}"
            esxi-06:
              ansible_host: "{{ host_ip['esxi-06'] }}"
            esxi-07:
              ansible_host: "{{ host_ip['esxi-07'] }}"
    vcf_appliances:
      hosts:
        vcf-installer:
          ansible_host: "{{ host_ip['vcf-installer'] }}"
        vcenter-mgmt:
          ansible_host: "{{ host_ip['vcenter-mgmt'] }}"
        sddc-manager:
          ansible_host: "{{ host_ip['sddc-manager'] }}"
        nsx-mgr-mgmt:
          ansible_host: "{{ host_ip['nsx-mgr-mgmt'] }}"
        vcenter-wld:
          ansible_host: "{{ host_ip['vcenter-wld'] }}"
        nsx-mgr-wld:
          ansible_host: "{{ host_ip['nsx-mgr-wld'] }}"
    nsx_edges:
      hosts:
        edge-01:
          ansible_host: "{{ host_ip['edge-01'] }}"
        edge-02:
          ansible_host: "{{ host_ip['edge-02'] }}"
