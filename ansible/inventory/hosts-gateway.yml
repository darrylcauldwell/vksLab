# Gateway-local inventory — used when running playbooks FROM the gateway.
# No ProxyJump needed; gateway targets localhost; ESXi hosts reached directly.
#
# Usage (from gateway):
#   cd ~/vksLab/ansible
#   ansible-playbook -i inventory/hosts-gateway.yml playbooks/phase2_esxi.yml
all:
  vars:
    ansible_ssh_common_args: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ControlMaster=no"
  children:
    gateways:
      hosts:
        gateway:
          ansible_host: 127.0.0.1
          ansible_user: ubuntu
          ansible_connection: local
    esxi:
      vars:
        ansible_user: root
        ansible_password: "{{ bootstrap_password }}"
        ansible_remote_tmp: /tmp/.ansible/tmp
      children:
        esxi_management:
          hosts:
            esxi-01:
              ansible_host: "{{ lab_mgmt_prefix }}.11"
              esxi_mac: "00:50:56:xx:xx:01"
            esxi-02:
              ansible_host: "{{ lab_mgmt_prefix }}.12"
              esxi_mac: "00:50:56:xx:xx:02"
            esxi-03:
              ansible_host: "{{ lab_mgmt_prefix }}.13"
              esxi_mac: "00:50:56:xx:xx:03"
            esxi-04:
              ansible_host: "{{ lab_mgmt_prefix }}.14"
              esxi_mac: "00:50:56:xx:xx:04"
        esxi_workload:
          hosts:
            esxi-05:
              ansible_host: "{{ lab_mgmt_prefix }}.15"
              esxi_mac: "00:50:56:xx:xx:05"
            esxi-06:
              ansible_host: "{{ lab_mgmt_prefix }}.16"
              esxi_mac: "00:50:56:xx:xx:06"
            esxi-07:
              ansible_host: "{{ lab_mgmt_prefix }}.17"
              esxi_mac: "00:50:56:xx:xx:07"
    vcf_appliances:
      hosts:
        vcf-installer:
          ansible_host: "{{ lab_mgmt_prefix }}.3"
        vcenter-mgmt:
          ansible_host: "{{ lab_mgmt_prefix }}.4"
        sddc-manager:
          ansible_host: "{{ lab_mgmt_prefix }}.5"
        nsx-mgr-mgmt:
          ansible_host: "{{ lab_mgmt_prefix }}.6"
        vcenter-wld:
          ansible_host: "{{ lab_mgmt_prefix }}.9"
        vcf-ops-logs:
          ansible_host: "{{ lab_mgmt_prefix }}.18"
        nsx-mgr-wld:
          ansible_host: "{{ lab_mgmt_prefix }}.10"
    nsx_edges:
      hosts:
        edge-01:
          ansible_host: "{{ lab_mgmt_prefix }}.20"
          edge_tep_ip: "{{ lab_edge_tep_prefix }}.20"
        edge-02:
          ansible_host: "{{ lab_mgmt_prefix }}.21"
          edge_tep_ip: "{{ lab_edge_tep_prefix }}.21"
