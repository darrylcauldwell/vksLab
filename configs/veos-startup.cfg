! Arista vEOS startup-config
! VKS Lab — vEOS Internet Gateway, Inter-VLAN Router, NTP Server, BGP Peer
!
hostname veos-router
!
vlan 10,20,30,40,50,60
!
ntp server pool.ntp.org prefer
ntp serve all
!
interface Ethernet1
   description Lab trunk (vCD private network)
   switchport mode trunk
   switchport trunk allowed vlan 10,20,30,40,50,60
   mtu 9000
!
interface Ethernet2
   description Public uplink (internet gateway)
   no switchport
   ip address dhcp
   ip nat outside
!
interface Vlan10
   description Management
   ip address 10.0.10.1/24
   ip nat inside
   mtu 1500
!
interface Vlan20
   description vMotion
   ip address 10.0.20.1/24
   ip nat inside
   mtu 9000
!
interface Vlan30
   description vSAN
   ip address 10.0.30.1/24
   ip nat inside
   mtu 9000
!
interface Vlan40
   description Host Overlay (TEP)
   ip address 10.0.40.1/24
   ip nat inside
   mtu 9000
!
interface Vlan50
   description Edge Overlay (TEP)
   ip address 10.0.50.1/24
   ip nat inside
   mtu 9000
!
interface Vlan60
   description Edge Uplink / BGP
   ip address 10.0.60.1/24
   ip nat inside
   mtu 1500
!
ip access-list LAB-INTERNAL
   permit ip 10.0.0.0/16 any
!
ip nat source list LAB-INTERNAL interface Ethernet2 overload
!
ip nat destination static tcp interface Ethernet2 3389 10.0.10.2 3389
!
ip routing
!
router bgp 65000
   router-id 10.0.60.1
   timers bgp 60 180
   neighbor 10.0.60.2 remote-as 65001
   neighbor 10.0.60.2 description NSX-Tier0
   !
   address-family ipv4
      neighbor 10.0.60.2 activate
      redistribute connected
